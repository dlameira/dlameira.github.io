<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>daniel lameira — biblioteca aberta</title>
<link rel="preconnect" href="https://directus-production-afdd.up.railway.app" crossorigin>
<link rel="dns-prefetch" href="https://directus-production-afdd.up.railway.app">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #fff;
  --fg: #000;
  --fg-soft: #333;
  --fg-mute: #888;
  --rule: rgba(0,0,0,0.12);
  --link: #0000ee;
  --link-visited: #551a8b;
  --highlight: #ff0;
  --paper-shadow: rgba(0,0,0,0.18);
  --no-img-bg: repeating-linear-gradient(45deg, #fff, #fff 8px, #f2f2f2 8px, #f2f2f2 9px);
}
html.dark {
  --bg: #0e0e0c;
  --fg: #e6e4d6;
  --fg-soft: #c2bfaf;
  --fg-mute: #6f6d63;
  --rule: rgba(230,228,214,0.18);
  --link: #7af0ff;
  --link-visited: #ffa6ff;
  --highlight: #5a5a00;
  --paper-shadow: rgba(0,0,0,0.6);
  --no-img-bg: repeating-linear-gradient(45deg, #111, #111 8px, #1a1a18 8px, #1a1a18 9px);
}

html, body {
  background: var(--bg);
  color: var(--fg);
  font-family: 'Times New Roman', Times, serif;
  overscroll-behavior: none;
  transition: background 0.3s ease, color 0.3s ease;
}

body {
  width: max-content;
  min-width: 100vw;
  min-height: 100vh;
  overflow: visible;
  user-select: none;
  -webkit-user-select: none;
  cursor: default;
  position: relative;
}

/* ── CANVAS ──────────────────────────────────── */
#canvas {
  position: relative;
}

/* ── HUD flutuante ───────────────────────────── */
.hud {
  position: fixed;
  font-family: 'Courier New', monospace;
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--fg-soft);
  z-index: 10000;
  pointer-events: none;
}
.hud a { color: var(--link); text-decoration: underline; pointer-events: auto; }
.hud a:hover { background: var(--highlight); color: #000; }
html.dark .hud a:hover { background: var(--highlight); color: #fff; }

.hud-tl { top: 18px; left: 20px; }
.hud-tr { top: 18px; right: 20px; text-align: right; }
.hud-bl { bottom: 18px; left: 20px; }
.hud-br { bottom: 18px; right: 20px; text-align: right; display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }

.hud button {
  pointer-events: auto;
  background: none; border: 1px solid currentColor; padding: 3px 8px;
  font-family: 'Courier New', monospace; font-size: 8.5px;
  letter-spacing: 0.16em; text-transform: uppercase;
  cursor: pointer; color: var(--fg);
  white-space: nowrap;
}
.hud button:hover { background: var(--fg); color: var(--bg); }

.intro-banner {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-family: 'Times New Roman', serif;
  font-size: clamp(36px, 5vw, 72px);
  line-height: 0.95;
  letter-spacing: -0.02em;
  text-align: center;
  pointer-events: none;
  z-index: 9999;
  opacity: 0;
  transition: opacity 0.4s ease;
  color: var(--fg);
}
.intro-banner.on { opacity: 1; }
.intro-banner .sub {
  display: block;
  margin-top: 14px;
  font-family: 'Courier New', monospace;
  font-size: 11px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--fg-mute);
}

/* ── LIVRO ──────────────────────────────────── */
.book {
  position: absolute;
  width: 120px;
  cursor: grab;
  transition: box-shadow 0.15s, transform 0.25s cubic-bezier(.2,.9,.3,1), left 0.6s cubic-bezier(.2,.9,.3,1), top 0.6s cubic-bezier(.2,.9,.3,1);
  will-change: transform, left, top;
  touch-action: none;
}
.book:active { cursor: grabbing; }
.book.dragging {
  transition: none;
  box-shadow: 0 12px 32px var(--paper-shadow);
  z-index: 999999 !important;
}
.book .cover {
  width: 100%;
  background: transparent;
  line-height: 0;
}
.book .cover img {
  width: 100%;
  height: auto;
  display: block;
  pointer-events: none;
}
.book .cover.no-img {
  aspect-ratio: 2/3;
  background: var(--no-img-bg);
  border: 1px solid var(--rule);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Courier New', monospace; font-size: 9px;
  letter-spacing: 0.2em; color: var(--fg-mute);
  text-transform: uppercase; text-align: center; padding: 10px;
}
.book .caption {
  font-family: 'Times New Roman', serif;
  font-style: italic;
  font-size: 11px;
  line-height: 1.25;
  margin-top: 6px;
  color: var(--fg);
  padding: 0 2px;
}
.book .caption small {
  display: block;
  font-style: normal;
  font-family: 'Courier New', monospace;
  font-size: 8.5px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--fg-mute);
  margin-top: 2px;
}
.book a.open-link {
  display: block;
  font-family: 'Courier New', monospace;
  font-size: 8px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--link);
  margin-top: 4px;
  padding: 0 2px;
  pointer-events: auto;
  text-decoration: underline;
}
.book a.open-link:hover { background: var(--highlight); color: #000; }
html.dark .book a.open-link:hover { color: #fff; }

body.dragging, body.dragging * { cursor: grabbing !important; }

/* ── POEMA (Pretext reflow editorial) ─────── */
.poem {
  position: absolute;
  font-family: 'Source Serif 4', 'Source Serif Pro', 'Charter', 'Iowan Old Style', Georgia, serif;
  color: var(--fg);
  width: 400px;
  min-width: 280px;
  max-width: 820px;
  border: 2.5px solid var(--fg);
  border-radius: 12px;
  background: var(--bg);
  cursor: default;
  touch-action: none;
  transition: left 0.6s cubic-bezier(.2,.9,.3,1), top 0.6s cubic-bezier(.2,.9,.3,1);
  overflow: hidden;
}
.poem.dragging, .poem.resizing {
  transition: none;
  box-shadow: 0 14px 38px var(--paper-shadow);
}
/* header colorido — o único lugar que inicia drag do poema */
.poem .poem-header {
  cursor: grab;
  pointer-events: auto;
  padding: 12px 20px 14px;
  background: #1a3e5c;
  color: #f8f5ec;
  border-bottom: 2.5px solid var(--fg);
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.poem.dragging .poem-header { cursor: grabbing; }
.poem .poem-tag {
  font-family: 'Courier New', monospace;
  font-size: 8.5px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  opacity: 0.7;
  display: block;
}
.poem .poem-title {
  font-family: 'Source Serif 4', 'Source Serif Pro', Georgia, serif;
  font-size: 19px;
  font-weight: 500;
  line-height: 1.2;
  display: block;
  margin-top: 2px;
}
.poem .poem-title a { color: inherit; text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.22); pointer-events: auto; }
.poem .poem-title a:hover { border-bottom-color: #fff; }
.poem .poem-date {
  display: block;
  margin-top: 4px;
  font-family: 'Courier New', monospace;
  font-size: 9.5px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  opacity: 0.55;
}
.poem .poem-body {
  position: relative;
  padding: 16px 20px 20px;
  font-size: 15.5px;
  line-height: 1.55;
  color: var(--fg);
  pointer-events: none;
  background: var(--bg);
}
.poem-line {
  position: absolute;
  white-space: pre;
  transition: left 0.28s cubic-bezier(.2,.9,.3,1), top 0.28s cubic-bezier(.2,.9,.3,1);
  will-change: left, top;
  pointer-events: none;
}
/* bordas do outline = handles de resize (faixas dentro do outline) */
.poem-edge {
  position: absolute;
  pointer-events: auto;
  z-index: 3;
  transition: background 0.15s ease;
  top: 70px;
  bottom: 26px;
  width: 10px;
}
.poem-edge-l { left: 0; cursor: ew-resize; }
.poem-edge-r { right: 0; cursor: ew-resize; }
.poem-edge:hover { background: rgba(232,50,10,0.4); }
.poem.resizing .poem-edge { background: rgba(232,50,10,0.6); }
/* canto inferior direito: resize horizontal também (mais descobrível) */
.poem-corner {
  position: absolute;
  right: 0; bottom: 0;
  width: 24px; height: 24px;
  cursor: nwse-resize;
  pointer-events: auto;
  display: flex; align-items: center; justify-content: center;
  color: var(--fg-mute);
  font-family: 'Courier New', monospace;
  font-size: 14px;
  opacity: 0.6;
  z-index: 4;
  transition: opacity 0.15s, color 0.15s;
}
.poem-corner::after { content: '↘'; }
.poem-corner:hover { opacity: 1; color: var(--fg); }

/* ── DROP (vídeo/canal/música) ─────────────── */
.drop-card {
  position: absolute;
  font-family: 'Courier New', monospace;
  font-size: 11px;
  line-height: 1.45;
  color: var(--fg);
  max-width: 260px;
  padding: 10px 14px;
  border: 1px solid var(--fg);
  background: var(--bg);
  cursor: grab;
  touch-action: none;
  transition: box-shadow 0.15s, transform 0.25s cubic-bezier(.2,.9,.3,1), left 0.6s cubic-bezier(.2,.9,.3,1), top 0.6s cubic-bezier(.2,.9,.3,1);
}
.drop-card:active { cursor: grabbing; }
.drop-card.dragging {
  transition: none;
  box-shadow: 0 12px 32px var(--paper-shadow);
  z-index: 999999 !important;
}
.drop-card .drop-tag {
  font-size: 8.5px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--fg-mute);
  margin-bottom: 6px;
}
.drop-card .drop-title {
  font-family: 'Times New Roman', serif;
  font-size: 15px;
  font-style: italic;
  margin-bottom: 4px;
  line-height: 1.2;
}
.drop-card .drop-author {
  font-size: 9px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--fg-mute);
  margin-bottom: 8px;
}
.drop-card .drop-open {
  font-size: 8.5px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--link);
  text-decoration: underline;
  pointer-events: auto;
}
.drop-card .drop-open:hover { background: var(--highlight); color: #000; }
html.dark .drop-card .drop-open:hover { color: #fff; }
</style>
</head>

  <span class="sub">arraste o que quiser — fica onde você deixar.</span>

<main id="canvas"></main>

<script type="module">
import * as Pretext from 'https://esm.sh/@chenglou/pretext';
const DIRECTUS = 'https://directus-production-afdd.up.railway.app';

const POEM_FONT = '15.5px "Source Serif 4", "Source Serif Pro", "Charter", "Iowan Old Style", Georgia, serif';
const POEM_LINE_H = 24;
const POEM_PARA_GAP = 14; // espaço entre parágrafos
const POEM_PAD_X = 48;    // padding horizontal total (24+24)
const POEM_MAX_LINES_PER_FORCED = 60;
const CANVAS_PAD = 140;
const BOOK_W = 120;

/* ── storage / cache ─────────────────────── */
async function cachedFetch(key, url, ttl = 5 * 60 * 1000) {
  try {
    const c = sessionStorage.getItem(key);
    if (c) {
      const { ts, data } = JSON.parse(c);
      if (Date.now() - ts < ttl) return data;
    }
  } catch(e) {}
  try {
    const res = await fetch(url);
    if (!res.ok) return [];
    const json = await res.json();
    const data = json.data || [];
    try { sessionStorage.setItem(key, JSON.stringify({ ts: Date.now(), data })); } catch(e) {}
    return data;
  } catch(e) { return []; }
}

const POS_KEY = 'lab:pos:v2';
const THEME_KEY = 'lab:theme';
const Z_KEY = 'lab:zmax';
let positions = (() => {
  try { return JSON.parse(localStorage.getItem(POS_KEY) || '{}'); }
  catch(e) { return {}; }
})();
/* Migration v5: layout foi redesenhado — reset completo de posições */
(() => {
  const MIG = 'lab:mig:v5-freshlayout';
  try {
    if (localStorage.getItem(MIG)) return;
    positions = {};
    localStorage.setItem(POS_KEY, '{}');
    localStorage.setItem(MIG, '1');
  } catch(e) {}
})();
function savePositions() {
  try { localStorage.setItem(POS_KEY, JSON.stringify(positions)); } catch(e) {}
}
let zCounter = parseInt(localStorage.getItem(Z_KEY) || '10') || 10;
function nextZ() { zCounter += 1; try { localStorage.setItem(Z_KEY, String(zCounter)); } catch(e){} return zCounter; }

/* ── helpers ─────────────────────────────── */
function escHtml(s) { return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function stripHtml(s) {
  if (!s) return '';
  // usa DOM pra stripar tags E decodificar entities (&uacute; → ú, etc.)
  const tmp = document.createElement('div');
  tmp.innerHTML = String(s);
  return (tmp.textContent || tmp.innerText || '').replace(/\s+/g, ' ').trim();
}
function directusImg(id, w) {
  if (!id) return null;
  const tx = encodeURIComponent(JSON.stringify([['sharpen']]));
  return `${DIRECTUS}/assets/${id}?width=${w}&quality=85&format=webp&transforms=${tx}`;
}
function sr(seed, min, max) {
  const x = Math.sin(seed * 9301 + 49297) * 233280;
  const frac = x - Math.floor(x);
  return min + Math.abs(frac) * (max - min);
}

/* ── fetchs ──────────────────────────────── */
async function fetchAllLivros() {
  return cachedFetch('c:lab:allivros',
    `${DIRECTUS}/items/livros?filter[status][_eq]=published&sort[]=-ano&limit=500&fields=id,title,autor,Cover,ano,editora`);
}
async function fetchPoemas() {
  // escritos do tipo poesia (ou tudo se nenhum tem tipo explicito)
  return cachedFetch('c:lab:poemas',
    `${DIRECTUS}/items/escritos?filter[status][_eq]=published&sort[]=-date&limit=5&fields=id,title,date,tipo,excerpt,content`);
}
async function fetchDropsMedia() {
  // drops de tipo video / canal / musica / album / filme
  return cachedFetch('c:lab:dropsmedia',
    `${DIRECTUS}/items/drops?filter[status][_eq]=published&filter[type][_in]=video,canal,musica,album,filme,podcast&sort[]=order&limit=8&fields=id,title,author,type,link,note,order`);
}

/* ── render: LIVRO ───────────────────────── */
function createBookEl(livro, pos) {
  const el = document.createElement('div');
  el.className = 'book';
  el.dataset.id = 'book-' + livro.id;
  el.dataset.kind = 'book';
  el.style.left = pos.x + 'px';
  el.style.top = pos.y + 'px';
  el.style.transform = `rotate(${pos.rot.toFixed(2)}deg)`;
  el.style.zIndex = pos.z || nextZ();
  const coverId = livro.Cover;
  const coverUrl = directusImg(coverId, 240);
  el.innerHTML = `
    <div class="cover ${coverUrl ? '' : 'no-img'}">
      ${coverUrl
        ? `<img src="${coverUrl}" alt="${escHtml(livro.title || '')}" loading="lazy" decoding="async" draggable="false">`
        : 'sem capa'}
    </div>
    <div class="caption">
      ${escHtml(livro.title || 'sem título')}
      <small>${escHtml(livro.autor || '')}${livro.ano ? ' · ' + escHtml(livro.ano) : ''}</small>
    </div>
  `;
  el.dataset.href = `livro.html?id=${livro.id}`;
  return el;
}

/* ── parse conteúdo em blocos (parágrafos × linhas forçadas) ─── */
function parseContentToBlocks(raw) {
  if (!raw) return [];
  const tmp = document.createElement('div');
  tmp.innerHTML = String(raw);
  const pEls = tmp.querySelectorAll('p');
  if (pEls.length > 0) {
    // HTML com <p>: cada <p> é um parágrafo. <br> dentro vira \n
    return Array.from(pEls).map(p => {
      p.querySelectorAll('br').forEach(br => br.replaceWith('\n'));
      const text = (p.textContent || '').replace(/\u00a0/g, ' ').trim();
      if (!text) return null;
      return text.split('\n').map(l => l.trim()).filter(Boolean);
    }).filter(arr => arr && arr.length > 0);
  }
  // Texto plain: \n\n separa parágrafos, \n simples mantém linha forçada
  const plain = (tmp.textContent || '').replace(/\u00a0/g, ' ');
  return plain.split(/\n\s*\n/).map(para =>
    para.split('\n').map(l => l.trim()).filter(Boolean)
  ).filter(arr => arr.length > 0);
}

function preparePoemBlocks(raw) {
  const blocks = parseContentToBlocks(raw);
  return blocks.map(paragraph =>
    paragraph.map(line => ({
      text: line,
      prepared: Pretext.prepareWithSegments(line, POEM_FONT)
    }))
  );
}

/* paleta de cores pros headers dos poemas */
const POEM_HEADER_PALETTE = [
  { bg: '#1a3e5c', fg: '#f8f5ec' },  // azul profundo
  { bg: '#5c1a1f', fg: '#f8f5ec' },  // vinho
  { bg: '#1f4a2e', fg: '#f8f5ec' },  // verde floresta
  { bg: '#4a2e1a', fg: '#f8f5ec' },  // terracota
  { bg: '#2d2842', fg: '#f8f5ec' },  // roxo profundo
  { bg: '#3d391a', fg: '#f8f5ec' },  // oliva
  { bg: '#10141a', fg: '#f8f5ec' },  // quase preto
];
function poemHeaderColor(id) {
  const n = Math.abs(parseInt(id) || 0);
  return POEM_HEADER_PALETTE[n % POEM_HEADER_PALETTE.length];
}
function fmtPoemDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  if (isNaN(d)) return String(dateStr);
  const months = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  return `${d.getDate()} de ${months[d.getMonth()]}, ${d.getFullYear()}`;
}

/* ── render: POEMA (via Pretext — reflow editorial) ─── */
function createPoemEl(escrito, pos) {
  const el = document.createElement('article');
  el.className = 'poem';
  el.dataset.id = 'poem-' + escrito.id;
  el.dataset.kind = 'poem';
  el.style.left = pos.x + 'px';
  el.style.top = pos.y + 'px';
  el.style.zIndex = pos.z || 1;
  if (pos.width) el.style.width = pos.width + 'px';
  const tipo = escrito.tipo === 'projeto' ? 'projeto' : (escrito.tipo || 'escrito');
  const raw = escrito.content || escrito.body || escrito.excerpt || '';
  const color = poemHeaderColor(escrito.id);
  const dateStr = fmtPoemDate(escrito.date);
  el.innerHTML = `
    <div class="poem-header" title="arraste daqui" style="background:${color.bg};color:${color.fg};">
      <span class="poem-tag">— ${escHtml(tipo)}</span>
      <span class="poem-title"><a href="post.html?id=${escrito.id}">${escHtml((escrito.title || '').toLowerCase())}</a></span>
      ${dateStr ? `<span class="poem-date">${escHtml(dateStr)}</span>` : ''}
    </div>
    <div class="poem-body"></div>
    <div class="poem-edge poem-edge-l" title="redimensionar"></div>
    <div class="poem-edge poem-edge-r" title="redimensionar"></div>
    <div class="poem-corner" title="redimensionar"></div>
  `;
  try {
    el._blocks = preparePoemBlocks(raw);
    el._raw = raw;
  } catch(e) {
    // fallback se Pretext falhar
    el.querySelector('.poem-body').textContent = stripHtml(raw);
    return el;
  }
  // inicializa resize handle
  initResizeHandle(el);
  // layout inicial
  requestAnimationFrame(() => reflowPoem(el, []));
  return el;
}

function initResizeHandle(poemEl) {
  const bind = (handleEl, mode) => {
    if (!handleEl) return;
    const begin = (clientX) => {
      const startW = poemEl.offsetWidth;
      const startLeft = parseFloat(poemEl.style.left) || 0;
      const startX = clientX;
      poemEl.classList.add('resizing');
      const move = ev => {
        const evt = ev.touches ? ev.touches[0] : ev;
        const dx = evt.clientX - startX;
        let newW;
        if (mode === 'left') {
          newW = Math.max(260, Math.min(880, startW - dx));
          const consumedDelta = startW - newW; // positivo se encolheu, negativo se cresceu
          poemEl.style.width = newW + 'px';
          poemEl.style.left  = (startLeft + consumedDelta) + 'px';
        } else { // 'right' (ou corner)
          newW = Math.max(260, Math.min(880, startW + dx));
          poemEl.style.width = newW + 'px';
        }
        reflowPoem(poemEl, []);
        if (ev.touches) ev.preventDefault();
      };
      const up = () => {
        poemEl.classList.remove('resizing');
        document.removeEventListener('mousemove', move);
        document.removeEventListener('mouseup', up);
        document.removeEventListener('touchmove', move);
        document.removeEventListener('touchend', up);
        const id = poemEl.dataset.id;
        const cur = positions[id] || {};
        positions[id] = {
          ...cur,
          width: poemEl.offsetWidth,
          x: parseFloat(poemEl.style.left) || 0,
          y: parseFloat(poemEl.style.top) || 0
        };
        savePositions();
        reflowAllPoems();
      };
      document.addEventListener('mousemove', move);
      document.addEventListener('mouseup', up);
      document.addEventListener('touchmove', move, { passive: false });
      document.addEventListener('touchend', up);
    };
    handleEl.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      begin(e.clientX);
    });
    handleEl.addEventListener('touchstart', e => {
      e.preventDefault(); e.stopPropagation();
      begin(e.touches[0].clientX);
    }, { passive: false });
  };
  bind(poemEl.querySelector('.poem-edge-l'), 'left');
  bind(poemEl.querySelector('.poem-edge-r'), 'right');
  bind(poemEl.querySelector('.poem-corner'), 'right');
}

/* ── reflow: recalcula layout linhas do poema considerando obstáculos ─── */
function reflowPoem(poemEl, obstacles) {
  const blocks = poemEl._blocks;
  if (!blocks || !blocks.length) return;
  const body = poemEl.querySelector('.poem-body');
  if (!body) return;
  const poemCanvasLeft = parseFloat(poemEl.style.left) || 0;
  const poemCanvasTop  = parseFloat(poemEl.style.top)  || 0;
  const bodyAbsTop  = poemCanvasTop  + body.offsetTop;
  const bodyAbsLeft = poemCanvasLeft + body.offsetLeft;
  const poemWidth = body.clientWidth || (poemEl.offsetWidth - POEM_PAD_X);

  // obstáculos em coord do body
  const obs = obstacles.map(o => ({
    x: o.left - bodyAbsLeft,
    y: o.top  - bodyAbsTop,
    w: o.width,
    h: o.height
  })).filter(o => o.y + o.h > 0);

  function availableAtY(y) {
    let ranges = [[0, poemWidth]];
    for (const o of obs) {
      if (o.y >= y + POEM_LINE_H || o.y + o.h <= y) continue;
      const newR = [];
      for (const [rs, re] of ranges) {
        if (o.x + o.w <= rs || o.x >= re) { newR.push([rs, re]); continue; }
        if (o.x > rs) newR.push([rs, o.x]);
        if (o.x + o.w < re) newR.push([o.x + o.w, re]);
      }
      ranges = newR;
    }
    let best = [0, 0];
    for (const r of ranges) if (r[1] - r[0] > best[1] - best[0]) best = r;
    return { x: best[0], w: best[1] - best[0] };
  }

  const outLines = [];
  let y = 0;
  for (let pi = 0; pi < blocks.length; pi++) {
    const paragraph = blocks[pi];
    for (let li = 0; li < paragraph.length; li++) {
      const forced = paragraph[li];
      let cursor = { segmentIndex: 0, graphemeIndex: 0 };
      let looped = 0;
      while (looped++ < POEM_MAX_LINES_PER_FORCED) {
        const avail = availableAtY(y);
        if (avail.w < 40) { y += POEM_LINE_H; if (y > 8000) break; continue; }
        const range = Pretext.layoutNextLineRange(forced.prepared, cursor, avail.w);
        if (!range) break; // fim desta linha forçada
        const mat = Pretext.materializeLineRange(forced.prepared, range);
        outLines.push({ x: avail.x, y, text: mat.text });
        cursor = range.end;
        y += POEM_LINE_H;
      }
    }
    if (pi < blocks.length - 1) y += POEM_PARA_GAP;
  }

  // diff-render: reusa divs, atualiza texto/posição
  const existing = body.querySelectorAll('.poem-line');
  for (let i = 0; i < outLines.length; i++) {
    let el = existing[i];
    if (!el) {
      el = document.createElement('div');
      el.className = 'poem-line';
      body.appendChild(el);
    }
    if (el.textContent !== outLines[i].text) el.textContent = outLines[i].text;
    el.style.left = outLines[i].x + 'px';
    el.style.top  = outLines[i].y + 'px';
  }
  for (let i = outLines.length; i < existing.length; i++) existing[i].remove();
  body.style.height = y + 'px';
}

/* coleta TODOS os livros/cards próximos a um poema como obstáculos */
function collectObstaclesFor(poemEl) {
  const pr = poemEl.getBoundingClientRect();
  const prox = 60;
  const out = [];
  document.querySelectorAll('.book, .drop-card').forEach(el => {
    const er = el.getBoundingClientRect();
    if (er.right < pr.left - prox || er.left > pr.right + prox ||
        er.bottom < pr.top - prox || er.top > pr.bottom + prox) return;
    // coords em canvas (= style.left/top pros livros)
    const x = parseFloat(el.style.left) || (er.left + window.scrollX);
    const y = parseFloat(el.style.top)  || (er.top  + window.scrollY);
    out.push({
      left: x, top: y,
      width:  el.offsetWidth  || er.width,
      height: (el.offsetHeight || er.height) + 16
    });
  });
  return out;
}

/* reflow (layout natural — livros não entram mais no texto) */
function reflowAllPoems() {
  document.querySelectorAll('.poem').forEach(p => reflowPoem(p, []));
}

/* COLISÃO: livros/drops são empurrados pra fora de qualquer poema */
function avoidPoemOverlap(x, y, w, h) {
  const MARGIN = 6;
  document.querySelectorAll('.poem').forEach(p => {
    const pl = parseFloat(p.style.left) || 0;
    const pt = parseFloat(p.style.top)  || 0;
    const pw = p.offsetWidth, ph = p.offsetHeight;
    if (x + w <= pl - MARGIN || x >= pl + pw + MARGIN ||
        y + h <= pt - MARGIN || y >= pt + ph + MARGIN) return;
    // overlap: escolhe o lado mais próximo pra empurrar
    const pushR = (pl + pw + MARGIN) - x;
    const pushL = (x + w) - (pl - MARGIN);
    const pushD = (pt + ph + MARGIN) - y;
    const pushU = (y + h) - (pt - MARGIN);
    const min = Math.min(pushR, pushL, pushD, pushU);
    if (min === pushR) x = pl + pw + MARGIN;
    else if (min === pushL) x = pl - w - MARGIN;
    else if (min === pushD) y = pt + ph + MARGIN;
    else y = pt - h - MARGIN;
  });
  return { x, y };
}

/* ── render: DROP media ──────────────────── */
function createDropEl(drop, pos) {
  const el = document.createElement('div');
  el.className = 'drop-card';
  el.dataset.id = 'drop-' + drop.id;
  el.dataset.kind = 'drop';
  el.style.left = pos.x + 'px';
  el.style.top = pos.y + 'px';
  el.style.transform = `rotate(${(pos.rot||0).toFixed(2)}deg)`;
  el.style.zIndex = pos.z || nextZ();
  const isExternal = drop.link && /^https?:/.test(drop.link);
  const href = isExternal ? drop.link : `drop.html?id=${drop.id}`;
  const targetAttr = isExternal ? 'target="_blank" rel="noopener"' : '';
  el.innerHTML = `
    <div class="drop-tag">— ${escHtml(drop.type || 'drop')}</div>
    <div class="drop-title">${escHtml(drop.title || '')}</div>
    ${drop.author ? `<div class="drop-author">${escHtml(drop.author)}</div>` : ''}
  `;
  el.dataset.href = href;
  el.dataset.external = isExternal ? '1' : '';
  return el;
}

/* ── placement organizado ─────────────────── */
/* Layout inicial: textos à esquerda (coluna), livros empilhados à direita,
   drops abaixo dos textos. Itens com posição salva no localStorage
   mantêm onde estavam. */
const LAYOUT = {
  LX: 40,                    // X dos textos (esquerda)
  TEXT_WIDTH: 400,           // largura default dos poemas
  TEXT_STACK_GAP: 280,       // espaço vertical entre poemas (fallback)
  DROP_GAP_X: 230,
  DROP_GAP_Y: 130,
  STACK_START_X: 560,        // onde começa a pilha de livros
  STACK_STEP_X: 120,         // largura de cada pilha
  STACK_STEP_Y: 14,          // overlap entre livros
  STACK_TOP: 40,
  STACK_COLS: 6              // quantas pilhas lado a lado
};

function applyInitialLayout(livros, poemas, drops) {
  // textos E drops misturados em coluna à esquerda (drops depois dos textos)
  let leftY = 40;
  poemas.forEach((p) => {
    const k = 'poem-' + p.id;
    if (!positions[k]) {
      positions[k] = { x: LAYOUT.LX, y: leftY, z: 1, width: LAYOUT.TEXT_WIDTH };
    }
    leftY += LAYOUT.TEXT_STACK_GAP;
  });
  drops.forEach((d, i) => {
    const k = 'drop-' + d.id;
    if (!positions[k]) {
      positions[k] = {
        x: LAYOUT.LX,
        y: leftY,
        rot: sr((parseInt(d.id) || i) * 5, -1.2, 1.2),
        z: 5
      };
    }
    leftY += 140;
  });

  // livros empilhados à direita
  livros.forEach((l, i) => {
    const k = 'book-' + l.id;
    if (!positions[k]) {
      const col = i % LAYOUT.STACK_COLS;
      const row = Math.floor(i / LAYOUT.STACK_COLS);
      positions[k] = {
        x: LAYOUT.STACK_START_X + col * LAYOUT.STACK_STEP_X,
        y: LAYOUT.STACK_TOP + row * LAYOUT.STACK_STEP_Y,
        rot: sr((parseInt(l.id) || i) * 7, -3.5, 3.5),
        z: 10 + i
      };
    }
  });
}

function computeCanvasSize(livrosCount, dropsCount, poemasCount) {
  const stackRows = Math.ceil(livrosCount / LAYOUT.STACK_COLS);
  const stackH = LAYOUT.STACK_TOP + stackRows * LAYOUT.STACK_STEP_Y + 240;
  const textsH = 40 + poemasCount * LAYOUT.TEXT_STACK_GAP;
  const dropsH = Math.ceil(dropsCount / 3) * LAYOUT.DROP_GAP_Y;
  const h = Math.max(window.innerHeight, stackH, textsH + dropsH + 80);
  const w = Math.max(window.innerWidth,
    LAYOUT.STACK_START_X + LAYOUT.STACK_COLS * LAYOUT.STACK_STEP_X + 80);
  return { w, h };
}

/* ── DRAG STATE ──────────────────────────── */
let dragged = null;
let dragKind = null;
let dragOffsetX = 0, dragOffsetY = 0;
let autoScrollRAF = 0;
let repelRAF = 0;
let edgeDx = 0, edgeDy = 0;
let lastPointerX = 0, lastPointerY = 0;
let dragStartX = 0, dragStartY = 0;
const CLICK_THRESHOLD = 5; // px — abaixo disso é clique (não drag)

function pointerDown(e) {
  // não inicia drag se clicou em link, handle de resize ou edge
  if (e.target.closest('.poem-title a, .poem-edge, .poem-corner')) return;
  // poema só é arrastado pelo header; livro/drop em qualquer lugar
  const poemHeader = e.target.closest('.poem-header');
  const el = poemHeader
    ? poemHeader.closest('.poem')
    : e.target.closest('.book, .drop-card');
  if (!el) return;
  e.preventDefault();
  const evt = e.touches ? e.touches[0] : e;
  const rect = el.getBoundingClientRect();
  dragOffsetX = evt.clientX - rect.left;
  dragOffsetY = evt.clientY - rect.top;
  dragged = el;
  dragKind = el.dataset.kind;
  // traz pra cima no z-index imediatamente
  el.style.zIndex = nextZ();
  el.classList.add('dragging');
  document.body.classList.add('dragging');
  lastPointerX = evt.clientX;
  lastPointerY = evt.clientY;
  dragStartX = evt.clientX;
  dragStartY = evt.clientY;
}

function pointerMove(e) {
  if (!dragged) return;
  const evt = e.touches ? e.touches[0] : e;
  lastPointerX = evt.clientX;
  lastPointerY = evt.clientY;
  let canvasX = evt.clientX + window.scrollX - dragOffsetX;
  let canvasY = evt.clientY + window.scrollY - dragOffsetY;
  // livros e drops são empurrados pra fora de qualquer poema
  if (dragKind === 'book' || dragKind === 'drop') {
    const pos = avoidPoemOverlap(canvasX, canvasY, dragged.offsetWidth, dragged.offsetHeight);
    canvasX = pos.x;
    canvasY = pos.y;
  }
  dragged.style.left = canvasX + 'px';
  dragged.style.top = canvasY + 'px';
  checkEdgeScroll(evt.clientX, evt.clientY);
  if (e.touches) e.preventDefault();
}

function pointerUp() {
  if (!dragged) return;
  const dx = Math.abs(lastPointerX - dragStartX);
  const dy = Math.abs(lastPointerY - dragStartY);
  const wasClick = dx < CLICK_THRESHOLD && dy < CLICK_THRESHOLD;

  const draggedEl = dragged;
  const kind = dragKind;

  // reset state SEMPRE primeiro
  const id = draggedEl.dataset.id;
  const x = parseFloat(draggedEl.style.left) || 0;
  const y = parseFloat(draggedEl.style.top) || 0;
  const m = (draggedEl.style.transform || '').match(/rotate\(([^)]+)deg\)/);
  const rot = m ? parseFloat(m[1]) : 0;
  const z = parseInt(draggedEl.style.zIndex) || zCounter;
  const cur = positions[id] || {};
  positions[id] = { ...cur, x, y, rot, z };
  savePositions();
  draggedEl.classList.remove('dragging');
  document.body.classList.remove('dragging');
  dragged = null;
  dragKind = null;
  stopEdgeScroll();

  // se foi click (não drag) e é book/drop com href, abre
  if (wasClick && (kind === 'book' || kind === 'drop')) {
    const href = draggedEl.dataset.href;
    if (href) {
      if (draggedEl.dataset.external) window.open(href, '_blank', 'noopener');
      else window.location.href = href;
    }
  }
}

/* ── auto-scroll nas bordas ──────────────── */
const EDGE = 110;
const MAX_SPEED = 22;
function checkEdgeScroll(cx, cy) {
  const w = window.innerWidth, h = window.innerHeight;
  edgeDx = 0; edgeDy = 0;
  if (cx < EDGE)          edgeDx = -Math.round((EDGE - cx) / EDGE * MAX_SPEED);
  else if (cx > w - EDGE) edgeDx = Math.round((cx - (w - EDGE)) / EDGE * MAX_SPEED);
  if (cy < EDGE)          edgeDy = -Math.round((EDGE - cy) / EDGE * MAX_SPEED);
  else if (cy > h - EDGE) edgeDy = Math.round((cy - (h - EDGE)) / EDGE * MAX_SPEED);
  if ((edgeDx || edgeDy) && !autoScrollRAF) {
    const tick = () => {
      if (!dragged || (!edgeDx && !edgeDy)) { autoScrollRAF = 0; return; }
      window.scrollBy(edgeDx, edgeDy);
      if (dragged) {
        const canvasX = lastPointerX + window.scrollX - dragOffsetX;
        const canvasY = lastPointerY + window.scrollY - dragOffsetY;
        dragged.style.left = canvasX + 'px';
        dragged.style.top = canvasY + 'px';
      }
      autoScrollRAF = requestAnimationFrame(tick);
    };
    autoScrollRAF = requestAnimationFrame(tick);
  }
}
function stopEdgeScroll() {
  edgeDx = 0; edgeDy = 0;
  if (autoScrollRAF) { cancelAnimationFrame(autoScrollRAF); autoScrollRAF = 0; }
}

/* ── REFLOW LOOP: chama reflowAllPoems a cada frame do drag ── */
function startReflowLoop() {
  const tick = () => {
    if (!dragged) { repelRAF = 0; return; }
    reflowAllPoems();
    repelRAF = requestAnimationFrame(tick);
  };
  repelRAF = requestAnimationFrame(tick);
}
function stopReflowLoop() {
  if (repelRAF) { cancelAnimationFrame(repelRAF); repelRAF = 0; }
}

/* ── ARRUMAR EM GRID ─────────────────────── */
function arrangeInGrid() {
  const items = Array.from(document.querySelectorAll('.book, .drop-card'));
  // Mais espaço pros cards (drops + livros misturados)
  const pad = 40;
  const cellW = 170;
  const cellH = 300;
  const availW = Math.max(window.innerWidth, (document.body.scrollWidth || 0)) - pad * 2;
  const cols = Math.max(1, Math.floor(availW / cellW));
  items.forEach((el, i) => {
    const col = i % cols;
    const row = Math.floor(i / cols);
    const x = pad + col * cellW;
    const y = pad + row * cellH;
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    el.style.transform = 'rotate(0deg)';
    const id = el.dataset.id;
    positions[id] = { x, y, rot: 0, z: parseInt(el.style.zIndex) || zCounter };
  });
  // também reposiciona poemas em espaços livres (colunas após os items ou em posições de canto)
  const poems = Array.from(document.querySelectorAll('.poem'));
  poems.forEach((el, i) => {
    // coloca em lateral direita
    const x = pad + (cols * cellW) + 40;
    const y = pad + i * 340;
    el.style.left = x + 'px';
    el.style.top = y + 'px';
  });
  savePositions();
  // ajusta canvas pra caber tudo
  const canvas = document.getElementById('canvas');
  const totalRows = Math.ceil(items.length / cols);
  const newH = pad * 2 + totalRows * cellH;
  const newW = Math.max(window.innerWidth, pad * 2 + cols * cellW + 500);
  canvas.style.height = newH + 'px';
  canvas.style.width = newW + 'px';
}

/* ── THEME toggle ────────────────────────── */
function applyTheme(mode) {
  if (mode === 'dark') document.documentElement.classList.add('dark');
  else document.documentElement.classList.remove('dark');
  const btn = document.getElementById('theme-btn');
  if (btn) btn.textContent = mode === 'dark' ? 'modo claro' : 'modo escuro';
  try { localStorage.setItem(THEME_KEY, mode); } catch(e) {}
}
function toggleTheme() {
  const cur = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
  applyTheme(cur === 'dark' ? 'light' : 'dark');
}
(() => {
  try {
    const saved = localStorage.getItem(THEME_KEY);
    if (saved) applyTheme(saved);
  } catch(e) {}
})();

/* ── INIT ────────────────────────────────── */
async function init() {
  const [livros, poemas, drops] = await Promise.all([fetchAllLivros(), fetchPoemas(), fetchDropsMedia()]);
  const total = livros.length + poemas.length + drops.length;
  if (!total) {
    document.getElementById('item-count').textContent = '0';
    document.querySelector('.hud-bl').innerHTML = '(nada carregou — directus offline?)';
    return;
  }
  const { w: cw, h: ch } = computeCanvasSize(livros.length, drops.length, poemas.length);
  const canvas = document.getElementById('canvas');
  canvas.style.width = cw + 'px';
  canvas.style.height = ch + 'px';

  // aplica layout organizado (textos esquerda, livros empilhados direita)
  // só afeta items sem posição salva — quem já tinha posição customizada mantém
  applyInitialLayout(livros, poemas, drops);

  // Poemas (primeiro — ficam por baixo dos livros empilhados se houver overlap)
  poemas.forEach(p => {
    const key = 'poem-' + p.id;
    canvas.appendChild(createPoemEl(p, positions[key]));
  });

  // Drops
  drops.forEach(d => {
    const key = 'drop-' + d.id;
    canvas.appendChild(createDropEl(d, positions[key]));
  });

  // Livros
  livros.forEach(l => {
    const key = 'book-' + l.id;
    canvas.appendChild(createBookEl(l, positions[key]));
  });

  document.getElementById('item-count').textContent = total;

  // scroll inicial: começa no canto superior esquerdo (textos visíveis + parte dos livros)
  window.scrollTo({ left: 0, top: 0, behavior: 'instant' });

  // banner de intro (sai rapidinho)
  const intro = document.getElementById('intro');
  requestAnimationFrame(() => intro.classList.add('on'));
  setTimeout(() => intro.classList.remove('on'), 1400);

  // listeners globais de drag
  document.addEventListener('mousedown', pointerDown);
  document.addEventListener('mousemove', pointerMove);
  document.addEventListener('mouseup', pointerUp);
  document.addEventListener('touchstart', pointerDown, { passive: false });
  document.addEventListener('touchmove', pointerMove, { passive: false });
  document.addEventListener('touchend', pointerUp);

  // botões HUD
  document.getElementById('grid-btn').addEventListener('click', arrangeInGrid);
  document.getElementById('theme-btn').addEventListener('click', toggleTheme);
  document.getElementById('reset-btn').addEventListener('click', () => {
    if (!confirm('apagar posições customizadas e voltar ao layout inicial?')) return;
    try {
      localStorage.removeItem(POS_KEY);
      localStorage.removeItem(Z_KEY);
    } catch(e) {}
    positions = {};
    location.reload();
  });

  // ESPERA FONTS CARREGAREM antes do reflow — senão Pretext calcula com
  // métrica da fonte fallback e texto vaza do card quando a Source Serif chega
  (async () => {
    try { if (document.fonts && document.fonts.ready) await document.fonts.ready; } catch(e) {}
    reflowAllPoems();
    // Depois do reflow, reempilha poemas pela altura REAL pra não sobrepor
    rearrangePoemColumn();
    // Recalcula canvas height pra caber tudo
    fitCanvasToContent();
  })();

  // arrumar em grid também faz reflow dos poemas depois
  document.getElementById('grid-btn').addEventListener('click', () => {
    setTimeout(() => { reflowAllPoems(); fitCanvasToContent(); }, 650);
  }, true);
}

/* Reempilha poemas+drops da coluna esquerda pela altura REAL,
   evitando overlap */
function rearrangePoemColumn() {
  const els = Array.from(document.querySelectorAll('.poem, .drop-card'))
    .filter(el => Math.abs((parseFloat(el.style.left) || 0) - LAYOUT.LX) < 10)
    .sort((a, b) => (parseFloat(a.style.top) || 0) - (parseFloat(b.style.top) || 0));
  let y = 40;
  els.forEach(el => {
    el.style.top = y + 'px';
    const id = el.dataset.id;
    const cur = positions[id] || {};
    positions[id] = { ...cur, x: LAYOUT.LX, y };
    y += el.offsetHeight + 28;
  });
  savePositions();
}

function fitCanvasToContent() {
  const canvas = document.getElementById('canvas');
  let maxX = window.innerWidth;
  let maxY = window.innerHeight;
  document.querySelectorAll('.book, .drop-card, .poem').forEach(el => {
    const x = (parseFloat(el.style.left) || 0) + el.offsetWidth;
    const y = (parseFloat(el.style.top)  || 0) + el.offsetHeight;
    if (x > maxX) maxX = x;
    if (y > maxY) maxY = y;
  });
  canvas.style.width  = (maxX + 80) + 'px';
  canvas.style.height = (maxY + 80) + 'px';
}

init();
