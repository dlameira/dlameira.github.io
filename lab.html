<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>daniel lameira — biblioteca aberta</title>
<link rel="preconnect" href="https://directus-production-afdd.up.railway.app" crossorigin>
<link rel="dns-prefetch" href="https://directus-production-afdd.up.railway.app">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: #fff;
  color: #000;
  font-family: 'Times New Roman', Times, serif;
  overscroll-behavior: none;
}

body {
  /* canvas cresce livremente, scroll em ambos os eixos */
  width: max-content;
  min-width: 100vw;
  min-height: 100vh;
  overflow: visible;
  user-select: none;
  -webkit-user-select: none;
  cursor: default;
  position: relative;
}

/* ── CANVAS ──────────────────────────────────── */
#canvas {
  position: relative;
  /* dimensões setadas via JS baseado no número de livros */
}

/* ── HUD flutuante (fixed na viewport) ──────── */
.hud {
  position: fixed;
  font-family: 'Courier New', monospace;
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: #333;
  z-index: 10000;
  pointer-events: none;
}
.hud a { color: #0000ee; text-decoration: underline; pointer-events: auto; }
.hud a:hover { background: #ff0; }

.hud-tl { top: 18px; left: 20px; }
.hud-tr { top: 18px; right: 20px; text-align: right; }
.hud-bl { bottom: 18px; left: 20px; }
.hud-br { bottom: 18px; right: 20px; text-align: right; }
.hud button {
  pointer-events: auto;
  background: none; border: 1px solid #000; padding: 4px 10px;
  font-family: 'Courier New', monospace; font-size: 9.5px;
  letter-spacing: 0.2em; text-transform: uppercase;
  cursor: pointer; color: #000;
}
.hud button:hover { background: #000; color: #fff; }

.intro-banner {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-family: 'Times New Roman', serif;
  font-size: clamp(36px, 5vw, 72px);
  line-height: 0.95;
  letter-spacing: -0.02em;
  text-align: center;
  pointer-events: none;
  z-index: 9999;
  opacity: 0;
  transition: opacity 0.4s ease;
}
.intro-banner.on { opacity: 1; }
.intro-banner .sub {
  display: block;
  margin-top: 14px;
  font-family: 'Courier New', monospace;
  font-size: 11px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: #666;
}

/* ── LIVRO ──────────────────────────────────── */
.book {
  position: absolute;
  width: 120px;
  cursor: grab;
  transition: box-shadow 0.15s, transform 0.25s cubic-bezier(.2,.9,.3,1);
  will-change: transform;
  touch-action: none; /* essential p/ touch drag */
}
.book:active { cursor: grabbing; }
.book.dragging { transition: none; box-shadow: 0 12px 32px rgba(0,0,0,0.25); z-index: 9998 !important; }
.book .cover {
  width: 100%;
  aspect-ratio: 2/3;
  background: #eee;
  border: 1px solid rgba(0,0,0,0.08);
  overflow: hidden;
  line-height: 0;
  box-shadow: 0 1px 2px rgba(0,0,0,0.04);
}
.book .cover img {
  width: 100%; height: 100%; display: block; object-fit: cover;
  pointer-events: none; /* drag vem do div pai */
}
.book .cover.no-img {
  display: flex; align-items: center; justify-content: center;
  font-family: 'Courier New', monospace; font-size: 9px;
  letter-spacing: 0.2em; color: #999;
  background: repeating-linear-gradient(45deg, #fff, #fff 8px, #f2f2f2 8px, #f2f2f2 9px);
  text-transform: uppercase; text-align: center; padding: 10px;
}
.book .caption {
  font-family: 'Times New Roman', serif;
  font-style: italic;
  font-size: 11px;
  line-height: 1.25;
  margin-top: 6px;
  color: #000;
  padding: 0 2px;
}
.book .caption small {
  display: block;
  font-style: normal;
  font-family: 'Courier New', monospace;
  font-size: 8.5px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #888;
  margin-top: 2px;
}

.book a.open-link {
  display: block;
  font-family: 'Courier New', monospace;
  font-size: 8px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #0000ee;
  margin-top: 4px;
  padding: 0 2px;
  pointer-events: auto;
  text-decoration: underline;
}
.book a.open-link:hover { background: #ff0; }

/* cursor especial quando arrastando */
body.dragging, body.dragging * { cursor: grabbing !important; }
</style>
</head>
<body>

<!-- HUD -->
<div class="hud hud-tl">
  daniel lameira<br>
  <span style="color:#888">biblioteca aberta</span>
</div>
<div class="hud hud-tr">
  <a href="index.html">home</a> ·
  <a href="posts.html">arquivo</a>
</div>
<div class="hud hud-bl" id="hud-count">
  <span id="book-count">—</span> livros · arraste à vontade<br>
  <span style="color:#888">scroll em qualquer direção</span>
</div>
<div class="hud hud-br">
  <button id="reset-btn">resetar posições</button>
</div>

<!-- Banner de boas-vindas (aparece por 3s) -->
<div class="intro-banner" id="intro">
  biblioteca <span style="color:#0000ee">aberta</span>
  <span class="sub">arraste os livros onde quiser — eles ficam.</span>
</div>

<!-- Canvas com livros -->
<main id="canvas"></main>

<script>
const DIRECTUS = 'https://directus-production-afdd.up.railway.app';
const CANVAS_PAD = 140;  // margem interna nas bordas
const BOOK_W = 120;
const BOOK_H_EST = 220;  // estimativa com caption p/ espaçamento

async function cachedFetch(key, url, ttl = 5 * 60 * 1000) {
  try {
    const c = sessionStorage.getItem(key);
    if (c) {
      const { ts, data } = JSON.parse(c);
      if (Date.now() - ts < ttl) return data;
    }
  } catch(e) {}
  try {
    const res = await fetch(url);
    if (!res.ok) return [];
    const json = await res.json();
    const data = json.data || [];
    try { sessionStorage.setItem(key, JSON.stringify({ ts: Date.now(), data })); } catch(e) {}
    return data;
  } catch(e) { return []; }
}

function escHtml(s) { return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function directusImg(id, w) {
  if (!id) return null;
  const tx = encodeURIComponent(JSON.stringify([['sharpen']]));
  return `${DIRECTUS}/assets/${id}?width=${w}&quality=85&format=webp&transforms=${tx}`;
}

/* PRNG determinístico */
function sr(seed, min, max) {
  const x = Math.sin(seed * 9301 + 49297) * 233280;
  const frac = x - Math.floor(x);
  return min + Math.abs(frac) * (max - min);
}

/* --- persistence --- */
const POS_KEY = 'lab:bookpos:v1';
function loadAllPositions() {
  try { return JSON.parse(localStorage.getItem(POS_KEY) || '{}'); }
  catch(e) { return {}; }
}
function saveAllPositions(obj) {
  try { localStorage.setItem(POS_KEY, JSON.stringify(obj)); } catch(e) {}
}
let positions = loadAllPositions();
function savePos(id, x, y, rot) {
  positions[id] = { x, y, rot };
  saveAllPositions(positions);
}

/* --- fetch --- */
async function fetchAllLivros() {
  return cachedFetch('c:lab:allivros', `${DIRECTUS}/items/livros?filter[status][_eq]=published&sort[]=-ano&limit=500&fields=id,title,autor,Cover,ano,editora`);
}

/* --- canvas / placement --- */
function computeCanvasSize(n) {
  // densidade: ~1 livro por 260x340 em média
  const cols = Math.ceil(Math.sqrt(n * 1.4));
  const w = Math.max(window.innerWidth * 1.8, cols * 260 + CANVAS_PAD * 2);
  const h = Math.max(window.innerHeight * 1.8, Math.ceil(n / cols) * 340 + CANVAS_PAD * 2);
  return { w, h };
}

function initialPosition(livro, index, canvasW, canvasH) {
  // distribuição pseudoaleatória com seed por id+index
  const seed = (parseInt(livro.id) || index) * 17 + 3;
  const x = CANVAS_PAD + sr(seed, 0, canvasW - CANVAS_PAD * 2 - BOOK_W);
  const y = CANVAS_PAD + sr(seed + 1, 0, canvasH - CANVAS_PAD * 2 - BOOK_H_EST);
  const rot = sr(seed + 2, -7, 7);
  return { x, y, rot };
}

function createBookEl(livro, pos) {
  const el = document.createElement('div');
  el.className = 'book';
  el.dataset.id = livro.id;
  el.style.left = pos.x + 'px';
  el.style.top = pos.y + 'px';
  el.style.transform = `rotate(${pos.rot.toFixed(2)}deg)`;
  const coverId = livro.Cover || livro.cover;
  const coverUrl = directusImg(coverId, 240);
  const coverHtml = coverUrl
    ? `<img src="${coverUrl}" alt="${escHtml(livro.title || '')}" loading="lazy" decoding="async" draggable="false">`
    : `<div class="cover no-img">sem capa</div>`;
  el.innerHTML = `
    <div class="cover ${coverUrl ? '' : 'no-img'}">${coverUrl ? coverHtml : ''}</div>
    ${!coverUrl ? '' /* placeholder já tá dentro se no-img */ : ''}
    <div class="caption">
      ${escHtml(livro.title || 'sem título')}
      <small>${escHtml(livro.autor || '')}${livro.ano ? ' · ' + escHtml(livro.ano) : ''}</small>
    </div>
    <a class="open-link" href="livro.html?id=${livro.id}">abrir ↗</a>
  `;
  // fix: quando não tem cover, o innerHTML já cria <div class="cover no-img">...
  if (!coverUrl) {
    el.querySelector('.cover').innerHTML = 'sem capa';
  }
  return el;
}

/* --- drag & drop --- */
let dragged = null;
let dragOffsetX = 0, dragOffsetY = 0;
let dragStartPosSaved = false;
let autoScrollRAF = 0;
let edgeDx = 0, edgeDy = 0;
let lastPointerX = 0, lastPointerY = 0;

function pointerDown(e) {
  const bookEl = e.target.closest('.book');
  if (!bookEl) return;
  // não inicia drag se clicou no link "abrir ↗"
  if (e.target.closest('.open-link')) return;
  e.preventDefault();
  const evt = e.touches ? e.touches[0] : e;
  const rect = bookEl.getBoundingClientRect();
  dragOffsetX = evt.clientX - rect.left;
  dragOffsetY = evt.clientY - rect.top;
  dragged = bookEl;
  dragStartPosSaved = false;
  bookEl.classList.add('dragging');
  document.body.classList.add('dragging');
  lastPointerX = evt.clientX;
  lastPointerY = evt.clientY;
}

function pointerMove(e) {
  if (!dragged) return;
  const evt = e.touches ? e.touches[0] : e;
  lastPointerX = evt.clientX;
  lastPointerY = evt.clientY;
  // posição no canvas (viewport + scroll - offset)
  const canvasX = evt.clientX + window.scrollX - dragOffsetX;
  const canvasY = evt.clientY + window.scrollY - dragOffsetY;
  dragged.style.left = canvasX + 'px';
  dragged.style.top = canvasY + 'px';
  checkEdgeScroll(evt.clientX, evt.clientY);
  if (e.touches) e.preventDefault();
}

function pointerUp() {
  if (!dragged) return;
  const id = dragged.dataset.id;
  const x = parseFloat(dragged.style.left);
  const y = parseFloat(dragged.style.top);
  const m = dragged.style.transform.match(/rotate\(([^)]+)deg\)/);
  const rot = m ? parseFloat(m[1]) : 0;
  savePos(id, x, y, rot);
  dragged.classList.remove('dragging');
  document.body.classList.remove('dragging');
  dragged = null;
  stopEdgeScroll();
}

/* auto-scroll quando drag perto da borda */
const EDGE = 110;
const MAX_SPEED = 22;

function checkEdgeScroll(cx, cy) {
  const w = window.innerWidth, h = window.innerHeight;
  edgeDx = 0; edgeDy = 0;
  if (cx < EDGE)       edgeDx = -Math.round((EDGE - cx) / EDGE * MAX_SPEED);
  else if (cx > w - EDGE) edgeDx = Math.round((cx - (w - EDGE)) / EDGE * MAX_SPEED);
  if (cy < EDGE)       edgeDy = -Math.round((EDGE - cy) / EDGE * MAX_SPEED);
  else if (cy > h - EDGE) edgeDy = Math.round((cy - (h - EDGE)) / EDGE * MAX_SPEED);
  if ((edgeDx || edgeDy) && !autoScrollRAF) {
    const tick = () => {
      if (!dragged || (!edgeDx && !edgeDy)) { autoScrollRAF = 0; return; }
      window.scrollBy(edgeDx, edgeDy);
      // ao scrollar, atualiza posição do livro pra seguir o cursor
      if (dragged) {
        const canvasX = lastPointerX + window.scrollX - dragOffsetX;
        const canvasY = lastPointerY + window.scrollY - dragOffsetY;
        dragged.style.left = canvasX + 'px';
        dragged.style.top = canvasY + 'px';
      }
      autoScrollRAF = requestAnimationFrame(tick);
    };
    autoScrollRAF = requestAnimationFrame(tick);
  }
}

function stopEdgeScroll() {
  edgeDx = 0; edgeDy = 0;
  if (autoScrollRAF) { cancelAnimationFrame(autoScrollRAF); autoScrollRAF = 0; }
}

/* --- init --- */
async function init() {
  const livros = await fetchAllLivros();
  if (!livros.length) {
    document.getElementById('book-count').textContent = '0';
    document.querySelector('.hud-bl').innerHTML = '(nenhum livro carregou — directus offline?)';
    return;
  }

  const { w: canvasW, h: canvasH } = computeCanvasSize(livros.length);
  const canvas = document.getElementById('canvas');
  canvas.style.width = canvasW + 'px';
  canvas.style.height = canvasH + 'px';

  livros.forEach((l, i) => {
    const saved = positions[l.id];
    const pos = saved || initialPosition(l, i, canvasW, canvasH);
    canvas.appendChild(createBookEl(l, pos));
  });

  document.getElementById('book-count').textContent = livros.length;

  // scroll inicial pro centro do canvas (deixa mais "no meio da biblioteca")
  window.scrollTo({
    left: (canvasW - window.innerWidth) / 2,
    top: (canvasH - window.innerHeight) / 2,
    behavior: 'instant'
  });

  // show intro banner e esconde em 2.5s
  const intro = document.getElementById('intro');
  requestAnimationFrame(() => intro.classList.add('on'));
  setTimeout(() => intro.classList.remove('on'), 2600);

  // listeners globais
  document.addEventListener('mousedown', pointerDown);
  document.addEventListener('mousemove', pointerMove);
  document.addEventListener('mouseup', pointerUp);
  document.addEventListener('touchstart', pointerDown, { passive: false });
  document.addEventListener('touchmove', pointerMove, { passive: false });
  document.addEventListener('touchend', pointerUp);

  // reset
  document.getElementById('reset-btn').addEventListener('click', () => {
    if (!confirm('apagar posições customizadas e voltar ao layout inicial?')) return;
    try { localStorage.removeItem(POS_KEY); } catch(e) {}
    positions = {};
    location.reload();
  });
}

init();
</script>
</body>
</html>
