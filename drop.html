<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>daniel lameira — Drop</title>
<style>
@font-face { font-family: 'OffBit'; src: url('fonts/OffBit-101Bold.otf') format('opentype'); }
@font-face { font-family: 'AuthenticSans'; src: url('fonts/60b11050899817005a227b9e.otf') format('opentype'); }
@font-face { font-family: 'GTPressura'; src: url('fonts/gt-pressura-mono-regular.ttf') format('truetype'); }
@font-face { font-family: 'MyriadPro'; src: url('fonts/MyriadPro-Regular.otf') format('opentype'); }

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a08; --fg: #e8e8d8; --red: #E8320A;
  --green: #00ff41; --blue: #3355ff; --purple: #cc44ff; --yellow: #f2e04a;
  --f-title: 'AuthenticSans', 'OffBit', monospace;
  --f-ui: 'GTPressura', monospace;
  --f-body: 'MyriadPro', sans-serif;
}

html { overflow-x: hidden; }
body { background: var(--bg); color: var(--fg); font-family: var(--f-body); overflow-x: hidden; cursor: crosshair; }

body::before {
  content: ''; position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.04) 3px, rgba(0,0,0,0.04) 4px);
  pointer-events: none; z-index: 997;
}

/* NAV */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 16px 24px; background: var(--bg);
  border-bottom: 1px solid rgba(232,50,10,0.25);
}
.nav-logo { display: flex; flex-direction: column; gap: 3px; }
.nav-logo-title { font-family: var(--f-title); font-size: 26px; color: var(--red); letter-spacing: 0.06em; line-height: 1; text-decoration: none; }
.nav-logo-sub { font-family: var(--f-ui); font-size: 8.5px; color: rgba(232,50,10,0.55); letter-spacing: 0.04em; line-height: 1.45; }
.nav-links { display: flex; align-items: center; list-style: none; gap: 0; flex-wrap: wrap; justify-content: flex-end; }
.nav-sep { color: var(--red); font-size: 11px; padding: 0 5px; opacity: 0.6; }
.nav-links a { font-family: var(--f-ui); font-size: 11.5px; color: var(--fg); text-decoration: none; letter-spacing: 0.06em; padding: 2px 4px; transition: color 0.15s; }
.nav-links a:hover { color: var(--red); }
.nav-links a.active { color: var(--red); }

/* LAYOUT */
.drop-wrap {
  padding: 96px 24px 100px;
  display: grid;
  grid-template-columns: 1fr 320px;
  gap: 48px;
  max-width: 1200px;
  margin: 0 auto;
  align-items: start;
}

/* COLUNA PRINCIPAL */
.drop-main {}

.back-btn {
  display: inline-block;
  font-family: var(--f-ui);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--fg);
  text-decoration: none;
  border: 1px solid var(--red);
  padding: 10px 28px;
  margin-bottom: 48px;
  transition: background 0.15s, color 0.15s;
}
.back-btn:hover { background: var(--red); }

/* HEADER DO DROP */
.drop-header {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 32px;
  margin-bottom: 48px;
  align-items: start;
}

.drop-cover-large {
  width: 180px;
  flex-shrink: 0;
}

.drop-cover-img {
  width: 180px;
  height: auto;
  display: block;
  filter: contrast(1.1) brightness(0.9) saturate(0.6);
  border: 1px solid rgba(255,255,255,0.08);
}

.drop-cover-placeholder {
  width: 180px;
  aspect-ratio: 2/3;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--f-ui);
  font-size: 9px;
  letter-spacing: 0.15em;
  color: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.08);
}

.drop-cover-placeholder.type-book    { background: #1a1208; }
.drop-cover-placeholder.type-album   { background: #08121a; aspect-ratio: 1; }
.drop-cover-placeholder.type-podcast { background: #120a1a; aspect-ratio: 1; }
.drop-cover-placeholder.type-film    { background: #0a1a0a; aspect-ratio: 16/10; }
.drop-cover-placeholder.type-musica  { background: #081a1a; }
.drop-cover-placeholder.type-video   { background: #1a0c00; aspect-ratio: 16/10; }
.drop-cover-placeholder.type-canal   { background: #1a0404; aspect-ratio: 16/10; }
.drop-cover-placeholder.type-jogo    { background: #0a1a04; aspect-ratio: 1; }
.drop-cover-placeholder.type-artista { background: #1a0410; }
.drop-cover-placeholder.type-ensaio  { background: #14120a; }

.drop-header-info {
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding-top: 4px;
}

.drop-type-badge {
  display: inline-block;
  font-family: var(--f-ui);
  font-size: 8px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  padding: 4px 10px;
  width: fit-content;
}
.drop-type-badge.type-book    { color: var(--yellow); border: 1px solid var(--yellow); }
.drop-type-badge.type-album   { color: var(--green);  border: 1px solid var(--green);  }
.drop-type-badge.type-podcast { color: var(--purple); border: 1px solid var(--purple); }
.drop-type-badge.type-film    { color: var(--blue);   border: 1px solid var(--blue);   }
.drop-type-badge.type-musica  { color: #00ccff; border: 1px solid #00ccff; }
.drop-type-badge.type-video   { color: #ff6600; border: 1px solid #ff6600; }
.drop-type-badge.type-canal   { color: #ff2020; border: 1px solid #ff2020; }
.drop-type-badge.type-jogo    { color: #7dff4f; border: 1px solid #7dff4f; }
.drop-type-badge.type-artista { color: #ff44bb; border: 1px solid #ff44bb; }
.drop-type-badge.type-ensaio  { color: #e0c090; border: 1px solid #e0c090; }

.drop-detail-title {
  font-family: var(--f-title);
  font-size: clamp(28px, 4vw, 54px);
  letter-spacing: 0.03em;
  line-height: 1.02;
}

.drop-detail-author {
  font-family: var(--f-ui);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(232,232,216,0.4);
}

.drop-author-link { color: inherit; text-decoration: none; border-bottom: 1px solid rgba(232,232,216,0.2); transition: border-color 0.15s, color 0.15s; }
.drop-author-link:hover { color: var(--fg); border-color: var(--fg); }

.drop-detail-note {
  font-family: var(--f-body);
  font-size: 17px;
  line-height: 1.65;
  color: rgba(232,232,216,0.6);
  border-left: 2px solid var(--red);
  padding-left: 16px;
  margin-top: 4px;
}

.drop-external-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: var(--f-ui);
  font-size: 9px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--fg);
  text-decoration: none;
  border: 1px solid rgba(232,232,216,0.2);
  padding: 10px 20px;
  margin-top: 8px;
  transition: border-color 0.15s, color 0.15s;
  width: fit-content;
}
.drop-external-btn:hover { border-color: var(--red); color: var(--red); }

/* CORPO DO TEXTO */
.drop-body {
  font-family: var(--f-body);
  font-size: 20px;
  line-height: 1.8;
  color: rgba(232,232,216,0.78);
}

.drop-body p { margin-bottom: 24px; }
.drop-body p:last-child { margin-bottom: 0; }
.drop-body strong { color: var(--fg); font-weight: 600; }
.drop-body a { color: var(--red); text-decoration: none; border-bottom: 1px solid rgba(232,50,10,0.3); }
.drop-body a:hover { border-color: var(--red); }
.drop-body h2, .drop-body h3 {
  font-family: var(--f-title);
  letter-spacing: 0.04em;
  margin: 36px 0 16px;
  color: var(--fg);
}
.drop-body h2 { font-size: 28px; }
.drop-body h3 { font-size: 22px; }

/* SIDEBAR — outros drops */
.drop-sidebar {
  position: sticky;
  top: 88px;
}

.sidebar-label {
  font-family: var(--f-ui);
  font-size: 8.5px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(232,50,10,0.5);
  margin-bottom: 14px;
}

/* filtros na sidebar */
.sidebar-filter-bar {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 16px;
}

.sidebar-filter-btn {
  font-family: var(--f-ui);
  font-size: 8px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 4px 10px;
  border: 1px solid rgba(232,50,10,0.2);
  color: rgba(232,232,216,0.3);
  background: none;
  cursor: crosshair;
  transition: all 0.15s;
}
.sidebar-filter-btn:hover { border-color: var(--red); color: var(--red); }
.sidebar-filter-btn[data-type="all"].active     { border-color: var(--fg);     color: var(--fg); }
.sidebar-filter-btn[data-type="book"].active    { border-color: var(--yellow); color: var(--yellow); }
.sidebar-filter-btn[data-type="album"].active   { border-color: var(--green);  color: var(--green); }
.sidebar-filter-btn[data-type="podcast"].active { border-color: var(--purple); color: var(--purple); }
.sidebar-filter-btn[data-type="film"].active    { border-color: var(--blue);   color: var(--blue); }
.sidebar-filter-btn[data-type="musica"].active  { border-color: #00ccff; color: #00ccff; }
.sidebar-filter-btn[data-type="video"].active   { border-color: #ff6600; color: #ff6600; }
.sidebar-filter-btn[data-type="canal"].active   { border-color: #ff2020; color: #ff2020; }
.sidebar-filter-btn[data-type="jogo"].active    { border-color: #7dff4f; color: #7dff4f; }
.sidebar-filter-btn[data-type="artista"].active { border-color: #ff44bb; color: #ff44bb; }
.sidebar-filter-btn[data-type="ensaio"].active  { border-color: #e0c090; color: #e0c090; }

/* lista de drops na sidebar */
.sidebar-drop-list {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.sidebar-drop-item {
  display: grid;
  grid-template-columns: 52px 1fr;
  gap: 12px;
  padding: 10px;
  text-decoration: none;
  color: var(--fg);
  background: #111109;
  border: 1px solid rgba(255,255,255,0.04);
  cursor: crosshair;
  transition: border-color 0.15s;
  align-items: center;
}
.sidebar-drop-item:hover { border-color: var(--red); }
.sidebar-drop-item.current { border-color: rgba(204,68,255,0.4); }

.sidebar-drop-thumb {
  width: 52px;
  height: 52px;
  object-fit: cover;
  display: block;
  filter: contrast(1.1) saturate(0.5);
}

.sidebar-drop-thumb-placeholder {
  width: 52px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--f-ui);
  font-size: 7px;
  letter-spacing: 0.1em;
  color: rgba(255,255,255,0.1);
}
.sidebar-drop-thumb-placeholder.type-book    { background: #1a1208; }
.sidebar-drop-thumb-placeholder.type-album   { background: #08121a; }
.sidebar-drop-thumb-placeholder.type-podcast { background: #120a1a; }
.sidebar-drop-thumb-placeholder.type-film    { background: #0a1a0a; }
.sidebar-drop-thumb-placeholder.type-musica  { background: #081a1a; }
.sidebar-drop-thumb-placeholder.type-video   { background: #1a0c00; }
.sidebar-drop-thumb-placeholder.type-canal   { background: #1a0404; }
.sidebar-drop-thumb-placeholder.type-jogo    { background: #0a1a04; }
.sidebar-drop-thumb-placeholder.type-artista { background: #1a0410; }
.sidebar-drop-thumb-placeholder.type-ensaio  { background: #14120a; }

.sidebar-drop-info {}
.sidebar-drop-title {
  font-family: var(--f-ui);
  font-size: 11px;
  line-height: 1.2;
  margin-bottom: 3px;
}
.sidebar-drop-author {
  font-family: var(--f-ui);
  font-size: 8px;
  letter-spacing: 0.08em;
  color: rgba(232,232,216,0.3);
  text-transform: uppercase;
}

/* FOOTER */
footer {
  border-top: 1px solid rgba(232,50,10,0.18);
  padding: 18px 24px;
  display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px;
}
footer span { font-family: var(--f-ui); font-size: 8.5px; letter-spacing: 0.13em; text-transform: uppercase; color: rgba(232,232,216,0.14); }

/* RESPONSIVE */
@media (max-width: 900px) {
  .drop-wrap { grid-template-columns: 1fr; }
  .drop-sidebar { position: static; margin-top: 48px; border-top: 1px solid rgba(232,50,10,0.15); padding-top: 40px; }
}
@media (max-width: 520px) {
  .drop-header { grid-template-columns: 1fr; }
  .drop-cover-large { width: 100%; }
  .drop-cover-img, .drop-cover-placeholder { width: 100%; }
}
</style>

<script>

const DIRECTUS = 'https://directus-production-afdd.up.railway.app';

function directusImg(id, width) {
  if (!id) return null;
  const transforms = encodeURIComponent(JSON.stringify([['sharpen']]));
  return `${DIRECTUS}/assets/${id}?${width ? 'width=' + width + '&' : ''}quality=90&format=webp&transforms=${transforms}`;
}

// Mapeia tipos do Directus (português) para classes CSS
function typeClass(type) {
  const map = { livro: 'book', album: 'album', podcast: 'podcast', filme: 'film', outro: 'book', musica: 'musica', video: 'video', canal: 'canal', jogo: 'jogo', artista: 'artista', ensaio: 'ensaio' };
  return 'type-' + (map[type] || 'book');
}

function typeLabel(type) {
  const map = { livro: 'Livro', album: 'Álbum', podcast: 'Podcast', filme: 'Filme', outro: 'Outro', musica: 'Música', video: 'Vídeo', canal: 'Canal', jogo: 'Jogo', artista: 'Artista', ensaio: 'Ensaio' };
  return map[type] || type || '';
}

const TYPE_LABELS = { all: 'Todos', livro: 'Livros', album: 'Álbuns', podcast: 'Podcasts', filme: 'Filmes', outro: 'Outros', musica: 'Músicas', video: 'Vídeos', canal: 'Canais', jogo: 'Jogos', artista: 'Artistas', ensaio: 'Ensaios' };

let allDrops = [];
let currentId = '';
let activeType = 'all';

function coverHtml(drop, size = 'thumb') {
  const cls = size === 'thumb' ? 'sidebar-drop-thumb' : 'drop-cover-img';
  const phCls = size === 'thumb' ? 'sidebar-drop-thumb-placeholder' : 'drop-cover-placeholder';
  const tc = typeClass(drop.type);
  if (drop.cover) {
    return `<img src="${directusImg(drop.cover, size === 'thumb' ? 120 : 400)}" alt="${drop.title || ''}" class="${cls}">`;
  }
  return `<div class="${phCls} ${tc}">${typeLabel(drop.type)}</div>`;
}

// ── SIDEBAR ────────────────────────────────────────────────────────────────

function renderSidebarFilters(drops) {
  const bar = document.getElementById('sidebar-filter-bar');
  const types = ['all', ...new Set(drops.map(d => d.type).filter(Boolean))];
  bar.innerHTML = '';
  types.forEach(type => {
    const btn = document.createElement('button');
    btn.className = `sidebar-filter-btn${type === activeType ? ' active' : ''}`;
    btn.dataset.type = type;
    btn.textContent = TYPE_LABELS[type] || type;
    btn.addEventListener('click', () => {
      activeType = type;
      document.querySelectorAll('.sidebar-filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderSidebarList(allDrops);
    });
    bar.appendChild(btn);
  });
}

function renderSidebarList(drops) {
  const list = document.getElementById('sidebar-drop-list');
  const filtered = activeType === 'all'
    ? drops.filter(d => String(d.id) !== String(currentId))
    : drops.filter(d => d.type === activeType && String(d.id) !== String(currentId));

  list.innerHTML = '';
  if (filtered.length === 0) {
    list.innerHTML = '<div style="font-family:var(--f-ui);font-size:9px;letter-spacing:0.12em;color:rgba(232,232,216,0.18);padding:16px 0;">nenhum drop</div>';
    return;
  }

  filtered.forEach(drop => {
    const a = document.createElement('a');
    a.href = `drop.html?id=${drop.id}`;
    a.className = 'sidebar-drop-item';
    a.innerHTML = `
      ${coverHtml(drop, 'thumb')}
      <div class="sidebar-drop-info">
        <div class="sidebar-drop-title">${drop.title || ''}</div>
        <div class="sidebar-drop-author">${drop.author || ''}</div>
      </div>`;
    list.appendChild(a);
  });
}

// Renderiza markdown simples (espelha previewMd do admin.html)
function renderMarkdown(str) {
  if (!str) return '';
  const s = String(str);
  if (/<(p|br|div|h[1-6]|strong|em|b|i|a\s|ul|ol|li|blockquote|img|figure|hr)[\s>/]/i.test(s)) {
    return s;
  }
  return '<p>' + s
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/`(.+?)`/g,'<code>$1</code>')
    .replace(/\[(.+?)\]\((.+?)\)/g,'<a href="$2">$1</a>')
    .replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>')
    .replace(/^---$/gm,'<hr>')
    .replace(/\n\n/g,'</p><p>')
    .replace(/\n/g,'<br>') + '</p>';
}

// ── MAIN DROP ─────────────────────────────────────────────────────────────

async function loadDrop() {
  const params = new URLSearchParams(window.location.search);
  currentId = params.get('id') || '';

  if (!currentId) {
    document.getElementById('drop-content').innerHTML =
      '<p style="color:rgba(232,232,216,0.4);font-family:var(--f-ui);font-size:11px;letter-spacing:0.1em;">drop não encontrado.</p>';
    return;
  }

  try {
    const res = await fetch(`${DIRECTUS}/items/drops/${currentId}?fields=*,colaboradores.papel,colaboradores.colaboradores_id.name,colaboradores.colaboradores_id.website`);
    if (!res.ok) throw new Error('not found');
    const data = await res.json();
    const drop = data.data;

    document.title = `daniel lameira – ${drop.title || 'Drop'}`;

    const tc = typeClass(drop.type);

    const externalBtn = drop.link
      ? `<a href="${drop.link}" target="_blank" rel="noopener" class="drop-external-btn">Acessar ↗</a>`
      : '';

    const bodyHtml = drop.note
      ? `<div class="drop-body">${renderMarkdown(drop.note)}</div>`
      : '';

    const coverEl = drop.cover
      ? `<img src="${directusImg(drop.cover, 400)}" alt="${drop.title || ''}" class="drop-cover-img">`
      : `<div class="drop-cover-placeholder ${tc}">${typeLabel(drop.type)}</div>`;

    // Autor: colaboradores M2M com fallback para campo texto
    const colabs = drop.colaboradores || [];
    const authorHtml = colabs.length > 0
      ? colabs.map(c => {
          const p = c.colaboradores_id || {};
          return p.name
            ? (p.website ? `<a href="${p.website}" target="_blank" rel="noopener" class="drop-author-link">${p.name}</a>` : p.name)
            : '';
        }).filter(Boolean).join(', ')
      : (drop.author || '');

    document.getElementById('drop-content').innerHTML = `
      <div class="drop-header">
        <div class="drop-cover-large">${coverEl}</div>
        <div class="drop-header-info">
          <span class="drop-type-badge ${tc}">${typeLabel(drop.type)}</span>
          <h1 class="drop-detail-title">${(drop.title || '').toUpperCase()}</h1>
          <div class="drop-detail-author">${authorHtml}</div>
          ${externalBtn}
        </div>
      </div>
      ${bodyHtml}
    `;

    // sidebar: filtro padrão = tipo do drop atual
    activeType = drop.type || 'all';
    renderSidebarFilters(allDrops);
    renderSidebarList(allDrops);

  } catch(e) {
    document.getElementById('drop-content').innerHTML =
      '<p style="color:rgba(232,232,216,0.4);font-family:var(--f-ui);font-size:11px;letter-spacing:0.1em;">drop não encontrado.</p>';
  }
}

async function init() {
  // Busca todos os drops para a sidebar
  try {
    const res = await fetch(`${DIRECTUS}/items/drops?filter[status][_eq]=published&sort[]=order&limit=200&fields=id,title,author,type,cover`);
    const data = await res.json();
    allDrops = data.data || [];
  } catch(e) { allDrops = []; }

  await loadDrop();
}

init();
document.getElementById('nl-form-footer-drop')?.addEventListener('submit', function() {
  setTimeout(() => { this.style.display='none'; document.getElementById('nl-ok-footer-drop').style.display='inline'; }, 600);
});
</script>

</body>
