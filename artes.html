<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artes — Daniel Lameira</title>
<link rel="preconnect" href="https://directus-production-afdd.up.railway.app" crossorigin>
<style>
@font-face { font-family: 'Neue Haas Grotesk'; font-weight: 400; font-style: normal; font-display: swap; src: url('fonts/NeueHaasDisplay-Roman.ttf') format('truetype'); }
@font-face { font-family: 'Neue Haas Grotesk'; font-weight: 700; font-style: normal; font-display: swap; src: url('fonts/NeueHaasDisplay-Bold.ttf') format('truetype'); }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --f: 'Neue Haas Grotesk', 'Helvetica Neue', Helvetica, Arial, sans-serif; }
html, body { background: #fff; }
body { color: #111; font-family: var(--f); -webkit-font-smoothing: antialiased; }

.top { display: flex; align-items: center; gap: 16px; padding: 20px 28px 14px; flex-wrap: wrap; }
.back { display: inline-flex; text-decoration: none; color: #111; line-height: 1; }
.back svg { display: block; width: 28px; height: 22px; }
.brand { font-weight: 700; font-size: 16px; letter-spacing: 0.04em; color: #111; text-decoration: none; white-space: nowrap; }
.topnav { font-size: 15px; color: #111; }
.topnav a { color: #111; text-decoration: underline; text-underline-offset: 2px; text-decoration-thickness: 1px; }
.topnav a:hover { color: #0000EE; }

.wrap { max-width: 1100px; margin: 0 auto; padding: 40px 28px 100px; }
.h1 { font-weight: 700; font-size: clamp(30px, 5vw, 48px); letter-spacing: 0.01em; margin-bottom: 36px; }
.loading { padding: 60px 0; text-align: center; font-size: 13px; letter-spacing: 0.1em; color: #aaa; }

.grid { column-width: 250px; column-gap: 30px; }
.item { text-decoration: none; color: #111; display: inline-block; width: 100%; margin-bottom: 34px; break-inside: avoid; }
.media { width: 100%; overflow: hidden; line-height: 0; }
.media img, .media video { width: 100%; height: auto; display: block; transition: opacity 0.15s; }
.item:hover .media img, .item:hover .media video { opacity: 0.82; }
.cap { margin-top: 10px; line-height: 1.3; }
.cap .t { font-weight: 700; font-size: 15px; line-height: 1.2; }
.cap .m { font-size: 12px; color: #888; margin-top: 3px; letter-spacing: 0.02em; }
</style>
<script>try{document.documentElement.dataset.theme=localStorage.theme||(matchMedia('(prefers-color-scheme:dark)').matches?"dark":"light")}catch(e){}</script>
<link rel="stylesheet" href="theme.css">
</head>
<body>

<header class="top">
  <a class="back" href="index.html" aria-label="início">
    <svg viewBox="0 0 34 28" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M13 4 L3 14 L13 24 M3 14 H32" stroke="#111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </a>
  <a class="brand" href="index.html">DANIEL LAMEIRA</a>
  <nav class="topnav"><a href="livros.html">livros</a>, <a href="textos.html">textos</a>, <a href="artes.html">artes</a> e <a href="sobre.html">sobre</a></nav>
</header>

<div class="wrap">
  <h1 class="h1">Artes</h1>
  <div id="grid"><div class="loading">carregando…</div></div>
</div>

<script>
const DIRECTUS = 'https://directus-production-afdd.up.railway.app';
function img(id, w) { return `${DIRECTUS}/assets/${id}?${w ? 'width=' + w + '&' : ''}quality=85&format=webp`; }
async function init() {
  const box = document.getElementById('grid');
  try {
    const r = await fetch(`${DIRECTUS}/items/obras?filter[status][_eq]=published&sort[]=order&limit=200&fields=id,title,type,year,image,video`);
    const obras = (await r.json()).data || [];
    if (!obras.length) { box.innerHTML = '<div class="loading">nada por aqui ainda</div>'; return; }
    box.className = 'grid';
    box.innerHTML = obras.map(o => {
      let media;
      if (o.image) media = `<img src="${img(o.image, 600)}" alt="${o.title || ''}" loading="lazy">`;
      else if (o.video) media = `<video src="${DIRECTUS}/assets/${o.video}" muted loop autoplay playsinline preload="auto"></video>`;
      else media = '';
      const meta = [o.type, o.year].filter(Boolean).join(' · ');
      return `<a class="item" href="obra.html?id=${o.id}">
        <div class="media">${media}</div>
        <div class="cap"><div class="t">${o.title || ''}</div>${meta ? `<div class="m">${meta}</div>` : ''}</div>
      </a>`;
    }).join('');
  } catch(e) { box.innerHTML = '<div class="loading">erro ao carregar</div>'; }
}
init();
</script>
<script src="theme.js"></script>
</body>
</html>
