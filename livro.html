<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Livro — Daniel Lameira</title>
<link rel="preconnect" href="https://directus-production-afdd.up.railway.app" crossorigin>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,600;1,6..72,400&display=swap" rel="stylesheet">
<style>
@font-face { font-family: 'Neue Haas Grotesk'; font-weight: 400; font-style: normal; font-display: swap; src: url('fonts/NeueHaasDisplay-Roman.ttf') format('truetype'); }
@font-face { font-family: 'Neue Haas Grotesk'; font-weight: 700; font-style: normal; font-display: swap; src: url('fonts/NeueHaasDisplay-Bold.ttf') format('truetype'); }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --f: 'Neue Haas Grotesk', 'Helvetica Neue', Helvetica, Arial, sans-serif; }
html, body { background: #fff; }
body { color: #111; font-family: var(--f); -webkit-font-smoothing: antialiased; }

/* HEADER */
.top { display: flex; align-items: center; gap: 16px; padding: 20px 28px 14px; flex-wrap: wrap; }
.back { display: inline-flex; text-decoration: none; color: #111; line-height: 1; }
.back svg { display: block; width: 28px; height: 22px; }
.brand { font-weight: 700; font-size: 16px; letter-spacing: 0.04em; color: #111; text-decoration: none; white-space: nowrap; }
.topnav { font-size: 15px; color: #111; }
.topnav a { color: #111; text-decoration: underline; text-underline-offset: 2px; text-decoration-thickness: 1px; }
.topnav a:hover { color: #0000EE; }

/* WRAP */
.wrap { max-width: 920px; margin: 0 auto; padding: 30px 28px 100px; }
.loading { padding: 80px 0; text-align: center; font-size: 13px; letter-spacing: 0.1em; color: #aaa; }

/* BOOK HEADER */
.book { display: grid; grid-template-columns: 260px 1fr; gap: 48px; align-items: start; }
.cover img { width: 100%; display: block; box-shadow: 0 2px 14px rgba(0,0,0,0.12); }
.cover .ph { width: 100%; aspect-ratio: 2/3; background: #f0f0ee; display: flex; align-items: center; justify-content: center; font-size: 11px; letter-spacing: 0.1em; color: #bbb; }
.info { display: flex; flex-direction: column; gap: 14px; padding-top: 4px; }
.editora { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: #888; }
.title { font-weight: 700; font-size: clamp(28px, 4vw, 46px); line-height: 1.04; letter-spacing: 0.01em; }
.subtitle { font-size: 16px; color: #555; line-height: 1.4; margin-top: -4px; }
.autor { font-size: 13px; letter-spacing: 0.04em; color: #333; }

.meta { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 14px 20px; padding-top: 16px; margin-top: 6px; border-top: 1px solid #e8e8e6; }
.meta-item { display: flex; flex-direction: column; gap: 3px; }
.meta-label { font-size: 9.5px; letter-spacing: 0.14em; text-transform: uppercase; color: #aaa; }
.meta-val { font-size: 13px; color: #222; }
.colab-link { color: #0000EE; text-decoration: none; }
.colab-link:hover { text-decoration: underline; }

.buy { display: inline-block; margin-top: 18px; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; color: #fff; background: #111; text-decoration: none; padding: 12px 26px; width: fit-content; transition: opacity 0.15s; }
.buy:hover { opacity: 0.82; }

/* SINOPSE */
.sec { margin-top: 56px; }
.sec-label { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: #aaa; margin-bottom: 14px; }
.prose { font-family: 'Newsreader', Georgia, 'Times New Roman', serif; font-optical-sizing: auto; font-size: 18px; line-height: 1.7; color: #222; max-width: 680px; }
.prose p { margin-bottom: 18px; }
.prose p:last-child { margin-bottom: 0; }
.prose a { color: #0000EE; }

/* OUTROS */
.outros { margin-top: 72px; border-top: 1px solid #e8e8e6; padding-top: 28px; }
.outros-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(86px, 1fr)); gap: 10px; margin-top: 14px; }
.thumb { aspect-ratio: 2/3; overflow: hidden; display: flex; align-items: center; justify-content: center; }
.thumb img { max-width: 100%; max-height: 100%; width: auto; height: auto; object-fit: contain; display: block; transition: opacity 0.15s; }
.thumb:hover img { opacity: 0.78; }

@media (max-width: 640px) {
  .book { grid-template-columns: 1fr; gap: 28px; }
  .cover { max-width: 240px; }
}
</style>
</head>
<body>

<header class="top">
  <a class="back" href="index.html" aria-label="início">
    <svg viewBox="0 0 34 28" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M13 4 L3 14 L13 24 M3 14 H32" stroke="#111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </a>
  <a class="brand" href="index.html">DANIEL LAMEIRA</a>
  <nav class="topnav"><a href="livros.html">livros</a>, <a href="textos.html">textos</a>, <a href="artes.html">artes</a> e <a href="sobre.html">sobre</a></nav>
</header>

<div class="wrap">
  <div id="content"><div class="loading">carregando…</div></div>
</div>

<script>
const DIRECTUS = 'https://directus-production-afdd.up.railway.app';
function directusImg(id, w) {
  if (!id) return null;
  return `${DIRECTUS}/assets/${id}?${w ? 'width=' + w + '&' : ''}quality=90&format=webp`;
}
function renderMarkdown(str) {
  if (!str) return '';
  const s = String(str);
  if (/<(p|br|div|h[1-6]|strong|em|b|i|a\s|ul|ol|li|blockquote|img|figure|hr)[\s>/]/i.test(s)) return s;
  return '<p>' + s
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/\[(.+?)\]\((.+?)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>')
    .replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>') + '</p>';
}
const PAPEL = { tradutor:'Tradução', capista:'Capa', arte_de_capa:'Arte de capa', artes_internas:'Artes internas', autor:'Autor', prefacio:'Prefácio', posfacio:'Posfácio', organizacao:'Organização' };

function metaHtml(l) {
  const items = [];
  if (l.ano) items.push(['Ano', l.ano]);
  if (l.paginas) items.push(['Páginas', l.paginas]);
  if (l.formato) items.push(['Formato', l.formato]);
  if (l.colecao) items.push(['Coleção', l.colecao]);
  if (l.isbn_fisico) items.push(['ISBN', l.isbn_fisico]);
  // ficha técnica (colaboradores agrupados por papel) ou campos texto
  const colabs = l.colaboradores || [];
  if (colabs.length) {
    const by = {};
    colabs.forEach(c => { const p = c.papel || 'colaborador'; (by[p] ||= []).push(c); });
    Object.entries(by).forEach(([p, cs]) => {
      const val = cs.map(c => { const x = c.colaboradores_id || {}; if (!x.name) return ''; return x.website ? `<a class="colab-link" href="${x.website}" target="_blank" rel="noopener">${x.name}</a>` : x.name; }).filter(Boolean).join(', ');
      if (val) items.push([PAPEL[p] || p, val]);
    });
  } else {
    if (l.tradutor) items.push(['Tradução', l.tradutor]);
    if (l.capista) items.push(['Capa', l.capista]);
    if (l.arte_de_capa) items.push(['Arte de capa', l.arte_de_capa]);
    if (l.artes_internas) items.push(['Artes internas', l.artes_internas]);
  }
  return items.map(([k, v]) => `<div class="meta-item"><span class="meta-label">${k}</span><span class="meta-val">${v}</span></div>`).join('');
}

async function init() {
  const id = new URLSearchParams(location.search).get('id');
  const box = document.getElementById('content');
  if (!id) { box.innerHTML = '<div class="loading">livro não encontrado</div>'; return; }
  try {
    const [lr, or_] = await Promise.all([
      fetch(`${DIRECTUS}/items/livros/${id}?fields=*,colaboradores.papel,colaboradores.colaboradores_id.name,colaboradores.colaboradores_id.website`).then(r => r.json()),
      fetch(`${DIRECTUS}/items/livros?filter[status][_eq]=published&sort[]=sort&sort[]=-ano&limit=18&fields=id,title,Cover`).then(r => r.json())
    ]);
    const l = lr.data;
    if (!l) { box.innerHTML = '<div class="loading">livro não encontrado</div>'; return; }
    document.title = `${l.title} — Daniel Lameira`;
    const cov = l.Cover || l.cover;
    box.innerHTML = `
      <div class="book">
        <div class="cover">${cov ? `<img src="${directusImg(cov, 600)}" alt="${l.title || ''}">` : `<div class="ph">capa</div>`}</div>
        <div class="info">
          ${l.editora ? `<div class="editora">${l.editora}</div>` : ''}
          <h1 class="title">${l.title || ''}</h1>
          ${l.subtitle ? `<div class="subtitle">${l.subtitle}</div>` : ''}
          ${l.autor ? `<div class="autor">${l.autor}</div>` : ''}
          <div class="meta">${metaHtml(l)}</div>
          ${l.link_compra ? `<a class="buy" href="${l.link_compra}" target="_blank" rel="noopener">Comprar ↗</a>` : ''}
        </div>
      </div>
      ${l.sinopse ? `<div class="sec"><div class="sec-label">sinopse</div><div class="prose">${renderMarkdown(l.sinopse)}</div></div>` : ''}
      ${l.notas ? `<div class="sec"><div class="sec-label">bastidores</div><div class="prose">${renderMarkdown(l.notas)}</div></div>` : ''}
      <div class="outros">
        <div class="sec-label">outros livros</div>
        <div class="outros-grid">${(or_.data || []).filter(x => String(x.id) !== String(id)).slice(0, 12).map(x => {
          const c = x.Cover || x.cover;
          return `<a class="thumb" href="livro.html?id=${x.id}" title="${x.title || ''}">${c ? `<img src="${directusImg(c, 180)}" alt="${x.title || ''}" loading="lazy">` : ''}</a>`;
        }).join('')}</div>
      </div>`;
  } catch(e) { box.innerHTML = '<div class="loading">erro ao carregar</div>'; }
}
init();
</script>
</body>
</html>
