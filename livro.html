<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Livro — Daniel Lameira</title>
<style>
@font-face { font-family: 'OffBit'; src: url('fonts/OffBit-101Bold.otf') format('opentype'); }
@font-face { font-family: 'AuthenticSans'; src: url('fonts/60b11050899817005a227b9e.otf') format('opentype'); }
@font-face { font-family: 'GTPressura'; src: url('fonts/gt-pressura-mono-regular.ttf') format('truetype'); }
@font-face { font-family: 'MyriadPro'; src: url('fonts/MyriadPro-Regular.otf') format('opentype'); }

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a08; --fg: #e8e8d8; --red: #E8320A;
  --green: #00ff41; --blue: #3355ff; --purple: #cc44ff; --yellow: #f2e04a;
  --f-title: 'AuthenticSans', 'OffBit', monospace;
  --f-ui: 'GTPressura', monospace;
  --f-body: 'MyriadPro', sans-serif;
}

html { overflow-x: hidden; }
body { background: var(--bg); color: var(--fg); font-family: var(--f-body); overflow-x: hidden; cursor: crosshair; }

body::before {
  content: ''; position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.04) 3px, rgba(0,0,0,0.04) 4px);
  pointer-events: none; z-index: 997;
}

/* NAV */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 16px 24px; background: var(--bg);
  border-bottom: 1px solid rgba(232,50,10,0.25);
}
.nav-logo { display: flex; flex-direction: column; gap: 3px; }
.nav-logo-title { font-family: var(--f-title); font-size: 26px; color: var(--red); letter-spacing: 0.06em; line-height: 1; text-decoration: none; }
.nav-logo-sub { font-family: var(--f-ui); font-size: 8.5px; color: rgba(232,50,10,0.55); letter-spacing: 0.04em; line-height: 1.45; }
.nav-links { display: flex; align-items: center; list-style: none; gap: 0; flex-wrap: wrap; justify-content: flex-end; }
.nav-sep { color: var(--red); font-size: 11px; padding: 0 5px; opacity: 0.6; }
.nav-links a { font-family: var(--f-ui); font-size: 11.5px; color: var(--fg); text-decoration: none; letter-spacing: 0.06em; padding: 2px 4px; transition: color 0.15s; }
.nav-links a:hover { color: var(--red); }
.nav-links a.active { color: var(--yellow); }

/* LAYOUT */
.livro-wrap {
  padding: 96px 24px 100px;
  display: grid;
  grid-template-columns: 1fr 280px;
  gap: 64px;
  max-width: 1100px;
  margin: 0 auto;
  align-items: start;
}

/* BACK */
.back-btn {
  display: inline-block;
  font-family: var(--f-ui);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--fg);
  text-decoration: none;
  border: 1px solid var(--yellow);
  padding: 10px 28px;
  margin-bottom: 48px;
  transition: background 0.15s, color 0.15s;
}
.back-btn:hover { background: var(--yellow); color: var(--bg); }

/* HEADER DO LIVRO */
.livro-header {
  display: grid;
  grid-template-columns: 220px 1fr;
  gap: 40px;
  margin-bottom: 56px;
  align-items: start;
}

.livro-cover-img {
  width: 220px;
  aspect-ratio: 2/3;
  object-fit: cover;
  display: block;
  filter: contrast(1.05) brightness(0.9);
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 8px 8px 0 rgba(242,224,74,0.08);
}

.livro-cover-placeholder {
  width: 220px;
  aspect-ratio: 2/3;
  background: #1a100a;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--f-ui);
  font-size: 9px;
  letter-spacing: 0.15em;
  color: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.06);
}

.livro-info {
  display: flex;
  flex-direction: column;
  gap: 14px;
  padding-top: 4px;
}

.livro-editora-badge {
  display: inline-block;
  font-family: var(--f-ui);
  font-size: 8px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--yellow);
  border: 1px solid rgba(242,224,74,0.4);
  padding: 4px 10px;
  width: fit-content;
}

.livro-title {
  font-family: var(--f-title);
  font-size: clamp(28px, 4vw, 56px);
  letter-spacing: 0.03em;
  line-height: 1.02;
}

.livro-subtitle {
  font-family: var(--f-ui);
  font-size: 11px;
  letter-spacing: 0.06em;
  color: rgba(232,232,216,0.4);
  line-height: 1.5;
  margin-top: -8px;
}

.livro-autor {
  font-family: var(--f-ui);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(232,232,216,0.5);
}

.livro-meta-row {
  display: flex;
  flex-wrap: wrap;
  gap: 24px;
  padding-top: 8px;
  border-top: 1px solid rgba(232,50,10,0.12);
}

.livro-meta-item {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.livro-meta-label {
  font-family: var(--f-ui);
  font-size: 7.5px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(242,224,74,0.4);
}

.livro-meta-val {
  font-family: var(--f-ui);
  font-size: 10px;
  letter-spacing: 0.06em;
  color: rgba(232,232,216,0.55);
}

.livro-buy-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: var(--f-ui);
  font-size: 9px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--bg);
  background: var(--yellow);
  text-decoration: none;
  padding: 12px 24px;
  margin-top: 8px;
  width: fit-content;
  transition: opacity 0.15s;
}
.livro-buy-btn:hover { opacity: 0.85; }

/* SINOPSE */
.livro-sinopse-label {
  font-family: var(--f-ui);
  font-size: 8.5px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(242,224,74,0.45);
  margin-bottom: 16px;
}

.livro-sinopse {
  font-family: var(--f-body);
  font-size: 18px;
  line-height: 1.8;
  color: rgba(232,232,216,0.7);
}

.livro-sinopse p { margin-bottom: 20px; }
.livro-sinopse p:last-child { margin-bottom: 0; }

/* SIDEBAR — outros livros */
.livro-sidebar {
  position: sticky;
  top: 88px;
}

.sidebar-label {
  font-family: var(--f-ui);
  font-size: 8.5px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(242,224,74,0.5);
  margin-bottom: 14px;
}

.sidebar-livros-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 3px;
}

.sidebar-livro-thumb {
  aspect-ratio: 2/3;
  overflow: hidden;
  cursor: crosshair;
  text-decoration: none;
  display: block;
  border: 1px solid rgba(255,255,255,0.04);
  transition: border-color 0.15s;
  position: relative;
}
.sidebar-livro-thumb:hover { border-color: var(--yellow); }
.sidebar-livro-thumb img { width: 100%; height: 100%; object-fit: cover; filter: contrast(1.05) saturate(0.7); display: block; }
.sidebar-livro-thumb-ph { width: 100%; height: 100%; background: #1a100a; display: flex; align-items: center; justify-content: center; font-family: var(--f-ui); font-size: 6px; letter-spacing: 0.1em; color: rgba(255,255,255,0.1); }

/* FOOTER */
footer {
  border-top: 1px solid rgba(232,50,10,0.18);
  padding: 18px 24px;
  display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px;
}
footer span { font-family: var(--f-ui); font-size: 8.5px; letter-spacing: 0.13em; text-transform: uppercase; color: rgba(232,232,216,0.14); }

/* RESPONSIVE */
@media (max-width: 900px) {
  .livro-wrap { grid-template-columns: 1fr; }
  .livro-sidebar { position: static; margin-top: 48px; border-top: 1px solid rgba(242,224,74,0.12); padding-top: 32px; }
}
@media (max-width: 560px) {
  .livro-header { grid-template-columns: 1fr; }
  .livro-cover-img, .livro-cover-placeholder { width: 100%; max-width: 280px; }
}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">
    <a href="index.html" class="nav-logo-title">WEIRD WIZ</a>
    <span class="nav-logo-sub">a blog about art creativity<br>tech books and consciousness</span>
  </div>
  <ul class="nav-links">
    <li><span class="nav-sep">..·</span><a href="index.html#escritos">Escritos</a></li>
    <li><span class="nav-sep">:·</span><a href="drops.html">Drops</a></li>
    <li><span class="nav-sep">.·.</span><a href="livros.html" class="active">Livros</a></li>
    <li><span class="nav-sep">-·.</span><a href="index.html#obras">Obras</a></li>
    <li><span class="nav-sep">-·</span><a href="index.html#me">Me</a></li>
  </ul>
</nav>

<div class="livro-wrap">

  <!-- COLUNA PRINCIPAL -->
  <main id="livro-main">
    <a href="livros.html" class="back-btn">← todos os livros</a>
    <div id="livro-content">
      <div style="font-family:var(--f-ui);font-size:10px;letter-spacing:0.1em;color:rgba(232,232,216,0.3);">carregando...</div>
    </div>
  </main>

  <!-- SIDEBAR -->
  <aside class="livro-sidebar" id="livro-sidebar">
    <div class="sidebar-label">— outros livros</div>
    <div class="sidebar-livros-grid" id="sidebar-livros-grid"></div>
    <a href="livros.html" style="display:block;margin-top:12px;font-family:var(--f-ui);font-size:8.5px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(242,224,74,0.4);text-decoration:none;">ver todos →</a>
  </aside>

</div>

<footer>
  <span>© 2025 Daniel Lameira</span>
  <span>made by hand</span>
</footer>

<script>
const DIRECTUS = 'https://directus-production-afdd.up.railway.app';

function directusImg(id, width) {
  if (!id) return null;
  return `${DIRECTUS}/assets/${id}${width ? '?width=' + width : ''}`;
}

async function fetchLivro(id) {
  const res = await fetch(`${DIRECTUS}/items/livros/${id}`);
  const data = await res.json();
  return data.data;
}

async function fetchOutros(currentId) {
  const res = await fetch(`${DIRECTUS}/items/livros?filter[status][_eq]=published&limit=30&fields=id,title,Cover`);
  const data = await res.json();
  return (data.data || []).filter(l => l.id !== currentId);
}

function formatMeta(livro) {
  const items = [];
  if (livro.editora)    items.push({ label: 'Editora',    val: livro.editora });
  if (livro.ano)        items.push({ label: 'Ano',        val: livro.ano });
  if (livro.paginas)    items.push({ label: 'Páginas',    val: livro.paginas });
  if (livro.colecao)    items.push({ label: 'Coleção',    val: livro.colecao });
  if (livro.formato)    items.push({ label: 'Formato',    val: livro.formato });
  if (livro.idioma)     items.push({ label: 'Idioma',     val: livro.idioma });
  if (livro.isbn_fisico) items.push({ label: 'ISBN Físico', val: livro.isbn_fisico });
  if (livro.isbn_ebook)  items.push({ label: 'ISBN Ebook',  val: livro.isbn_ebook });
  return items.map(i => `
    <div class="livro-meta-item">
      <span class="livro-meta-label">${i.label}</span>
      <span class="livro-meta-val">${i.val}</span>
    </div>`).join('');
}

function formatFichaTecnica(livro) {
  const items = [];
  if (livro.tradutor)       items.push({ label: 'Tradução',       val: livro.tradutor });
  if (livro.capista)        items.push({ label: 'Capa',           val: livro.capista });
  if (livro.arte_de_capa)   items.push({ label: 'Arte de capa',   val: livro.arte_de_capa });
  if (livro.artes_internas) items.push({ label: 'Artes internas', val: livro.artes_internas });
  if (items.length === 0) return '';
  return `
    <div style="padding-top:16px;border-top:1px solid rgba(232,50,10,0.12);">
      <div class="livro-sinopse-label" style="margin-bottom:12px;">— ficha técnica</div>
      <div class="livro-meta-row">
        ${items.map(i => `
          <div class="livro-meta-item">
            <span class="livro-meta-label">${i.label}</span>
            <span class="livro-meta-val">${i.val}</span>
          </div>`).join('')}
      </div>
    </div>`;
}

async function init() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');

  if (!id) {
    document.getElementById('livro-content').innerHTML =
      '<p style="font-family:var(--f-ui);font-size:11px;color:rgba(232,232,216,0.3);">Livro não encontrado.</p>';
    return;
  }

  const [livro, outros] = await Promise.all([
    fetchLivro(id),
    fetchOutros(parseInt(id))
  ]);

  if (!livro) {
    document.getElementById('livro-content').innerHTML =
      '<p style="font-family:var(--f-ui);font-size:11px;color:rgba(232,232,216,0.3);">Livro não encontrado.</p>';
    return;
  }

  document.title = `${livro.title} — Daniel Lameira`;

  const coverId = livro.Cover || livro.cover;
  const coverHtml = coverId
    ? `<img src="${directusImg(coverId, 600)}" alt="${livro.title}" class="livro-cover-img">`
    : `<div class="livro-cover-placeholder">capa</div>`;

  const buyBtn = livro.link_compra
    ? `<a href="${livro.link_compra}" target="_blank" rel="noopener" class="livro-buy-btn">Comprar ↗</a>`
    : '';

  const sinopseHtml = livro.sinopse
    ? `<div class="livro-sinopse-label">— sinopse</div>
       <div class="livro-sinopse">${livro.sinopse.split('\n\n').map(p => `<p>${p}</p>`).join('')}</div>`
    : '';

  const notasHtml = livro.notas
    ? `<div style="margin-top:48px;padding-top:24px;border-top:1px solid rgba(232,50,10,0.12);">
         <div class="livro-sinopse-label">— bastidores</div>
         <div class="livro-sinopse">${livro.notas.split('\n\n').map(p => `<p>${p}</p>`).join('')}</div>
       </div>`
    : '';

  document.getElementById('livro-content').innerHTML = `
    <div class="livro-header">
      <div>${coverHtml}</div>
      <div class="livro-info">
        ${livro.editora ? `<span class="livro-editora-badge">${livro.editora}</span>` : ''}
        <h1 class="livro-title">${(livro.title || '').toUpperCase()}</h1>
        ${livro.subtitle ? `<p class="livro-subtitle">${livro.subtitle}</p>` : ''}
        ${livro.autor ? `<div class="livro-autor">${livro.autor}</div>` : ''}
        <div class="livro-meta-row">${formatMeta(livro)}</div>
        ${formatFichaTecnica(livro)}
        ${buyBtn}
      </div>
    </div>
    ${sinopseHtml}
    ${notasHtml}
  `;

  // sidebar outros livros
  const grid = document.getElementById('sidebar-livros-grid');
  outros.slice(0, 12).forEach(l => {
    const covId = l.Cover || l.cover;
    const a = document.createElement('a');
    a.href = `livro.html?id=${l.id}`;
    a.className = 'sidebar-livro-thumb';
    a.title = l.title;
    a.innerHTML = covId
      ? `<img src="${directusImg(covId, 150)}" alt="${l.title}">`
      : `<div class="sidebar-livro-thumb-ph">capa</div>`;
    grid.appendChild(a);
  });
}

init();
</script>

</body>
</html>
