<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Obra — Daniel Lameira</title>
<link rel="preconnect" href="https://directus-production-afdd.up.railway.app" crossorigin>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,600;1,6..72,400&display=swap" rel="stylesheet">
<style>
@font-face { font-family: 'Neue Haas Grotesk'; font-weight: 400; font-style: normal; font-display: swap; src: url('fonts/NeueHaasDisplay-Roman.ttf') format('truetype'); }
@font-face { font-family: 'Neue Haas Grotesk'; font-weight: 700; font-style: normal; font-display: swap; src: url('fonts/NeueHaasDisplay-Bold.ttf') format('truetype'); }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --f: 'Neue Haas Grotesk', 'Helvetica Neue', Helvetica, Arial, sans-serif; }
html, body { background: #fff; }
body { color: #111; font-family: var(--f); -webkit-font-smoothing: antialiased; }

.top { display: flex; align-items: center; gap: 16px; padding: 20px 28px 14px; flex-wrap: wrap; }
.back { display: inline-flex; text-decoration: none; color: #111; line-height: 1; }
.back svg { display: block; width: 28px; height: 22px; }
.brand { font-weight: 700; font-size: 16px; letter-spacing: 0.04em; color: #111; text-decoration: none; white-space: nowrap; }
.topnav { font-size: 15px; color: #111; }
.topnav a { color: #111; text-decoration: underline; text-underline-offset: 2px; text-decoration-thickness: 1px; }
.topnav a:hover { color: #0000EE; }

.wrap { max-width: 860px; margin: 0 auto; padding: 36px 28px 100px; }
.loading { padding: 60px 0; text-align: center; font-size: 13px; letter-spacing: 0.1em; color: #aaa; }
.media { width: 100%; display: flex; align-items: center; justify-content: center; margin-bottom: 26px; }
.media img, .media video { max-width: 100%; max-height: 78vh; display: block; }
.title { font-weight: 700; font-size: clamp(26px, 4vw, 40px); line-height: 1.08; letter-spacing: 0.01em; }
.meta { font-size: 13px; color: #888; letter-spacing: 0.04em; margin-top: 8px; }
.desc { font-family: 'Newsreader', Georgia, 'Times New Roman', serif; font-optical-sizing: auto; font-size: 18px; line-height: 1.7; color: #222; margin-top: 20px; max-width: 640px; }
.link { display: inline-block; margin-top: 18px; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; color: #fff; background: #111; text-decoration: none; padding: 11px 24px; }
.link:hover { opacity: 0.82; }
</style>
</head>
<body>

<header class="top">
  <a class="back" href="artes.html" aria-label="artes">
    <svg viewBox="0 0 34 28" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M13 4 L3 14 L13 24 M3 14 H32" stroke="#111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </a>
  <a class="brand" href="index.html">DANIEL LAMEIRA</a>
  <nav class="topnav"><a href="livros.html">livros</a>, <a href="textos.html">textos</a>, <a href="artes.html">artes</a> e <a href="sobre.html">sobre</a></nav>
</header>

<div class="wrap">
  <div id="content"><div class="loading">carregando…</div></div>
</div>

<script>
const DIRECTUS = 'https://directus-production-afdd.up.railway.app';
function img(id, w) { return `${DIRECTUS}/assets/${id}?${w ? 'width=' + w + '&' : ''}quality=90&format=webp`; }
async function init() {
  const id = new URLSearchParams(location.search).get('id');
  const box = document.getElementById('content');
  if (!id) { box.innerHTML = '<div class="loading">obra não encontrada</div>'; return; }
  try {
    const o = (await fetch(`${DIRECTUS}/items/obras/${id}`).then(r => r.json())).data;
    if (!o) { box.innerHTML = '<div class="loading">obra não encontrada</div>'; return; }
    document.title = `${o.title} — Daniel Lameira`;
    let media = '';
    if (o.image) media = `<img src="${img(o.image, 1400)}" alt="${o.title || ''}">`;
    else if (o.video) media = `<video src="${DIRECTUS}/assets/${o.video}" controls playsinline></video>`;
    const meta = [o.type, o.year].filter(Boolean).join(' · ');
    box.innerHTML = `
      ${media ? `<div class="media">${media}</div>` : ''}
      <h1 class="title">${o.title || ''}</h1>
      ${meta ? `<div class="meta">${meta}</div>` : ''}
      ${o.description ? `<div class="desc">${o.description}</div>` : ''}
      ${o.link ? `<a class="link" href="${o.link}" target="_blank" rel="noopener">Ver ↗</a>` : ''}`;
  } catch(e) { box.innerHTML = '<div class="loading">erro ao carregar</div>'; }
}
init();
</script>
</body>
</html>
