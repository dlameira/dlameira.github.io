<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WEIRD WIZ — Obra</title>
<style>
@font-face { font-family: 'OffBit'; src: url('fonts/OffBit-101Bold.otf') format('opentype'); }
@font-face { font-family: 'AuthenticSans'; src: url('fonts/60b11050899817005a227b9e.otf') format('opentype'); }
@font-face { font-family: 'GTPressura'; src: url('fonts/gt-pressura-mono-regular.ttf') format('truetype'); }
@font-face { font-family: 'MyriadPro'; src: url('fonts/MyriadPro-Regular.otf') format('opentype'); }

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a08; --fg: #e8e8d8; --red: #E8320A;
  --green: #00ff41; --blue: #3355ff; --purple: #cc44ff; --yellow: #f2e04a;
  --f-title: 'AuthenticSans', 'OffBit', monospace;
  --f-ui: 'GTPressura', monospace;
  --f-body: 'MyriadPro', sans-serif;
}

html { overflow-x: hidden; }
body { background: var(--bg); color: var(--fg); font-family: var(--f-body); overflow-x: hidden; cursor: crosshair; }

body::before {
  content: ''; position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.04) 3px, rgba(0,0,0,0.04) 4px);
  pointer-events: none; z-index: 997;
}

/* NAV */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 16px 24px; background: var(--bg);
  border-bottom: 1px solid rgba(232,50,10,0.25);
}
.nav-logo { display: flex; flex-direction: column; gap: 3px; }
.nav-logo-title { font-family: var(--f-title); font-size: 26px; color: var(--red); letter-spacing: 0.06em; line-height: 1; text-decoration: none; }
.nav-logo-sub { font-family: var(--f-ui); font-size: 8.5px; color: rgba(232,50,10,0.55); letter-spacing: 0.04em; line-height: 1.45; }
.nav-links { display: flex; align-items: center; list-style: none; gap: 0; flex-wrap: wrap; justify-content: flex-end; }
.nav-sep { color: var(--red); font-size: 11px; padding: 0 5px; opacity: 0.6; }
.nav-links a { font-family: var(--f-ui); font-size: 11.5px; color: var(--fg); text-decoration: none; letter-spacing: 0.06em; padding: 2px 4px; transition: color 0.15s; }
.nav-links a:hover { color: var(--red); }
.nav-links a.active { color: var(--purple); }

/* LAYOUT */
.obra-wrap {
  padding: 96px 24px 100px;
  display: grid;
  grid-template-columns: 1fr 280px;
  gap: 48px;
  max-width: 1200px;
  margin: 0 auto;
  align-items: start;
}

/* COLUNA PRINCIPAL */
.back-btn {
  display: inline-block;
  font-family: var(--f-ui);
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--fg);
  text-decoration: none;
  border: 1px solid var(--purple);
  padding: 10px 28px;
  margin-bottom: 48px;
  transition: background 0.15s, color 0.15s;
}
.back-btn:hover { background: var(--purple); color: var(--bg); }

.obra-image-wrap {
  width: 100%;
  margin-bottom: 36px;
  border: 1px solid rgba(204,68,255,0.15);
  overflow: hidden;
}
.obra-image-wrap img {
  width: 100%;
  display: block;
  filter: contrast(1.05) brightness(0.95);
}
.obra-image-placeholder {
  width: 100%;
  aspect-ratio: 4/3;
  background: #120818;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--f-ui);
  font-size: 9px;
  letter-spacing: 0.15em;
  color: rgba(204,68,255,0.15);
  text-transform: uppercase;
}

/* VIDEO */
.obra-video {
  width: 100%;
  display: block;
  background: #000;
  cursor: auto;
}
.obra-video::-webkit-media-controls-panel {
  background: linear-gradient(transparent, rgba(0,0,0,0.7));
}
.obra-video-wrap {
  width: 100%;
  margin-bottom: 36px;
  border: 1px solid rgba(204,68,255,0.15);
  overflow: hidden;
  position: relative;
}

.obra-type-badge {
  display: inline-block;
  font-family: var(--f-ui);
  font-size: 8px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  padding: 4px 10px;
  color: var(--purple);
  border: 1px solid var(--purple);
  width: fit-content;
  margin-bottom: 16px;
}

.obra-title {
  font-family: var(--f-title);
  font-size: clamp(28px, 4vw, 54px);
  letter-spacing: 0.03em;
  line-height: 1.02;
  margin-bottom: 12px;
}

.obra-year {
  font-family: var(--f-ui);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(204,68,255,0.45);
  margin-bottom: 28px;
}

.obra-description {
  font-family: var(--f-body);
  font-size: 18px;
  line-height: 1.75;
  color: rgba(232,232,216,0.65);
  border-left: 2px solid var(--purple);
  padding-left: 16px;
}

/* SIDEBAR */
.obra-sidebar {
  position: sticky;
  top: 88px;
}

.sidebar-label {
  font-family: var(--f-ui);
  font-size: 8.5px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(204,68,255,0.5);
  margin-bottom: 14px;
}

.sidebar-obra-list {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.sidebar-obra-item {
  display: grid;
  grid-template-columns: 64px 1fr;
  gap: 12px;
  padding: 10px;
  text-decoration: none;
  color: var(--fg);
  background: #111109;
  border: 1px solid rgba(255,255,255,0.04);
  cursor: crosshair;
  transition: border-color 0.15s;
  align-items: center;
}
.sidebar-obra-item:hover { border-color: var(--purple); }
.sidebar-obra-item.current { border-color: rgba(204,68,255,0.4); }

.sidebar-obra-thumb {
  width: 64px;
  height: 48px;
  object-fit: cover;
  display: block;
  filter: contrast(1.05) saturate(0.5);
}
.sidebar-obra-thumb-placeholder {
  width: 64px;
  height: 48px;
  background: #120818;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--f-ui);
  font-size: 7px;
  letter-spacing: 0.1em;
  color: rgba(204,68,255,0.15);
}

.sidebar-obra-title {
  font-family: var(--f-ui);
  font-size: 11px;
  line-height: 1.25;
  margin-bottom: 3px;
}
.sidebar-obra-type {
  font-family: var(--f-ui);
  font-size: 8px;
  letter-spacing: 0.08em;
  color: rgba(204,68,255,0.4);
  text-transform: uppercase;
}

/* FOOTER */
footer {
  border-top: 1px solid rgba(232,50,10,0.18);
  padding: 18px 24px;
  display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px;
}
footer span { font-family: var(--f-ui); font-size: 8.5px; letter-spacing: 0.13em; text-transform: uppercase; color: rgba(232,232,216,0.14); }

.footer-nl { display: flex; align-items: center; gap: 2px; }
.footer-nl-input { background: transparent; border: 1px solid rgba(232,50,10,0.2); padding: 6px 12px; font-family: var(--f-ui); font-size: 9px; letter-spacing: 0.06em; color: var(--fg); outline: none; width: 200px; transition: border-color 0.15s; cursor: text; }
.footer-nl-input:focus { border-color: var(--red); }
.footer-nl-input::placeholder { color: rgba(232,232,216,0.18); }
.footer-nl-btn { background: none; border: 1px solid rgba(232,50,10,0.2); border-left: none; padding: 6px 10px; font-family: var(--f-ui); font-size: 11px; color: rgba(232,50,10,0.5); cursor: crosshair; transition: all 0.15s; }
.footer-nl-btn:hover { border-color: var(--red); color: var(--red); }
.footer-nl-ok { display: none; font-family: var(--f-ui); font-size: 8.5px; letter-spacing: 0.12em; color: var(--green); }

/* RESPONSIVE */
@media (max-width: 900px) {
  .obra-wrap { grid-template-columns: 1fr; }
  .obra-sidebar { position: static; margin-top: 48px; border-top: 1px solid rgba(204,68,255,0.15); padding-top: 40px; }
}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">
    <a href="index.html" class="nav-logo-title">WEIRD WIZ</a>
    <span class="nav-logo-sub">a blog about art creativity<br>tech books and consciousness</span>
  </div>
  <ul class="nav-links">
    <li><span class="nav-sep">..·</span><a href="index.html#escritos">Escritos</a></li>
    <li><span class="nav-sep">:·</span><a href="drops.html">Drops</a></li>
    <li><span class="nav-sep">.·.</span><a href="livros.html">Livros</a></li>
    <li><span class="nav-sep">-·.</span><a href="index.html#obras" class="active">Obras</a></li>
    <li><span class="nav-sep">-·</span><a href="index.html#me">Me</a></li>
  </ul>
</nav>

<div class="obra-wrap">

  <main id="obra-main">
    <a href="index.html#obras" class="back-btn">← obras</a>
    <div id="obra-content">
      <div style="font-family:var(--f-ui);font-size:10px;letter-spacing:0.1em;color:rgba(232,232,216,0.3);padding-top:40px;">carregando...</div>
    </div>
  </main>

  <aside class="obra-sidebar">
    <div class="sidebar-label">— outras obras</div>
    <div class="sidebar-obra-list" id="sidebar-obra-list"></div>
  </aside>

</div>

<footer>
  <span>© 2026 Weird Wiz</span>
  <div class="footer-nl">
    <form id="nl-form-footer-obra"
          action="https://00bc7bfa.sibforms.com/serve/MUIFAP6Irrw--9y9roSCjipmIl4QR0T4wNHGL7l3E3UeY6kVH3b2sscz8ok4KT7n3UBxLtxBmrvtMMkSbyE9mfORmip7vX7y2z6PllCs5twrQmEg47eiJdgNP_mK__9s2-LLLtTCJA2qQO3fbMzyym_sdAkHL_0dMmGuC4JbQ0bTmFz11oDurorHHcJzHrxnEZEnT3V58kfQA_pSqQ=="
          method="POST"
          target="nl-iframe-footer-obra">
      <input type="email" name="EMAIL" class="footer-nl-input"
             placeholder="receba novos posts por email" required autocomplete="email">
      <input type="hidden" name="email_address_check" value="">
      <input type="hidden" name="locale" value="pt">
      <button type="submit" class="footer-nl-btn">→</button>
    </form>
    <iframe name="nl-iframe-footer-obra" style="display:none;" title="newsletter"></iframe>
    <span class="footer-nl-ok" id="nl-ok-footer-obra">✓ inscrito</span>
  </div>
  <span>made by hand</span>
</footer>

<script>

const DIRECTUS = 'https://directus-production-afdd.up.railway.app';

function directusImg(id, width) {
  if (!id) return null;
  return `${DIRECTUS}/assets/${id}${width ? '?width=' + width : ''}`;
}

let allObras = [];
let currentId = '';

function renderSidebarList(obras) {
  const list = document.getElementById('sidebar-obra-list');
  const others = obras.filter(o => String(o.id) !== String(currentId));
  list.innerHTML = '';
  if (others.length === 0) {
    list.innerHTML = '<div style="font-family:var(--f-ui);font-size:9px;letter-spacing:0.12em;color:rgba(232,232,216,0.18);padding:16px 0;">nenhuma outra obra</div>';
    return;
  }
  others.forEach(obra => {
    const a = document.createElement('a');
    a.href = `obra.html?id=${obra.id}`;
    a.className = 'sidebar-obra-item';
    const thumbHtml = obra.image
      ? `<img src="${directusImg(obra.image, 160)}" alt="${obra.title || ''}" class="sidebar-obra-thumb">`
      : obra.video
        ? `<div class="sidebar-obra-thumb-placeholder">▶</div>`
        : `<div class="sidebar-obra-thumb-placeholder">obra</div>`;
    const typeYear = [obra.type, obra.year].filter(Boolean).join(' · ');
    a.innerHTML = `
      ${thumbHtml}
      <div>
        <div class="sidebar-obra-title">${obra.title || ''}</div>
        <div class="sidebar-obra-type">${typeYear}</div>
      </div>`;
    list.appendChild(a);
  });
}

async function loadObra() {
  const params = new URLSearchParams(window.location.search);
  currentId = params.get('id') || '';

  if (!currentId) {
    document.getElementById('obra-content').innerHTML =
      '<p style="color:rgba(232,232,216,0.4);font-family:var(--f-ui);font-size:11px;letter-spacing:0.1em;">obra não encontrada.</p>';
    return;
  }

  try {
    const res = await fetch(`${DIRECTUS}/items/obras/${currentId}`);
    if (!res.ok) throw new Error('not found');
    const data = await res.json();
    const obra = data.data;

    document.title = `WEIRD WIZ – ${obra.title || 'Obra'}`;

    const typeYear = [obra.type, obra.year].filter(Boolean).join(' · ');

    const typeEl = obra.type
      ? `<div class="obra-type-badge">${obra.type}</div>`
      : '';

    const yearEl = obra.year
      ? `<div class="obra-year">${obra.year}</div>`
      : '';

    const descEl = obra.description
      ? `<div class="obra-description">${obra.description}</div>`
      : '';

    let mediaHtml;
    if (obra.video) {
      const posterAttr = obra.image ? `poster="${directusImg(obra.image, 1200)}"` : '';
      mediaHtml = `
        <div class="obra-video-wrap">
          <video class="obra-video" controls playsinline preload="metadata" ${posterAttr}>
            <source src="${DIRECTUS}/assets/${obra.video}" type="video/mp4">
          </video>
        </div>`;
    } else {
      const imageHtml = obra.image
        ? `<img src="${directusImg(obra.image, 1200)}" alt="${obra.title || ''}">`
        : `<div class="obra-image-placeholder">imagem</div>`;
      mediaHtml = `<div class="obra-image-wrap">${imageHtml}</div>`;
    }

    document.getElementById('obra-content').innerHTML = `
      ${mediaHtml}
      ${typeEl}
      <h1 class="obra-title">${(obra.title || '').toUpperCase()}</h1>
      ${yearEl}
      ${descEl}
    `;

    renderSidebarList(allObras);

  } catch(e) {
    document.getElementById('obra-content').innerHTML =
      '<p style="color:rgba(232,232,216,0.4);font-family:var(--f-ui);font-size:11px;letter-spacing:0.1em;">obra não encontrada.</p>';
  }
}

async function init() {
  try {
    const res = await fetch(`${DIRECTUS}/items/obras?filter[status][_eq]=published&sort[]=order&limit=200&fields=id,title,type,year,image,video`);
    const data = await res.json();
    allObras = data.data || [];
  } catch(e) { allObras = []; }

  await loadObra();
}

init();
document.getElementById('nl-form-footer-obra')?.addEventListener('submit', function() {
  setTimeout(() => { this.style.display='none'; document.getElementById('nl-ok-footer-obra').style.display='inline'; }, 600);
});
</script>

</body>
</html>
