<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preload" href="fonts/NeueHaasDisplay-Roman.ttf" as="font" type="font/ttf" crossorigin>
<link rel="preload" href="fonts/NeueHaasDisplay-Bold.ttf" as="font" type="font/ttf" crossorigin>

<title>Daniel Lameira</title>
<style>
@font-face { font-family: 'Neue Haas Grotesk'; font-weight: 400; font-style: normal; font-display: block; src: url('fonts/NeueHaasDisplay-Roman.ttf') format('truetype'); }
@font-face { font-family: 'Neue Haas Grotesk'; font-weight: 700; font-style: normal; font-display: block; src: url('fonts/NeueHaasDisplay-Bold.ttf') format('truetype'); }

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body { height: 100%; background: #fff; }
body {
  color: #111;
  font-family: 'Neue Haas Grotesk', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;     /* nome + menu centralizados como um conjunto */
  min-height: 100vh;
  padding: 40px 20px;
}

.brand {
  text-align: center;
  font-weight: 700;
  line-height: 0.92;
  letter-spacing: 0.01em;
  font-size: clamp(27px, 4.8vw, 46px);
}

.menu {
  margin-top: 56px;
  display: grid;
  grid-template-columns: auto 38px;   /* largura = conteúdo real, centralizada */
  column-gap: 14px;
  row-gap: 17px;
  align-items: center;
}
.menu a { display: contents; }
.menu .lbl {
  text-align: right;
  font-size: 17.5px;
  letter-spacing: 0.04em;
  color: #111;
  text-decoration: none;
}
.menu .ico {
  width: 38px;
  height: 38px;
  display: block;
}
.menu .ico img {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: contain;
  image-rendering: pixelated;   /* pixel art nítido, sem borrar */
}
.menu .lbl { transition: color 0.12s ease; }
.menu a:hover .lbl { color: #0000EE; }   /* azul de hyperlink */
.menu .ico-sobre img { transform: scale(1.15); }   /* rosto ~15% maior */

@media (max-width: 480px) {
  .menu { grid-template-columns: auto 34px; column-gap: 12px; }
  .menu .lbl { font-size: 14.5px; }
  .menu .ico { width: 34px; height: 34px; }
}
</style>
</head>
<body>

<div class="brand">DANIEL<br>LAMEIRA</div>

<nav class="menu">
  <a href="livros.html">
    <span class="lbl">livros</span>
    <span class="ico"><img src="icons/livros.png" alt="" aria-hidden="true"></span>
  </a>

  <a href="textos.html">
    <span class="lbl">textos</span>
    <span class="ico"><img src="icons/textos.png" alt="" aria-hidden="true"></span>
  </a>

  <a href="artes.html">
    <span class="lbl">artes</span>
    <span class="ico"><img src="icons/artes.png" alt="" aria-hidden="true"></span>
  </a>

  <a href="sobre.html">
    <span class="lbl">sobre</span>
    <span class="ico ico-sobre"><img src="icons/sobre.png" alt="" aria-hidden="true"></span>
  </a>
</nav>

</body>
</html>
