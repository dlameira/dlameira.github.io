<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preload" href="fonts/NeueHaasDisplay-Roman.ttf" as="font" type="font/ttf" crossorigin>
<link rel="preload" href="fonts/NeueHaasDisplay-Bold.ttf" as="font" type="font/ttf" crossorigin>

<title>WW ADMIN</title>
<style>
@font-face { font-family: 'Neue Haas Grotesk'; font-weight: 400; src: url('fonts/NeueHaasDisplay-Roman.ttf') format('truetype'); }
@font-face { font-family: 'Neue Haas Grotesk'; font-weight: 700; src: url('fonts/NeueHaasDisplay-Bold.ttf') format('truetype'); }

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:     #ffffff;
  --bg2:    #fafafa;
  --bg3:    #f1f1ef;
  --fg:     #111111;
  --fg2:    #888888;
  --red:    #111111;
  --green:  #1a8f3c;
  --blue:   #0000EE;
  --purple: #8a3ffc;
  --yellow: #b58900;
  --f-title: 'Neue Haas Grotesk', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  --f-ui:    'Neue Haas Grotesk', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  --f-body:  'Neue Haas Grotesk', 'Helvetica Neue', Helvetica, Arial, sans-serif;
}

html, body { height: 100%; overflow-x: hidden; }
body {
  background: var(--bg); color: var(--fg);
  font-family: var(--f-ui); font-size: 13px;
  cursor: pointer;
}
body::before { display: none; }

a { color: inherit; text-decoration: none; }
button, input, select, textarea { font-family: var(--f-ui); font-size: 13px; color: var(--fg); }
input[type="text"], input[type="email"], input[type="password"], input[type="url"], input[type="number"],
textarea, select {
  background: var(--bg3); border: 1px solid rgba(17,17,17,0.12);
  padding: 8px 12px; border-radius: 2px; outline: none; width: 100%;
  transition: border-color 0.15s;
}
input:focus, textarea:focus, select:focus { border-color: var(--red); }
textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
select option { background: var(--bg3); }
label { font-size: 11px; color: var(--fg2); letter-spacing: 0.05em; display: block; margin-bottom: 4px; }

/* ── BOTÕES ─────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; border: none; border-radius: 2px;
  cursor: pointer; font-family: var(--f-ui); font-size: 12px;
  letter-spacing: 0.04em; transition: opacity 0.15s, transform 0.1s;
  user-select: none;
}
.btn:hover { opacity: 0.8; }
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--red); color: #fff; }
.btn-ghost { background: transparent; border: 1px solid rgba(17,17,17,0.2); color: var(--fg); }
.btn-ghost:hover { border-color: var(--fg); opacity: 1; }
.btn-danger { background: transparent; border: 1px solid rgba(17,17,17,0.4); color: var(--red); }
.btn-danger:hover { background: rgba(17,17,17,0.1); opacity: 1; }
.btn-sm { padding: 5px 10px; font-size: 11px; }
.btn-green { background: var(--green); color: #000; }
.btn-yellow { background: var(--yellow); color: #000; }
.btn-purple { background: var(--purple); color: #000; }
.btn-blue { background: var(--blue); color: #fff; }
.btn:disabled { opacity: 0.4; pointer-events: none; }

/* ── TOAST ──────────────────────────────────────────────── */
#toast {
  position: fixed; bottom: 24px; right: 24px; z-index: 9999;
  display: flex; flex-direction: column; gap: 8px; pointer-events: none;
}
.toast-item {
  background: var(--bg3); border-left: 3px solid var(--green);
  padding: 10px 16px; font-size: 12px; border-radius: 2px;
  animation: toastIn 0.2s ease; max-width: 320px;
}
.toast-item.err { border-color: var(--red); }
@keyframes toastIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

/* ── LOGIN ──────────────────────────────────────────────── */
#view-login {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
}
.login-box {
  width: 360px; padding: 48px 40px;
  border: 1px solid rgba(17,17,17,0.2);
}
.login-logo {
  font-family: var(--f-title); font-size: 32px; color: var(--red);
  letter-spacing: 0.06em; margin-bottom: 4px;
}
.login-sub { font-size: 10px; color: var(--fg2); letter-spacing: 0.1em; margin-bottom: 36px; }
.login-box .field { margin-bottom: 16px; }
.login-box .btn { width: 100%; justify-content: center; margin-top: 8px; padding: 12px; }

/* ── LAYOUT PRINCIPAL ───────────────────────────────────── */
#app { display: none; min-height: 100vh; }

/* ── SIDEBAR ────────────────────────────────────────────── */
#sidebar {
  position: fixed; top: 0; left: 0; bottom: 0; width: 200px;
  background: var(--bg2); border-right: 1px solid rgba(17,17,17,0.06);
  display: flex; flex-direction: column; z-index: 100;
  padding: 24px 0;
}
.sidebar-logo {
  font-family: var(--f-title); font-size: 22px; color: var(--red);
  letter-spacing: 0.06em; padding: 0 20px 24px;
  border-bottom: 1px solid rgba(17,17,17,0.15);
}
.sidebar-logo span { font-family: var(--f-ui); font-size: 9px; color: rgba(17,17,17,0.5); display: block; letter-spacing: 0.08em; margin-top: 2px; }
.sidebar-nav { flex: 1; padding: 16px 0; }
.sidebar-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 20px; cursor: pointer; font-size: 12px;
  letter-spacing: 0.05em; transition: background 0.15s, color 0.15s;
  border-left: 2px solid transparent; color: var(--fg2);
}
.sidebar-item:hover { background: rgba(17,17,17,0.04); color: var(--fg); }
.sidebar-item.active { color: var(--fg); border-left-color: var(--red); background: rgba(17,17,17,0.06); }
.sidebar-item .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.sidebar-item .count { margin-left: auto; font-size: 10px; color: var(--fg2); }
.sidebar-bottom { padding: 16px 20px; border-top: 1px solid rgba(17,17,17,0.06); }
.sidebar-user { font-size: 10px; color: var(--fg2); margin-bottom: 8px; }

/* ── MAIN ───────────────────────────────────────────────── */
#main {
  margin-left: 200px; min-height: 100vh;
  display: flex; flex-direction: column;
}

/* ── TOPBAR ─────────────────────────────────────────────── */
#topbar {
  position: sticky; top: 0; z-index: 50;
  background: var(--bg); border-bottom: 1px solid rgba(17,17,17,0.06);
  padding: 14px 32px; display: flex; align-items: center; justify-content: space-between;
}
.topbar-title { font-family: var(--f-title); font-size: 18px; letter-spacing: 0.05em; }
.topbar-actions { display: flex; gap: 8px; align-items: center; }

/* ── CONTEÚDO ───────────────────────────────────────────── */
#content { padding: 32px; flex: 1; }

/* ── TABS ───────────────────────────────────────────────── */
.tabs { display: flex; gap: 0; margin-bottom: 28px; border-bottom: 1px solid rgba(17,17,17,0.08); }
.tab {
  padding: 10px 20px; cursor: pointer; font-size: 12px; letter-spacing: 0.05em;
  color: var(--fg2); border-bottom: 2px solid transparent; margin-bottom: -1px;
  transition: color 0.15s, border-color 0.15s;
}
.tab:hover { color: var(--fg); }
.tab.active { color: var(--fg); border-bottom-color: var(--red); }

/* ── LISTA DE ITENS ─────────────────────────────────────── */
.items-table { width: 100%; border-collapse: collapse; }
.items-table th {
  text-align: left; font-size: 10px; color: var(--fg2); letter-spacing: 0.08em;
  padding: 0 12px 10px; border-bottom: 1px solid rgba(17,17,17,0.08);
}
.items-table td {
  padding: 10px 12px; border-bottom: 1px solid rgba(17,17,17,0.04);
  vertical-align: middle;
}
.items-table tr:hover td { background: rgba(17,17,17,0.02); }
.item-thumb {
  width: 40px; height: 56px; object-fit: cover;
  border-radius: 1px; display: block; background: var(--bg3);
}
.item-thumb-sq {
  width: 48px; height: 48px; object-fit: cover;
  border-radius: 1px; display: block; background: var(--bg3);
}
.badge {
  display: inline-block; padding: 2px 7px; border-radius: 2px;
  font-size: 10px; letter-spacing: 0.04em; font-family: var(--f-ui);
}
.badge-published { background: rgba(0,255,65,0.12); color: var(--green); }
.badge-draft { background: rgba(17,17,17,0.08); color: var(--fg2); }
.badge-book { background: rgba(242,224,74,0.12); color: var(--yellow); }
.badge-album { background: rgba(0,255,65,0.12); color: var(--green); }
.badge-podcast { background: rgba(204,68,255,0.12); color: var(--purple); }
.badge-film { background: rgba(51,85,255,0.12); color: var(--blue); }
.row-actions { display: flex; gap: 6px; }

/* ── FORMULÁRIO ÚNICO ───────────────────────────────────── */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.form-grid .full { grid-column: 1 / -1; }
.field { display: flex; flex-direction: column; }
.field-row { display: flex; gap: 16px; }
.field-hint { font-size: 10px; color: var(--fg2); margin-top: 4px; }

.cover-upload-zone {
  border: 1px dashed rgba(17,17,17,0.2); border-radius: 2px;
  padding: 24px; text-align: center; cursor: pointer;
  transition: border-color 0.15s, background 0.15s; position: relative;
}
.cover-upload-zone:hover, .cover-upload-zone.drag { border-color: var(--red); background: rgba(17,17,17,0.04); }
.cover-upload-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.cover-upload-zone img { max-height: 120px; max-width: 100%; object-fit: contain; display: block; margin: 0 auto; }
.cover-upload-text { font-size: 11px; color: var(--fg2); }

.toggle-wrap { display: flex; align-items: center; gap: 10px; cursor: pointer; }
.toggle { width: 36px; height: 20px; background: var(--bg3); border-radius: 10px; position: relative; border: 1px solid rgba(17,17,17,0.15); transition: background 0.2s; flex-shrink: 0; }
.toggle.on { background: var(--red); border-color: var(--red); }
.toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; background: var(--fg); border-radius: 50%; transition: transform 0.2s; }
.toggle.on::after { transform: translateX(16px); }
.toggle-label { font-size: 12px; color: var(--fg2); }

/* ── BULK UPLOAD ────────────────────────────────────────── */
.bulk-drop-zone {
  border: 2px dashed rgba(17,17,17,0.3); border-radius: 2px;
  padding: 48px 24px; text-align: center; cursor: pointer;
  transition: border-color 0.15s, background 0.15s; position: relative;
  margin-bottom: 24px;
}
.bulk-drop-zone:hover, .bulk-drop-zone.drag { border-color: var(--red); background: rgba(17,17,17,0.04); }
.bulk-drop-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.bulk-drop-icon { font-size: 32px; margin-bottom: 12px; }
.bulk-drop-text { font-size: 13px; color: var(--fg2); }
.bulk-drop-text strong { color: var(--fg); }

.bulk-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
.bulk-card {
  background: var(--bg2); border: 1px solid rgba(17,17,17,0.08);
  border-radius: 2px; overflow: hidden; position: relative;
}
.bulk-card-img { width: 100%; height: 160px; object-fit: cover; display: block; background: var(--bg3); }
.bulk-card-body { padding: 12px; display: flex; flex-direction: column; gap: 8px; }
.bulk-card-remove {
  position: absolute; top: 6px; right: 6px;
  background: rgba(10,10,8,0.8); border: none; color: var(--red);
  width: 22px; height: 22px; border-radius: 50%; cursor: pointer;
  font-size: 14px; line-height: 1; display: flex; align-items: center; justify-content: center;
}
.bulk-card input, .bulk-card select { font-size: 12px; padding: 6px 8px; }
.bulk-progress { display: none; margin-bottom: 16px; }
.bulk-progress-bar { height: 3px; background: var(--bg3); border-radius: 2px; overflow: hidden; margin-top: 8px; }
.bulk-progress-fill { height: 100%; background: var(--green); width: 0%; transition: width 0.3s; }
.bulk-progress-text { font-size: 11px; color: var(--fg2); }
.bulk-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

/* ── EDITOR (escrito) ───────────────────────────────────── */
.editor-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
.editor-wrap textarea { min-height: 400px; font-family: var(--f-body); font-size: 14px; line-height: 1.7; }
.editor-preview {
  background: var(--bg2); border: 1px solid rgba(17,17,17,0.08);
  border-radius: 2px; padding: 20px; overflow-y: auto; min-height: 400px;
  font-family: var(--f-body); font-size: 15px; line-height: 1.8; color: var(--fg);
}
.editor-preview h1, .editor-preview h2, .editor-preview h3 { font-family: var(--f-title); margin-bottom: 12px; margin-top: 20px; }
.editor-preview p { margin-bottom: 14px; }
.editor-preview a { color: var(--red); }
.editor-preview blockquote { border-left: 2px solid var(--red); padding-left: 14px; color: var(--fg2); margin: 14px 0; }
.editor-preview code { background: var(--bg3); padding: 2px 5px; border-radius: 2px; font-family: var(--f-ui); font-size: 12px; }
.editor-preview pre { background: var(--bg3); padding: 12px; border-radius: 2px; overflow-x: auto; margin-bottom: 14px; }
.editor-preview pre code { background: none; padding: 0; }

/* ── MODAL ──────────────────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(10,10,8,0.85);
  z-index: 500; display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(2px);
}
.modal {
  background: var(--bg2); border: 1px solid rgba(17,17,17,0.1);
  border-radius: 2px; width: 640px; max-width: 95vw; max-height: 90vh;
  overflow-y: auto; display: flex; flex-direction: column;
}
.modal-header {
  padding: 20px 24px; border-bottom: 1px solid rgba(17,17,17,0.08);
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
.modal-title { font-family: var(--f-title); font-size: 16px; letter-spacing: 0.04em; }
.modal-close { background: none; border: none; color: var(--fg2); font-size: 20px; cursor: pointer; line-height: 1; }
.modal-close:hover { color: var(--fg); }
.modal-body { padding: 24px; flex: 1; }
.modal-footer { padding: 16px 24px; border-top: 1px solid rgba(17,17,17,0.08); display: flex; gap: 8px; justify-content: flex-end; flex-shrink: 0; }

/* ── EMPTY STATE ────────────────────────────────────────── */
.empty { text-align: center; padding: 64px 24px; color: var(--fg2); }
.empty-icon { font-size: 40px; margin-bottom: 16px; }
.empty h3 { font-family: var(--f-title); font-size: 18px; color: var(--fg); margin-bottom: 8px; }

/* ── LOADING ────────────────────────────────────────────── */
.loading { text-align: center; padding: 48px; color: var(--fg2); font-size: 12px; letter-spacing: 0.08em; }
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(17,17,17,0.3); border-top-color: var(--red); border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── STATS ──────────────────────────────────────────────── */
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
.stat-card {
  background: var(--bg2); border: 1px solid rgba(17,17,17,0.06);
  border-radius: 2px; padding: 20px 24px;
}
.stat-label { font-size: 10px; color: var(--fg2); letter-spacing: 0.08em; margin-bottom: 8px; }
.stat-value { font-family: var(--f-title); font-size: 36px; letter-spacing: 0.02em; }
.stat-card.drops .stat-value { color: var(--green); }
.stat-card.livros .stat-value { color: var(--yellow); }
.stat-card.obras .stat-value { color: var(--purple); }
.stat-card.escritos .stat-value { color: var(--red); }
.stat-sub { font-size: 10px; color: var(--fg2); margin-top: 6px; }

@media (max-width: 900px) {
  #sidebar { width: 160px; }
  #main { margin-left: 160px; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .form-grid { grid-template-columns: 1fr; }
  .editor-wrap { grid-template-columns: 1fr; }
}
@media (max-width: 640px) {
  #sidebar { display: none; }
  #main { margin-left: 0; }
}

/* editor rich text (escritos) */
.rt-toolbar { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
.rt-btn { font-family: var(--f-ui); font-size: 12px; padding: 6px 10px; border: 1px solid rgba(17,17,17,0.18); background: var(--bg); color: var(--fg); cursor: pointer; border-radius: 2px; line-height: 1; }
.rt-btn:hover { border-color: var(--fg); }
.rt-editor { min-height: 420px; border: 1px solid rgba(17,17,17,0.15); border-radius: 2px; padding: 20px 22px; font-family: var(--f-body); font-size: 16px; line-height: 1.75; color: var(--fg); background: var(--bg); overflow-y: auto; outline: none; }
.rt-editor:focus { border-color: rgba(17,17,17,0.45); }
.rt-editor:empty::before { content: 'Escreva aqui…'; color: rgba(17,17,17,0.3); }
.rt-editor p { margin-bottom: 14px; }
.rt-editor h2 { font-size: 23px; font-weight: 700; margin: 20px 0 8px; }
.rt-editor h3 { font-size: 18px; font-weight: 700; margin: 16px 0 6px; }
.rt-editor a { color: #0000EE; text-decoration: underline; }
.rt-editor blockquote { border-left: 2px solid var(--fg); padding-left: 14px; margin: 14px 0; color: #555; }
.rt-editor ul, .rt-editor ol { margin: 0 0 14px 22px; }
.rt-editor li { margin-bottom: 5px; }

/* acentos funcionais (apagar / erro) seguem em vermelho */
.btn-danger { border-color: rgba(200,30,30,0.45) !important; color: #c81e1e !important; }
.btn-danger:hover { background: rgba(200,30,30,0.08) !important; }
.toast-item.err { border-color: #c81e1e !important; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="view-login">
  <div class="login-box">
    <div class="login-logo">daniel lameira</div>
    <div class="login-sub">ADMIN — ACESSO RESTRITO</div>
    <div class="field">
      <label>EMAIL</label>
      <input type="email" id="login-email" placeholder="seu@email.com" autocomplete="email">
    </div>
    <div class="field">
      <label>SENHA</label>
      <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn btn-primary" id="login-btn" onclick="doLogin()">ENTRAR</button>
    <div id="login-err" style="color:var(--red);font-size:11px;margin-top:12px;display:none;"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <!-- SIDEBAR -->
  <aside id="sidebar">
    <div class="sidebar-logo">
      DL<span>ADMIN</span>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-item" data-view="dashboard" onclick="navigate('dashboard')">
        <div class="dot" style="background:var(--red)"></div>
        DASHBOARD
      </div>
      <div class="sidebar-item" data-view="drops" onclick="navigate('drops')">
        <div class="dot" style="background:var(--green)"></div>
        DROPS
        <span class="count" id="count-drops">—</span>
      </div>
      <div class="sidebar-item" data-view="livros" onclick="navigate('livros')">
        <div class="dot" style="background:var(--yellow)"></div>
        LIVROS
        <span class="count" id="count-livros">—</span>
      </div>
      <div class="sidebar-item" data-view="obras" onclick="navigate('obras')">
        <div class="dot" style="background:var(--purple)"></div>
        OBRAS
        <span class="count" id="count-obras">—</span>
      </div>
      <div class="sidebar-item" data-view="escritos" onclick="navigate('escritos')">
        <div class="dot" style="background:var(--red)"></div>
        ESCRITOS
        <span class="count" id="count-escritos">—</span>
      </div>
      <div class="sidebar-item" data-view="colaboradores" onclick="navigate('colaboradores')">
        <div class="dot" style="background:#ff44bb"></div>
        COLABORADORES
        <span class="count" id="count-colaboradores">—</span>
      </div>
    </nav>
    <div class="sidebar-bottom">
      <div class="sidebar-user" id="sidebar-user"></div>
      <button class="btn btn-ghost btn-sm" onclick="doLogout()" style="width:100%;justify-content:center;">SAIR</button>
    </div>
  </aside>

  <!-- MAIN -->
  <div id="main">
    <div id="topbar">
      <div class="topbar-title" id="topbar-title">DASHBOARD</div>
      <div class="topbar-actions" id="topbar-actions"></div>
    </div>
    <div id="content"></div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- MODAL CONTAINER -->
<div id="modal-container"></div>

<script>
const DIRECTUS = 'https://directus-production-afdd.up.railway.app';
let token = sessionStorage.getItem('ww_token');
let currentUser = null;
let currentView = null;
let collectionsCache = {};

// ── AUTH ─────────────────────────────────────────────────────────────────────

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const btn   = document.getElementById('login-btn');
  const err   = document.getElementById('login-err');
  err.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'ENTRANDO…';
  try {
    const res = await fetch(`${DIRECTUS}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pass })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.errors?.[0]?.message || 'Erro ao entrar');
    token = data.data.access_token;
    sessionStorage.setItem('ww_token', token);
    // get user info
    const me = await api('GET', '/users/me?fields=email,first_name');

// ── API ───────────────────────────────────────────────────────────────────────

async function api(method, path, body = null, isFormData = false) {
  const headers = { 'Authorization': `Bearer ${token}` };
  if (body && !isFormData) headers['Content-Type'] = 'application/json';
  const opts = { method, headers };
  if (body) opts.body = isFormData ? body : JSON.stringify(body);
  const res = await fetch(`${DIRECTUS}${path}`, opts);
  if (res.status === 204) return null;
  const data = await res.json();
  if (!res.ok) {
    const msg = data.errors?.[0]?.message || `Erro ${res.status}`;
    throw new Error(msg);
  }
  return data;
}

async function uploadFile(file, onProgress) {
  const fd = new FormData();
  fd.append('file', file, file.name);
  // using XMLHttpRequest for progress
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.open('POST', `${DIRECTUS}/files`);
    xhr.setRequestHeader('Authorization', `Bearer ${token}`);
    xhr.upload.onprogress = e => { if (onProgress && e.lengthComputable) onProgress(e.loaded / e.total); };
    xhr.onload = () => {
      try {
        const d = JSON.parse(xhr.responseText);
        if (xhr.status >= 200 && xhr.status < 300) resolve(d.data);
        else reject(new Error(d.errors?.[0]?.message || 'Upload falhou'));
      } catch { reject(new Error('Resposta inválida')); }
    };
    xhr.onerror = () => reject(new Error('Erro de rede'));
    xhr.send(fd);
  });
}

function directusImg(id, w = 80) {
  if (!id) return null;
  return `${DIRECTUS}/assets/${id}?width=${w}&quality=80&format=webp`;
}

      api('GET', `/items/${c}?aggregate[count]=*&filter[status][_eq]=published`)

async function dropsEditar(id) {
  try {
    const res = await api('GET', `/items/drops/${id}?fields=*,colaboradores.id,colaboradores.papel,colaboradores.colaboradores_id.id,colaboradores.colaboradores_id.name`);
    dropsTab('novo');
    document.getElementById('tab-drops-novo').textContent = 'EDITAR';
    dropsFormNovo(res.data);
    setupCropDrag();
    if (res.data.cover) {
      // Prefer focal_x/y stored on the drop item (no extra API call needed)
      const fx = res.data.focal_x ?? null;
      const fy = res.data.focal_y ?? null;
      initCropOverlay(fx, fy);
    }
  } catch(e) { toast('Erro ao carregar drop: ' + e.message, true); }
}

async function dropsSalvar(id) {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { toast('Título é obrigatório', true); return; }
  const body = {
    title,
    author:   document.getElementById('f-author').value.trim() || null,
    type:     document.getElementById('f-type').value,
    link:     document.getElementById('f-link').value.trim() || null,
    note:     document.getElementById('f-note').value.trim() || null,
    order:    parseInt(document.getElementById('f-order').value) || null,
    featured: document.getElementById('tog-featured').classList.contains('on'),
    status:   document.getElementById('tog-status').classList.contains('on') ? 'published' : 'draft',
  };
  const covId = document.getElementById('cover-id').value;
  if (covId) body.cover = covId;

  // upload cover
  const fileInput = document.getElementById('cover-file');
  if (fileInput.files[0] && !covId) {
    try {
      const f = await uploadFile(fileInput.files[0]);
      body.cover = f.id;
    } catch(e) { toast('Erro no upload da capa: ' + e.message, true); return; }
  }

  // thumbnail alternativo
  const thumbId = document.getElementById('thumb-id')?.value;
  if (thumbId) body.thumbnail = thumbId;
  const thumbInput = document.getElementById('thumb-file');
  if (thumbInput?.files[0] && !thumbId) {
    try {
      const f = await uploadFile(thumbInput.files[0]);
      body.thumbnail = f.id;
    } catch(e) { toast('Erro no upload do thumbnail: ' + e.message, true); return; }
  }

  // Save focal point on drop item AND on the file record (for admin preview)
  const fxEl = document.getElementById('focal-x');
  const fyEl = document.getElementById('focal-y');
  if (fxEl?.value !== '' && fyEl?.value !== '') {
    body.focal_x = parseInt(fxEl.value);
    body.focal_y = parseInt(fyEl.value);
  }

  try {
    if (id) await api('PATCH', `/items/drops/${id}`, body);
    else    await api('POST',  '/items/drops', body);
    // Also patch the file record for Directus asset preview cache
    const finalCoverId = body.cover;
    if (finalCoverId && body.focal_x != null) {
      try {
        await api('PATCH', `/files/${finalCoverId}`, {
          focal_point_x: body.focal_x,
          focal_point_y: body.focal_y,
        });
      } catch(e) { /* non-fatal */ }
    }
    toast(id ? 'Drop atualizado!' : 'Drop criado!');
    dropsTab('lista');
    loadCounts();
  } catch(e) { toast('Erro: ' + e.message, true); }
}

async function dropsDeletar(id, title) {
  if (!confirm(`Deletar "${title}"?`)) return;
  try {
    await api('DELETE', `/items/drops/${id}`);
    toast('Drop deletado.');
    dropsCarregarLista();
    loadCounts();
  } catch(e) { toast('Erro: ' + e.message, true); }
}

let bulkItems = [];

function bulkDrop(event, type) {
  event.preventDefault();
  document.getElementById('bulk-zone').classList.remove('drag');
  bulkAdd(event.dataTransfer.files, type);
}

function bulkAdd(files, type) {
  Array.from(files).forEach(file => {
    if (!file.type.startsWith('image/')) return;
    const id = Date.now() + Math.random();
    const url = URL.createObjectURL(file);
    bulkItems.push({ id, file, url, type });
    renderBulkCard({ id, file, url, collType: type });
  });
  if (bulkItems.length > 0) {
    document.getElementById('bulk-actions').style.display = 'flex';
  }
}

      </select></div>`;
  } else if (collType === 'livros') {
    extraFields = `
      <div class="field"><label>AUTOR</label><input type="text" id="bi-author-${id}" placeholder="Autor(a)…"></div>
      <div class="field"><label>ANO</label><input type="number" id="bi-ano-${id}" placeholder="2024"></div>`;
  } else if (collType === 'obras') {
    extraFields = `
      <div class="field"><label>TIPO</label><input type="text" id="bi-type-${id}" placeholder="desenho, pintura…"></div>
      <div class="field"><label>ANO</label><input type="text" id="bi-ano-${id}" placeholder="2024"></div>`;
  }

  card.innerHTML = `
    <img class="bulk-card-img" src="${url}" alt="">
    <button class="bulk-card-remove" onclick="bulkRemove(${id})">×</button>
    <div class="bulk-card-body">
      <div class="field"><label>TÍTULO</label><input type="text" id="bi-title-${id}" placeholder="Título…"></div>
      ${extraFields}
    </div>`;
  grid.appendChild(card);
}

function bulkRemove(id) {
  bulkItems = bulkItems.filter(b => b.id !== id);
  document.getElementById(`bulk-card-${id}`)?.remove();
  if (!bulkItems.length) document.getElementById('bulk-actions').style.display = 'none';
}

function bulkClear() {
  bulkItems = [];
  document.getElementById('bulk-grid').innerHTML = '';
  document.getElementById('bulk-actions').style.display = 'none';
}

async function bulkSubmit(collType, asDraft = false) {
  if (!bulkItems.length) return;
  const prog = document.getElementById('bulk-progress');
  const fill = document.getElementById('bulk-progress-fill');
  const txt  = document.getElementById('bulk-progress-text');
  prog.style.display = 'block';
  const total = bulkItems.length;
  let done = 0;

  for (const item of bulkItems) {
    try {
      txt.textContent = `Enviando ${done+1}/${total}: ${item.file.name}`;
      const uploaded = await uploadFile(item.file, p => {
        fill.style.width = `${((done + p) / total * 100).toFixed(0)}%`;
      });
      const title  = document.getElementById(`bi-title-${item.id}`)?.value.trim() || item.file.name.replace(/\.[^.]+$/, '');
      const status = asDraft ? 'draft' : 'published';
      if (collType === 'drops') {
        await api('POST', '/items/drops', {
          title, status, cover: uploaded.id,
          author: document.getElementById(`bi-author-${item.id}`)?.value.trim() || null,
          type:   document.getElementById(`bi-type-${item.id}`)?.value || 'book',
        });
      } else if (collType === 'livros') {
        await api('POST', '/items/livros', {
          title, status, Cover: uploaded.id,
          autor: document.getElementById(`bi-author-${item.id}`)?.value.trim() || null,
          ano:   parseInt(document.getElementById(`bi-ano-${item.id}`)?.value) || null,
        });
      } else if (collType === 'obras') {
        await api('POST', '/items/obras', {
          title, status, image: uploaded.id,
          type: document.getElementById(`bi-type-${item.id}`)?.value.trim() || null,
          year: document.getElementById(`bi-ano-${item.id}`)?.value.trim() || null,
        });
      }
    } catch(e) {
      toast(`Erro em ${item.file.name}: ${e.message}`, true);
    }
    done++;
    fill.style.width = `${(done / total * 100).toFixed(0)}%`;
  }
  txt.textContent = `✓ ${done}/${total} enviados!`;
  toast(`${done} itens criados!`);
  bulkClear();
  loadCounts();
  setTimeout(() => { prog.style.display = 'none'; fill.style.width = '0%'; }, 3000);
}

  } catch (e) {
    panel.innerHTML = `<div class="empty"><div class="empty-icon">⚠</div><h3>Erro</h3><p>${e.message}</p></div>`;

function renderDaPanel() {
  const panel = document.getElementById('livros-panel');
  panel.innerHTML = `
    <p style="font-size:11px;color:var(--fg2);margin-bottom:14px">Marque os livros cuja <strong>capa / direção de arte</strong> foi sua. Salva automaticamente a cada clique.</p>
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px">

      <button class="btn btn-sm btn-primary da-mode" data-mode="todos" onclick="daSetMode('todos')">TODOS</button>
      <button class="btn btn-sm btn-ghost da-mode" data-mode="sim" onclick="daSetMode('sim')">✓ DIRIGI</button>
      <button class="btn btn-sm btn-ghost da-mode" data-mode="nao" onclick="daSetMode('nao')">NÃO DIRIGI</button>

        <th style="width:80px">DIRIGI?</th>
        <th style="width:50px">CAPA</th>
        <th>TÍTULO</th>
        <th>AUTOR</th>
        <th style="width:60px">ANO</th>
      </tr></thead>
      <tbody id="da-tbody"></tbody>
    </table>`;
  daRenderRows();
  daUpdateCounter();
}

function daRenderRows() {
  const q = daQuery.trim().toLowerCase();
  const rows = daData.filter(l => {
    if (daMode === 'sim' && l.direcao_arte !== true) return false;
    if (daMode === 'nao' && l.direcao_arte === true) return false;
    if (q && !((l.title || '') + ' ' + (l.autor || '')).toLowerCase().includes(q)) return false;
    return true;
  });
  const tb = document.getElementById('da-tbody');
  tb.innerHTML = rows.map(l => `
    <tr>
      <td><div class="toggle ${l.direcao_arte === true ? 'on' : ''}" onclick="daToggle(${l.id}, this)" title="marcar/desmarcar"></div></td>
      <td>${l.Cover ? `<img class="item-thumb" src="${directusImg(l.Cover, 80)}" alt="">` : `<div class="item-thumb" style="background:var(--bg3)"></div>`}</td>
      <td>${esc(l.title || '—')}</td>
      <td style="color:var(--fg2)">${esc(l.autor || '—')}</td>
      <td style="color:var(--fg2)">${l.ano || '—'}</td>
    </tr>`).join('') || `<tr><td colspan="5" style="padding:24px;text-align:center;color:var(--fg2)">nada encontrado</td></tr>`;
}

function daFilter() { daQuery = document.getElementById('da-search').value; daRenderRows(); }

function daSetMode(m) {
  daMode = m;
  document.querySelectorAll('.da-mode').forEach(b => {
    b.className = 'btn btn-sm da-mode ' + (b.dataset.mode === m ? 'btn-primary' : 'btn-ghost');
  });
  daRenderRows();
}

function daUpdateCounter() {
  const sim = daData.filter(l => l.direcao_arte === true).length;
  const c = document.getElementById('da-counter');
  if (c) c.textContent = `${sim} de ${daData.length} com a sua direção de arte`;
}

async function daToggle(id, el) {
  const novo = !el.classList.contains('on');
  const item = daData.find(x => x.id === id);
  el.classList.toggle('on', novo);          // otimista
  if (item) item.direcao_arte = novo;
  daUpdateCounter();
  try {
    await api('PATCH', `/items/livros/${id}`, { direcao_arte: novo });
  } catch (e) {
    el.classList.toggle('on', !novo);       // reverte em caso de erro
    if (item) item.direcao_arte = !novo;
    daUpdateCounter();
    toast('Erro ao salvar: ' + e.message, true);
  }
}

async function livrosEditar(id) {

    livrosFormNovo(res.data);
    livrosCarregarColaboradores(id);
  } catch(e) { toast('Erro ao carregar livro: ' + e.message, true); }
}

async function livrosSalvar(id) {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { toast('Título é obrigatório', true); return; }
  const body = {
    title,
    subtitle:    document.getElementById('f-subtitle').value.trim() || null,
    title_en:    document.getElementById('f-title-en').value.trim() || null,
    autor:       document.getElementById('f-autor').value.trim() || null,
    editora:     document.getElementById('f-editora').value.trim() || null,
    ano:         parseInt(document.getElementById('f-ano').value) || null,
    paginas:     parseInt(document.getElementById('f-paginas').value) || null,
    formato:     document.getElementById('f-formato').value.trim() || null,
    isbn_fisico: document.getElementById('f-isbn-fisico').value.trim() || null,
    isbn_ebook:  document.getElementById('f-isbn-ebook').value.trim() || null,
    link_compra: document.getElementById('f-link-compra').value.trim() || null,
    tradutor:      document.getElementById('f-tradutor').value.trim() || null,
    capista:       document.getElementById('f-capista').value.trim() || null,
    arte_de_capa:  document.getElementById('f-arte-de-capa').value.trim() || null,
    artes_internas: document.getElementById('f-artes-internas').value.trim() || null,
    colecao:       document.getElementById('f-colecao').value.trim() || null,
    sinopse:       document.getElementById('f-sinopse').value.trim() || null,
    notas:         document.getElementById('f-notas').value.trim() || null,
    featured:      document.getElementById('tog-featured').classList.contains('on'),
    status:        document.getElementById('tog-status').classList.contains('on') ? 'published' : 'draft',
    direcao_arte:  document.getElementById('tog-direcao-arte').classList.contains('on'),
  };
  const covId = document.getElementById('cover-id').value;
  if (covId) body.Cover = covId;
  const fileInput = document.getElementById('cover-file');
  if (fileInput.files[0] && !covId) {
    try { const f = await uploadFile(fileInput.files[0]); body.Cover = f.id; }
    catch(e) { toast('Erro no upload: ' + e.message, true); return; }
  }
  try {
    if (id) {
      await api('PATCH', `/items/livros/${id}`, body);
      toast('Livro atualizado!');
      livrosTab('lista');
    } else {
      const created = await api('POST', '/items/livros', body);
      toast('Livro criado! Adicione colaboradores abaixo.');
      livrosEditar(created.data.id);
    }
    loadCounts();
  } catch(e) { toast('Erro: ' + e.message, true); }
}

async function livrosDeletar(id, title) {
  if (!confirm(`Deletar "${title}"?`)) return;
  try {
    await api('DELETE', `/items/livros/${id}`);
    toast('Livro deletado.');
    livrosCarregarLista();
    loadCounts();
  } catch(e) { toast('Erro: ' + e.message, true); }
}

  try {
    await api('PATCH', `/items/livros/${id}`, { status: publish ? 'published' : 'draft' });
    toast(publish ? 'Publicado!' : 'Despublicado.');
    livrosCarregarLista();
    loadCounts();
  } catch(e) { toast('Erro: ' + e.message, true); }
}

async function livrosPublicarRascunhos() {
  const ids = livrosData.filter(l => l.status !== 'published').map(l => l.id);
  if (!ids.length) { toast('Nenhum rascunho.'); return; }
  if (!confirm(`Publicar ${ids.length} rascunho(s)? Eles passam a aparecer na galeria (no fim, até você reordenar).`)) return;
  toast(`Publicando ${ids.length}…`);
  let ok = 0, fail = 0;
  const pool = 6;
  for (let i = 0; i < ids.length; i += pool) {
    const results = await Promise.allSettled(ids.slice(i, i + pool).map(id =>
      api('PATCH', `/items/livros/${id}`, { status: 'published' })));
    results.forEach(r => { if (r.status === 'fulfilled') ok++; else fail++; });
  }
  toast(fail ? `Publicados ${ok}, ${fail} falharam.` : `${ok} publicados!`, !!fail);
  livrosCarregarLista();
  loadCounts();
}

// ── LIVROS · TAMANHOS (formato físico, edição rápida) ─────────────────────────
let formatosData = [];
let formatosSoFaltam = false;
const FMT_CANON = ['14x21', '16x23', '12x17'];
function normFmt(s) { return String(s || '').toLowerCase().replace(/\s/g, '').replace(/cm$/, ''); }
function fmtVazio(l) { return !l.formato || !String(l.formato).trim(); }

async function livrosFormatos() {
  const panel = document.getElementById('livros-panel');
  panel.innerHTML = '<div class="loading"><span class="spinner"></span>CARREGANDO…</div>';
  try {
    const res = await api('GET', '/items/livros?limit=500&fields=id,title,autor,ano,Cover,formato&sort=title');
    formatosData = (res.data || []).map(l => {
      const n = normFmt(l.formato);
      return { ...l, _orig: l.formato || '', _novo: FMT_CANON.includes(n) ? n : null };
    });
    renderFormatosLista();
  } catch(e) { panel.innerHTML = `<div class="empty"><div class="empty-icon">⚠</div><h3>Erro</h3><p>${e.message}</p></div>`; }
}

function formatosVisiveis() {
  return formatosSoFaltam ? formatosData.filter(fmtVazio) : formatosData;
}
function formatosMudados() {
  return formatosData.filter(l => l._novo && (l._novo + 'cm') !== (l.formato || ''));
}

function renderFormatosLista() {
  const panel = document.getElementById('livros-panel');
  const semFmt = formatosData.filter(fmtVazio).length;
  const lista = formatosVisiveis();
  panel.innerHTML = `
    <div style="position:sticky;top:60px;background:var(--bg);z-index:10;padding:10px 0;display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:8px;border-bottom:1px solid rgba(17,17,17,0.06)">
      <button class="btn btn-yellow btn-sm" id="fmt-save" onclick="formatosSalvar()">SALVAR FORMATOS${formatosMudados().length ? ` (${formatosMudados().length})` : ''}</button>
      <div class="toggle-wrap" onclick="formatosToggleFiltro()" style="cursor:pointer">
        <div class="toggle ${formatosSoFaltam ? 'on' : ''}"></div>
        <span class="toggle-label">só os sem formato (${semFmt})</span>
      </div>
      <span style="font-size:11px;color:var(--fg2)">${lista.length} livros · clique no formato de cada</span>
    </div>
    ${lista.map(l => formatoRow(l)).join('') || '<div class="empty"><div class="empty-icon">✓</div><h3>Todos com formato</h3></div>'}`;
}

function formatoBtns(l) {
  return FMT_CANON.map(f => `<button class="btn btn-sm ${l._novo === f ? 'btn-yellow' : 'btn-ghost'}" onclick="formatoSet(${l.id},'${f}')">${f.replace('x', '×')}</button>`).join('');
}

function formatoRow(l) {
  const isOther = l.formato && !FMT_CANON.includes(normFmt(l.formato));
  return `
    <div style="display:flex;gap:12px;align-items:center;padding:8px 0;border-bottom:1px solid rgba(17,17,17,0.05)">
      ${l.Cover ? `<img src="${directusImg(l.Cover, 60)}" style="width:34px;height:48px;object-fit:cover;flex-shrink:0;background:var(--bg3)" alt="" loading="lazy">` : `<div style="width:34px;height:48px;background:var(--bg3);flex-shrink:0"></div>`}
      <div style="flex:1;min-width:0">
        <div style="font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(l.title || '—')}</div>
        <div style="font-size:10px;color:var(--fg2)">${esc(l.autor || '')}${l.ano ? ' · ' + l.ano : ''}${isOther ? ` · <span style="color:var(--yellow)">atual: ${esc(l.formato)}</span>` : ''}</div>
      </div>
      <div class="row-actions" id="fmt-btns-${l.id}" style="flex-shrink:0">${formatoBtns(l)}</div>
    </div>`;
}

function formatoSet(id, f) {
  const l = formatosData.find(x => x.id === id);
  if (!l) return;
  l._novo = (l._novo === f) ? null : f;   // clicar de novo desmarca
  const box = document.getElementById('fmt-btns-' + id);
  if (box) box.innerHTML = formatoBtns(l);
  const save = document.getElementById('fmt-save');
  if (save) save.textContent = `SALVAR FORMATOS${formatosMudados().length ? ` (${formatosMudados().length})` : ''}`;
}

function formatosToggleFiltro() {
  formatosSoFaltam = !formatosSoFaltam;
  renderFormatosLista();
}

async function formatosSalvar() {
  const changed = formatosMudados();
  if (!changed.length) { toast('Nada para salvar.'); return; }
  toast(`Salvando ${changed.length} formato(s)…`);
  let ok = 0, fail = 0;
  const pool = 6;
  for (let i = 0; i < changed.length; i += pool) {
    const slice = changed.slice(i, i + pool);
    const results = await Promise.allSettled(slice.map(l => api('PATCH', `/items/livros/${l.id}`, { formato: l._novo + 'cm' })));
    results.forEach((r, k) => { if (r.status === 'fulfilled') { slice[k].formato = slice[k]._novo + 'cm'; ok++; } else fail++; });
  }
  toast(fail ? `Salvou ${ok}, ${fail} falharam.` : `${ok} formato(s) salvos! A galeria já reflete o tamanho.`, !!fail);
  renderFormatosLista();
}

// ── LIVROS · ORDENAR (drag & drop → campo sort) ───────────────────────────────
let ordenarData = [];
let _ordDragId = null;

async function livrosOrdenar() {
  const panel = document.getElementById('livros-panel');
  panel.innerHTML = '<div class="loading"><span class="spinner"></span>CARREGANDO…</div>';
  try {
    // mesma ordem que a galeria pública usa
    const res = await api('GET', '/items/livros?filter[status][_eq]=published&sort[]=sort&sort[]=-ano&limit=500&fields=id,title,autor,Cover,sort');
    ordenarData = res.data || [];
    renderOrdenarGrid();
  } catch(e) {
    panel.innerHTML = `<div class="empty"><div class="empty-icon">⚠</div><h3>Erro</h3><p>${e.message}</p></div>`;
  }
}

function renderOrdenarGrid() {
  const panel = document.getElementById('livros-panel');
  panel.innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap;position:sticky;top:60px;background:var(--bg);padding:8px 0;z-index:10">
      <button class="btn btn-yellow" onclick="ordenarSalvar()">SALVAR ORDEM</button>
      <button class="btn btn-ghost" onclick="livrosOrdenar()">↺ DESCARTAR</button>
      <span style="font-size:11px;color:var(--fg2)">Arraste as capas para reordenar — a posição 1 aparece primeiro na galeria. ${ordenarData.length} livros publicados.</span>
    </div>
    <div id="ord-grid" style="display:grid;grid-template-columns:repeat(6,1fr);gap:0;border-top:1px solid rgba(17,17,17,0.12);border-left:1px solid rgba(17,17,17,0.12)"></div>`;
  const grid = document.getElementById('ord-grid');
  ordenarData.forEach((l, i) => {
    const card = document.createElement('div');
    card.className = 'ord-card';
    card.draggable = true;
    card.dataset.id = l.id;
    card.title = l.title || '';
    card.style.cssText = 'position:relative;cursor:grab;border-right:1px solid rgba(17,17,17,0.12);border-bottom:1px solid rgba(17,17,17,0.12);background:#fff;overflow:hidden;aspect-ratio:1/1.04;display:flex;align-items:center;justify-content:center;padding:6px';
    card.innerHTML = `
      <div style="position:absolute;top:4px;left:4px;background:rgba(10,10,8,0.82);color:var(--yellow);font-size:10px;padding:1px 5px;border-radius:2px;z-index:2;pointer-events:none">${i + 1}</div>
      ${l.Cover
        ? `<img src="${directusImg(l.Cover, 240)}" style="max-width:84%;max-height:76%;object-fit:contain;display:block;pointer-events:none" alt="">`
        : `<div style="color:var(--fg2);font-size:9px;pointer-events:none">sem capa</div>`}`;
    grid.appendChild(card);
  });
  grid.addEventListener('dragstart', onOrdDragStart);
  grid.addEventListener('dragover', onOrdDragOver);
  grid.addEventListener('drop', onOrdDrop);
  grid.addEventListener('dragend', onOrdDragEnd);
}

function onOrdDragStart(e) {
  const c = e.target.closest('.ord-card');
  if (!c) return;
  _ordDragId = c.dataset.id;
  e.dataTransfer.effectAllowed = 'move';
  c.style.opacity = '0.35';
  _ordPointerY = e.clientY;
  _ordStartAutoScroll();
}
function onOrdDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const c = e.target.closest('.ord-card');
  document.querySelectorAll('.ord-card').forEach(el => el.style.outline = '');
  if (c && c.dataset.id !== _ordDragId) c.style.outline = '2px solid var(--red)';
}
function onOrdDrop(e) {
  e.preventDefault();
  _ordStopAutoScroll();
  const target = e.target.closest('.ord-card');
  if (!target || _ordDragId == null) return;
  const from = ordenarData.findIndex(x => String(x.id) === String(_ordDragId));
  const to   = ordenarData.findIndex(x => String(x.id) === String(target.dataset.id));
  if (from < 0 || to < 0 || from === to) return;
  const [moved] = ordenarData.splice(from, 1);
  ordenarData.splice(to, 0, moved);
  renderOrdenarGrid();
}
function onOrdDragEnd() {
  _ordDragId = null;
  _ordStopAutoScroll();
  document.querySelectorAll('.ord-card').forEach(el => { el.style.opacity = ''; el.style.outline = ''; });
}

// auto-scroll ao arrastar perto do topo/base da janela
let _ordScrollRAF = null;
let _ordPointerY = 0;
let _ordZoneSince = 0;     // timestamp de quando o cursor entrou na zona de borda (0 = fora)
function _ordTrackPointer(e) { if (e.clientY > 0) _ordPointerY = e.clientY; }
function _ordAutoScrollTick(ts) {
  const edge = 180;        // zona sensível (px): pega a 1ª/última fileira visível, não só a borda extrema
  const dwell = 700;       // ms parado na zona antes de começar a rolar
  const maxSpeed = 28;     // px por frame no limite da borda
  const vh = window.innerHeight;
  const y = _ordPointerY;
  let dir = 0, intensity = 0;
  if (y > 0 && y < edge)              { dir = -1; intensity = 1 - y / edge; }
  else if (y > vh - edge && y <= vh)  { dir =  1; intensity = 1 - (vh - y) / edge; }
  if (dir) {
    if (!_ordZoneSince) _ordZoneSince = ts;          // entrou na zona: começa a contar
    if (ts - _ordZoneSince > dwell) {                // passou a espera: rola (acelera perto da borda)
      window.scrollBy(0, dir * maxSpeed * (0.3 + 0.7 * intensity));
    }
  } else {
    _ordZoneSince = 0;                               // saiu da zona: zera a espera
  }
  _ordScrollRAF = requestAnimationFrame(_ordAutoScrollTick);
}
function _ordStartAutoScroll() {
  // 'drag' dispara continuamente na origem com a posição real do cursor (mais
  // confiável que 'dragover', que não cobre áreas fora da grade)
  document.addEventListener('drag', _ordTrackPointer);
  document.addEventListener('dragover', _ordTrackPointer);
  _ordZoneSince = 0;
  if (!_ordScrollRAF) _ordScrollRAF = requestAnimationFrame(_ordAutoScrollTick);
}
function _ordStopAutoScroll() {
  document.removeEventListener('drag', _ordTrackPointer);
  document.removeEventListener('dragover', _ordTrackPointer);
  _ordZoneSince = 0;
  if (_ordScrollRAF) { cancelAnimationFrame(_ordScrollRAF); _ordScrollRAF = null; }
}

async function ordenarSalvar() {
  // relê a ordem real do banco (verdade), pra não confiar em estado de memória
  // que pode ter dessincronizado se algum PATCH anterior falhou
  let dbMap = {};
  try {
    const cur = await api('GET', '/items/livros?filter[status][_eq]=published&limit=500&fields=id,sort');
    (cur.data || []).forEach(x => { dbMap[x.id] = x.sort; });
  } catch(e) { toast('Erro ao ler ordem atual: ' + e.message, true); return; }

  // renumera a ordem visível para sort = 1..N; grava só o que difere do banco
  const updates = [];
  ordenarData.forEach((l, i) => {
    const novo = i + 1;
    if (dbMap[l.id] !== novo) updates.push({ id: l.id, sort: novo });
  });
  if (!updates.length) { toast('A ordem já está salva.'); return; }

  toast(`Salvando ${updates.length} posições…`);
  let ok = 0, fail = 0;
  const pool = 6;
  for (let i = 0; i < updates.length; i += pool) {
    const results = await Promise.allSettled(updates.slice(i, i + pool).map(u =>
      api('PATCH', `/items/livros/${u.id}`, { sort: u.sort })));
    results.forEach(r => { if (r.status === 'fulfilled') ok++; else fail++; });
  }
  // sincroniza a memória com a nova ordem (1..N)
  ordenarData.forEach((l, i) => { l.sort = i + 1; });
  if (fail) toast(`Salvou ${ok}, ${fail} falharam — clique SALVAR de novo.`, true);
  else toast(`Ordem salva! (${ok} livros). A galeria já reflete.`);
}

// ── LIVROS · IMPORTAR (da biblioteca/Metabooks) ───────────────────────────────
let bibResultados = [];
let livrosIsbnSet = null;   // ISBNs já na coleção (normalizados)

// normaliza ISBN: só dígitos e X, ignora hifens/espaços em qualquer posição
function normIsbn(s) { return String(s || '').replace(/[^0-9Xx]/g, '').toUpperCase(); }

async function ensureLivrosIsbns(force) {
  if (livrosIsbnSet && !force) return livrosIsbnSet;
  const res = await api('GET', '/items/livros?limit=500&fields=isbn_fisico,isbn_ebook');
  const set = new Set();
  (res.data || []).forEach(l => { [l.isbn_fisico, l.isbn_ebook].forEach(v => { const n = normIsbn(v); if (n) set.add(n); }); });
  livrosIsbnSet = set;
  return set;
}

// "Sobrenome, Nome" -> "Nome Sobrenome" (mantém múltiplos separados por ;)
function flipAutor(s) {
  if (!s) return s;
  return s.split(';').map(p => {
    p = p.trim();
    const m = p.match(/^([^,]+),\s*(.+)$/);
    return m ? `${m[2].trim()} ${m[1].trim()}` : p;
  }).filter(Boolean).join('; ');
}

// cardápios prontos por editora (termo usado em filter[editora][_icontains])

async function bibCardapio(term, label) {
  const box = document.getElementById('bib-results');
  box.innerHTML = '<div class="loading"><span class="spinner"></span>CARREGANDO CARDÁPIO…</div>';
  try {
    const res = await api('GET', `/items/biblioteca?filter[editora][_icontains]=${encodeURIComponent(term)}&limit=500&fields=id,isbn,titulo,autor,editora,ano,capa_url,sinopse&sort=titulo`);
    bibResultados = res.data || [];
    await ensureLivrosIsbns();
    renderBibResultados(box, `${bibResultados.length} livros · ${esc(label)}`);
  } catch(e) { box.innerHTML = `<div class="empty"><div class="empty-icon">⚠</div><h3>Erro</h3><p>${e.message}</p></div>`; }
}

async function bibliotecaBuscar() {
  const q = document.getElementById('bib-q').value.trim();
  const box = document.getElementById('bib-results');
  if (!q) { box.innerHTML = ''; return; }
  box.innerHTML = '<div class="loading"><span class="spinner"></span>BUSCANDO…</div>';
  const isISBN = /^[0-9\-]{10,17}$/.test(q);
  const filter = isISBN
    ? `filter[isbn][_contains]=${encodeURIComponent(q.replace(/-/g, ''))}`
    : `filter[titulo][_icontains]=${encodeURIComponent(q)}`;
  try {
    const res = await api('GET', `/items/biblioteca?${filter}&limit=40&fields=id,isbn,titulo,autor,editora,ano,capa_url,sinopse&sort=titulo`);
    bibResultados = res.data || [];
    await ensureLivrosIsbns();
    renderBibResultados(box, isISBN ? `Resultado para ISBN ${esc(q)}` : `${bibResultados.length} resultado(s) para "${esc(q)}"`);
  } catch(e) { box.innerHTML = `<div class="empty"><div class="empty-icon">⚠</div><h3>Erro</h3><p>${e.message}</p></div>`; }
}

function renderBibResultados(box, header) {
  if (!bibResultados.length) { box.innerHTML = `<div class="empty"><div class="empty-icon">◌</div><h3>Nada encontrado</h3><p>Tente outro termo ou o ISBN.</p></div>`; return; }
  const set = livrosIsbnSet || new Set();
  const jaTemCount = bibResultados.filter(b => set.has(normIsbn(b.isbn))).length;
  const headerFull = `${header || ''}${jaTemCount ? ` · <span style="color:var(--green)">${jaTemCount} já na sua lista</span>` : ''}`;
  box.innerHTML = `<div style="font-size:11px;color:var(--fg2);margin-bottom:10px">${headerFull}</div>` +
    bibResultados.map(b => {
      const jaTem = !!b.isbn && set.has(normIsbn(b.isbn));
      return `
      <div style="display:flex;gap:12px;padding:12px 0;border-bottom:1px solid rgba(17,17,17,0.06);align-items:center;${jaTem ? 'opacity:0.6' : ''}">
        ${b.capa_url ? `<img src="${esc(b.capa_url)}" style="width:44px;height:62px;object-fit:cover;flex-shrink:0;background:var(--bg3)" alt="" loading="lazy">` : `<div style="width:44px;height:62px;background:var(--bg3);flex-shrink:0"></div>`}
        <div style="flex:1;min-width:0">
          <div style="font-size:13px">${esc(b.titulo || '—')}${jaTem ? ` <span style="color:var(--green);font-size:10px;letter-spacing:0.06em">✓ JÁ NA LISTA</span>` : ''}</div>
          <div style="font-size:11px;color:var(--fg2)">${esc(flipAutor(b.autor) || '—')} · ${esc(b.editora || '—')}${b.ano ? ' · ' + esc(b.ano) : ''}</div>
          <div style="font-size:10px;color:var(--fg2)">ISBN ${esc(b.isbn || '—')}</div>
        </div>
        <button class="btn btn-sm ${jaTem ? 'btn-green' : 'btn-yellow'}" id="bib-btn-${b.id}" onclick="bibliotecaImportar(${b.id})">${jaTem ? '✓ NA LISTA' : 'IMPORTAR'}</button>
      </div>`;
    }).join('');
}

async function bibliotecaImportar(id) {
  const b = bibResultados.find(x => x.id === id);
  if (!b) return;
  const btn = document.getElementById(`bib-btn-${id}`);
  if (btn) { btn.disabled = true; btn.textContent = 'IMPORTANDO…'; }
  try {
    // evita duplicar pelo ISBN
    if (b.isbn) {
      const dup = await api('GET', `/items/livros?filter[isbn_fisico][_eq]=${encodeURIComponent(b.isbn)}&limit=1&fields=id,title`);
      if (dup.data && dup.data.length) {
        if (!confirm(`Já existe um livro com esse ISBN ("${dup.data[0].title}"). Importar mesmo assim?`)) {
          if (btn) { btn.disabled = false; btn.textContent = 'IMPORTAR'; }
          return;
        }
      }
    }
    // capa: Directus baixa a URL no servidor (sem problema de CORS)
    let coverId = null;
    if (b.capa_url) {
      try {
        const f = await api('POST', '/files/import', { url: b.capa_url });
        coverId = f?.data?.id || null;
      } catch(e) { /* segue sem capa */ }
    }
    const body = {
      title:       b.titulo || 'Sem título',
      autor:       flipAutor(b.autor) || null,
      editora:     b.editora || null,
      ano:         parseInt(b.ano) || null,
      isbn_fisico: b.isbn || null,
      sinopse:     b.sinopse || null,
      status:      'draft',
    };
    if (coverId) body.Cover = coverId;
    await api('POST', '/items/livros', body);
    if (livrosIsbnSet && b.isbn) livrosIsbnSet.add(normIsbn(b.isbn));
    toast(`"${body.title}" importado como rascunho${coverId ? ' (com capa)' : ' (sem capa — adicione na edição)'}.`);
    if (btn) { btn.textContent = '✓ IMPORTADO'; btn.classList.remove('btn-yellow'); btn.classList.add('btn-green'); }
    loadCounts();
  } catch(e) {
    toast('Erro ao importar: ' + e.message, true);
    if (btn) { btn.disabled = false; btn.textContent = 'IMPORTAR'; }
  }
}

async function livrosCarregarColaboradores(livroId) {
  const list = document.getElementById('colab-list');
  if (!list) return;
  try {

// ── DIAGRAMAR (canvas livre de artes) ───────────────────────────────────────────
// coordenadas em "unidades" = % da largura da tela (x,y,w,h); object-position em %.
let diagObras = [];
let diagSel = null;
let diagCrop = false;     // modo enquadrar: arrastar a imagem dentro do quadro
let diagDirty = false;
let diagScale = 1;        // px por unidade
let _diagDrag = null;
const DIAG_MAXW = 980;

async function obrasDiagramar() {
  const panel = document.getElementById('obras-panel');
  panel.innerHTML = '<div class="loading"><span class="spinner"></span>CARREGANDO…</div>';
  try {
    const res = await api('GET', '/items/obras?limit=-1&fields=id,title,type,year,image,video,layout_x,layout_y,layout_w,layout_h,layout_z,layout_posx,layout_posy');
    diagObras = (res.data || []).filter(o => o.image || o.video).map(o => ({
      id: o.id, title: o.title, type: o.type, image: o.image, video: o.video,
      layout_x: o.layout_x ?? 5, layout_y: o.layout_y ?? 5,
      layout_w: o.layout_w ?? 30, layout_h: o.layout_h ?? 30,
      layout_z: o.layout_z ?? 1,
      layout_posx: o.layout_posx ?? 50, layout_posy: o.layout_posy ?? 50,
    }));
    diagSel = null; diagCrop = false; diagDirty = false;
    if (diagObras.length && diagObras.every(o => o.layout_x === 5 && o.layout_y === 5)) diagAutoArrange();
    diagRender();
  } catch (e) {
    panel.innerHTML = `<div class="empty"><div class="empty-icon">⚠</div><h3>Erro</h3><p>${e.message}</p></div>`;
  }
}

function diagAutoArrange() {
  const cols = 3, gap = 4, colW = (100 - gap * (cols + 1)) / cols;
  diagObras.forEach((o, i) => {
    const c = i % cols, r = Math.floor(i / cols);
    o.layout_w = colW; o.layout_h = colW;
    o.layout_x = gap + c * (colW + gap);
    o.layout_y = gap + r * (colW + gap);
    o.layout_z = 1; o.layout_posx = 50; o.layout_posy = 50;
  });
  diagDirty = true;
}

function diagBottomUnits() {
  return Math.max(120, ...diagObras.map(o => o.layout_y + o.layout_h)) + 12;
}

function diagRender() {
  const panel = document.getElementById('obras-panel');
  panel.innerHTML = `
    <div style="position:sticky;top:60px;background:var(--bg);z-index:20;padding:8px 0;display:flex;align-items:center;gap:12px;flex-wrap:wrap;border-bottom:1px solid rgba(17,17,17,0.06);margin-bottom:12px">
      <button class="btn btn-yellow btn-sm" id="diag-save" onclick="diagSalvar()">SALVAR LAYOUT</button>
      <button class="btn btn-ghost btn-sm" onclick="obrasDiagramar()">↺ DESCARTAR</button>
      <span style="font-size:11px;color:var(--fg2)">Arraste pra mover · alça ↘ redimensiona · selecione e use os botões.<span id="diag-status" style="color:var(--yellow)"></span></span>
    </div>
    <div id="diag-toolbar" style="min-height:30px;margin-bottom:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap"></div>
    <div id="diag-stage-wrap" style="overflow:auto;background:#fafafa;border:1px solid rgba(17,17,17,0.12);max-height:72vh">
      <div id="diag-stage" style="position:relative;margin:0 auto;background:#fff"></div>
    </div>`;
  const wrap = document.getElementById('diag-stage-wrap');
  const stageW = Math.min(wrap.clientWidth - 2, DIAG_MAXW);
  diagScale = stageW / 100;
  const stage = document.getElementById('diag-stage');
  stage.style.width = stageW + 'px';
  stage.style.height = (diagBottomUnits() * diagScale) + 'px';
  stage.innerHTML = diagObras.slice().sort((a, b) => a.layout_z - b.layout_z).map(diagPieceHTML).join('');
  stage.onpointerdown = diagPointerDown;
  diagRenderToolbar();
  diagUpdateStatus();
}

function diagMediaHTML(o) {
  const st = `width:100%;height:100%;object-fit:cover;object-position:${o.layout_posx}% ${o.layout_posy}%;display:block;pointer-events:none;user-select:none`;
  if (o.image) return `<img src="${directusImg(o.image, 600)}" style="${st}" draggable="false" alt="">`;
  if (o.video) return `<video src="${DIRECTUS}/assets/${o.video}" style="${st}" muted playsinline preload="metadata"></video>`;
  return '';
}

function diagPieceHTML(o) {
  const sel = o.id === diagSel;
  const x = o.layout_x * diagScale, y = o.layout_y * diagScale, w = o.layout_w * diagScale, h = o.layout_h * diagScale;
  return `
    <div class="diag-piece" data-id="${o.id}" style="position:absolute;left:${x}px;top:${y}px;width:${w}px;height:${h}px;z-index:${o.layout_z};outline:${sel ? '2px solid var(--red)' : '1px solid rgba(17,17,17,0.10)'};cursor:${sel && diagCrop ? 'move' : 'grab'};box-sizing:border-box;overflow:hidden;background:#f4f4f2;touch-action:none">
      ${diagMediaHTML(o)}
      ${sel ? `<div class="diag-handle" data-handle="se" style="position:absolute;right:-7px;bottom:-7px;width:14px;height:14px;background:var(--red);border:2px solid #fff;border-radius:50%;cursor:nwse-resize;z-index:9999"></div>` : ''}
    </div>`;
}

function diagRenderToolbar() {
  const tb = document.getElementById('diag-toolbar');
  if (!tb) return;
  if (!diagSel) { tb.innerHTML = `<span style="font-size:11px;color:var(--fg2)">nenhuma obra selecionada — clique numa</span>`; return; }
  const o = diagObras.find(x => x.id === diagSel);
  tb.innerHTML = `
    <span style="font-size:12px;margin-right:4px;font-weight:600">${esc(o.title || '(sem título)')}</span>
    <button class="btn btn-ghost btn-sm" onclick="diagZ(1)">↥ frente</button>
    <button class="btn btn-ghost btn-sm" onclick="diagZ(-1)">↧ trás</button>
    <button class="btn btn-sm ${diagCrop ? 'btn-primary' : 'btn-ghost'}" onclick="diagToggleCrop()">✛ enquadrar${diagCrop ? ' (ON)' : ''}</button>
    <button class="btn btn-ghost btn-sm" onclick="diagResetFrame()">↺ proporção original</button>`;
}

function diagPointerDown(e) {
  const handle = e.target.closest('.diag-handle');
  const piece = e.target.closest('.diag-piece');
  if (!piece) { if (diagSel !== null) { diagSel = null; diagRender(); } return; }
  const id = +piece.dataset.id;
  if (id !== diagSel) { diagSel = id; diagCrop = false; diagRender(); }
  const o = diagObras.find(x => x.id === diagSel);
  const mode = handle ? 'resize' : (diagCrop ? 'crop' : 'move');
  _diagDrag = { mode, id, sx: e.clientX, sy: e.clientY, ox: o.layout_x, oy: o.layout_y, ow: o.layout_w, oh: o.layout_h, opx: o.layout_posx, opy: o.layout_posy };
  window.addEventListener('pointermove', diagPointerMove);
  window.addEventListener('pointerup', diagPointerUp, { once: true });
  e.preventDefault();
}

function diagPointerMove(e) {
  if (!_diagDrag) return;
  const o = diagObras.find(x => x.id === _diagDrag.id);
  const du = (e.clientX - _diagDrag.sx) / diagScale;
  const dv = (e.clientY - _diagDrag.sy) / diagScale;
  if (_diagDrag.mode === 'move') {
    o.layout_x = Math.max(0, Math.min(100 - o.layout_w, _diagDrag.ox + du));
    o.layout_y = Math.max(0, _diagDrag.oy + dv);
  } else if (_diagDrag.mode === 'resize') {
    o.layout_w = Math.max(5, Math.min(100 - o.layout_x, _diagDrag.ow + du));
    o.layout_h = Math.max(5, _diagDrag.oh + dv);
  } else if (_diagDrag.mode === 'crop') {
    const fw = o.layout_w * diagScale, fh = o.layout_h * diagScale;
    o.layout_posx = Math.max(0, Math.min(100, _diagDrag.opx - (e.clientX - _diagDrag.sx) / fw * 100));
    o.layout_posy = Math.max(0, Math.min(100, _diagDrag.opy - (e.clientY - _diagDrag.sy) / fh * 100));
  }
  diagApplyPiece(o);
  diagDirty = true; diagUpdateStatus();
  const stage = document.getElementById('diag-stage');
  if (stage) stage.style.height = (diagBottomUnits() * diagScale) + 'px';
}

function diagApplyPiece(o) {
  const el = document.querySelector(`.diag-piece[data-id="${o.id}"]`);
  if (!el) return;
  el.style.left = (o.layout_x * diagScale) + 'px';
  el.style.top = (o.layout_y * diagScale) + 'px';
  el.style.width = (o.layout_w * diagScale) + 'px';
  el.style.height = (o.layout_h * diagScale) + 'px';
  const m = el.querySelector('img,video');
  if (m) m.style.objectPosition = `${o.layout_posx}% ${o.layout_posy}%`;
}

function diagPointerUp() {
  _diagDrag = null;
  window.removeEventListener('pointermove', diagPointerMove);
}

function diagZ(dir) {
  const o = diagObras.find(x => x.id === diagSel); if (!o) return;
  const zs = diagObras.map(x => x.layout_z);
  o.layout_z = dir > 0 ? Math.max(...zs) + 1 : Math.min(...zs) - 1;
  diagDirty = true; diagRender();
}

function diagToggleCrop() { diagCrop = !diagCrop; diagRender(); }

function diagResetFrame() {
  const o = diagObras.find(x => x.id === diagSel); if (!o) return;
  const m = document.querySelector(`.diag-piece[data-id="${o.id}"] img, .diag-piece[data-id="${o.id}"] video`);
  let ar = 1;
  if (m && m.naturalWidth) ar = m.naturalHeight / m.naturalWidth;
  else if (m && m.videoWidth) ar = m.videoHeight / m.videoWidth;
  o.layout_h = o.layout_w * ar; o.layout_posx = 50; o.layout_posy = 50;
  diagDirty = true; diagRender();
}

function diagUpdateStatus() {
  const s = document.getElementById('diag-status');
  if (s) s.textContent = diagDirty ? ' — alterações não salvas' : '';
  const b = document.getElementById('diag-save');
  if (b && !b.disabled) b.textContent = diagDirty ? 'SALVAR LAYOUT *' : 'SALVAR LAYOUT';
}

async function diagSalvar() {
  const btn = document.getElementById('diag-save');
  btn.disabled = true; btn.textContent = 'SALVANDO…';
  const r = n => Math.round(n * 100) / 100;
  try {
    await Promise.all(diagObras.map(o => api('PATCH', `/items/obras/${o.id}`, {
      layout_x: r(o.layout_x), layout_y: r(o.layout_y), layout_w: r(o.layout_w), layout_h: r(o.layout_h),
      layout_z: Math.round(o.layout_z), layout_posx: r(o.layout_posx), layout_posy: r(o.layout_posy)
    })));
    diagDirty = false; toast('Layout salvo');
  } catch (e) { toast('Erro ao salvar: ' + e.message, true); }
  btn.disabled = false; diagUpdateStatus();
}

async function obrasSalvar(id) {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { toast('Título é obrigatório', true); return; }
  const body = {
    title,
    type:        document.getElementById('f-type').value.trim() || null,
    year:        document.getElementById('f-year').value.trim() || null,
    order:       parseInt(document.getElementById('f-order').value) || null,
    description: document.getElementById('f-desc').value.trim() || null,
    link:        document.getElementById('f-link').value.trim() || null,
    status:      document.getElementById('tog-status').classList.contains('on') ? 'published' : 'draft',
  };
  const covId = document.getElementById('cover-id').value;
  if (covId) body.image = covId;
  const fileInput = document.getElementById('cover-file');
  if (fileInput.files[0] && !covId) {
    try { const f = await uploadFile(fileInput.files[0]); body.image = f.id; }
    catch(e) { toast('Erro no upload da imagem: ' + e.message, true); return; }
  }
  const vidId = document.getElementById('video-id').value;
  if (vidId) body.video = vidId;
  const videoInput = document.getElementById('video-file');
  if (videoInput.files[0] && !vidId) {
    try { const f = await uploadFile(videoInput.files[0]); body.video = f.id; }
    catch(e) { toast('Erro no upload do vídeo: ' + e.message, true); return; }
  }
  try {
    if (id) await api('PATCH', `/items/obras/${id}`, body);

function rtCmd(e, cmd) { e.preventDefault(); document.execCommand(cmd, false, null); const ed = document.getElementById('rt-editor'); if (ed) ed.focus(); }
function rtBlock(e, tag) { e.preventDefault(); document.execCommand('formatBlock', false, '<' + tag + '>'); const ed = document.getElementById('rt-editor'); if (ed) ed.focus(); }
function rtLink(e) {
  e.preventDefault();
  const url = prompt('URL do link (https://…):', 'https://');
  if (url && url !== 'https://') document.execCommand('createLink', false, url.trim());
  const ed = document.getElementById('rt-editor'); if (ed) ed.focus();
}
function rtGetContent() {
  const ed = document.getElementById('rt-editor');
  if (!ed) return null;
  let html = ed.innerHTML.trim();
  if (!html || html === '<br>' || html === '<p><br></p>') return null;
  // links externos abrem em nova aba
  html = html.replace(/<a (?![^>]*\btarget=)([^>]*href="https?:\/\/[^"]*"[^>]*)>/gi, '<a target="_blank" rel="noopener" $1>');
  return html;
}

    || title.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');

// Preview markdown simples
function previewMd() {
  const el = document.getElementById('f-body');
  const prev = document.getElementById('md-preview');
  if (!el || !prev) return;
  let txt = el.value;
  txt = txt
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/`(.+?)`/g,'<code>$1</code>')
    .replace(/\[(.+?)\]\((.+?)\)/g,'<a href="$2">$1</a>')
    .replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>')
    .replace(/^---$/gm,'<hr>')
    .replace(/\n\n/g,'</p><p>')
    .replace(/\n/g,'<br>');
  prev.innerHTML = '<p>' + txt + '</p>';
}

// ── CROP TOOL ─────────────────────────────────────────────────────────────────

function initCropOverlay(fxVal, fyVal) {
  const img = document.getElementById('focal-img');
  if (!img?.src) return;
  const run = () => {
    const W = img.clientWidth, H = img.clientHeight;
    if (!W || !H) { requestAnimationFrame(run); return; }
    const overlay = document.getElementById('crop-overlay');
    if (!overlay) return;
    const cropSize = Math.min(W, H);
    overlay.style.width  = cropSize + 'px';
    overlay.style.height = cropSize + 'px';
    overlay.style.display = 'block';
    const cx = fxVal != null ? (fxVal / 1000 * W) : W / 2;
    const cy = fyVal != null ? (fyVal / 1000 * H) : H / 2;
    cropMoveTo(cx - cropSize / 2, cy - cropSize / 2, W, H, cropSize);
    // Load actual Directus thumbnail as preview if cover already exists
    const covId = document.getElementById('cover-id')?.value;
    if (covId) loadDirectusPreview(covId);
    const hint = document.getElementById('focal-hint');
    if (hint) hint.textContent = fxVal != null ? 'Crop salvo — arraste para alterar' : 'Crop centrado — arraste para ajustar';
  };
  if (img.complete && img.naturalWidth) requestAnimationFrame(run);
  else img.addEventListener('load', run, { once: true });
}

function cropMoveTo(left, top, W, H, cropSize) {
  const overlay = document.getElementById('crop-overlay');
  if (!overlay) return {};
  const l = Math.max(0, Math.min(W - cropSize, left));
  const t = Math.max(0, Math.min(H - cropSize, top));
  overlay.style.left = l + 'px';
  overlay.style.top  = t + 'px';
  const fx = Math.round((l + cropSize / 2) / W * 1000);
  const fy = Math.round((t + cropSize / 2) / H * 1000);
  document.getElementById('focal-x').value = fx;
  document.getElementById('focal-y').value = fy;
  // Live JS preview while dragging
  const pImg = document.getElementById('crop-preview-img');
  const img  = document.getElementById('focal-img');
  if (pImg && img && pImg.dataset.mode !== 'directus') {
    const scale = 100 / cropSize;
    pImg.src           = img.src;
    pImg.style.cssText = `position:absolute;display:block;width:${W*scale}px;height:${H*scale}px;left:${-l*scale}px;top:${-t*scale}px`;
  }
  return { fx, fy };
}

function loadDirectusPreview(covId) {
  const pImg = document.getElementById('crop-preview-img');
  if (!pImg) return;
  const url = `${DIRECTUS}/assets/${covId}?fit=cover&width=200&height=200&quality=90&format=webp&_t=${Date.now()}`;
  pImg.dataset.mode  = 'directus';
  pImg.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;display:block';
  pImg.src = url;
  const hint = document.getElementById('focal-hint');
  if (hint && hint.textContent.includes('Salvando')) hint.textContent = 'Preview real — arraste para ajustar';
}

async function scheduleFocalPreview(covId, fx, fy) {
  clearTimeout(_focalPreviewTimer);
  const hint = document.getElementById('focal-hint');
  if (hint) hint.textContent = 'Salvando crop...';
  _focalPreviewTimer = setTimeout(async () => {
    try {
      await api('PATCH', `/files/${covId}`, { focal_point_x: fx, focal_point_y: fy });
      loadDirectusPreview(covId);
      document.getElementById('focal-x').value = fx;
      document.getElementById('focal-y').value = fy;
    } catch(e) {
      const h = document.getElementById('focal-hint');
      if (h) h.textContent = 'Erro ao salvar crop';
    }
  }, 400);
}

function setupCropDrag() {
  const overlay = document.getElementById('crop-overlay');
  if (!overlay) return;
  const startDrag = (clientX, clientY) => {
    const startX = clientX, startY = clientY;
    const startL = overlay.offsetLeft, startT = overlay.offsetTop;
    const img = document.getElementById('focal-img');
    const W = img.clientWidth, H = img.clientHeight;
    const cropSize = Math.min(W, H);
    // Switch preview to JS mode while dragging
    const pImg = document.getElementById('crop-preview-img');
    if (pImg) pImg.dataset.mode = '';
    _cropMove = mv => {
      const cx = (mv.touches ? mv.touches[0].clientX : mv.clientX);
      const cy = (mv.touches ? mv.touches[0].clientY : mv.clientY);
      cropMoveTo(startL + cx - startX, startT + cy - startY, W, H, cropSize);
    };
    _cropEnd = () => {
      const covId = document.getElementById('cover-id')?.value;
      const fx = parseInt(document.getElementById('focal-x')?.value);
      const fy = parseInt(document.getElementById('focal-y')?.value);
      if (covId && !isNaN(fx) && !isNaN(fy)) scheduleFocalPreview(covId, fx, fy);
      _cropMove = null; _cropEnd = null;
    };
  };
  overlay.onmousedown  = e => { startDrag(e.clientX, e.clientY); e.preventDefault(); };
  overlay.ontouchstart = e => { startDrag(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault(); };
}

              <td>${esc(c.name || '—')}</td>
              <td style="color:var(--fg2)">${c.website ? `<a href="${esc(c.website)}" target="_blank" style="color:var(--fg2);border-bottom:1px solid rgba(17,17,17,0.2)">${esc(c.website)}</a>` : '—'}</td>
              <td><span class="badge ${c.status === 'published' ? 'badge-published' : 'badge-draft'}">${c.status === 'published' ? 'publicado' : 'rascunho'}</span></td>
              <td class="row-actions">
                <button class="btn btn-ghost btn-sm" onclick="colaboradoresEditar(${c.id})">EDITAR</button>
                <button class="btn btn-danger btn-sm" onclick="colaboradoresDeletar(${c.id},'${esc(c.name)}')">✕</button>
              </td>
            </tr>`).join('')}
        </tbody>
      </table>`;
  } catch(e) {
    panel.innerHTML = `<div class="empty"><div class="empty-icon">⚠</div><h3>Erro</h3><p>${e.message}</p></div>`;
  }
}

function colaboradoresFormNovo(item = null) {
  const panel = document.getElementById('colab-panel');
  panel.innerHTML = `
    <div style="max-width:480px">
      <div class="form-grid">
        <div class="field full">
          <label>NOME *</label>
          <input type="text" id="f-name" value="${esc(item?.name || '')}" placeholder="Nome completo">
        </div>
        <div class="field full">
          <label>WEBSITE</label>
          <input type="url" id="f-website" value="${esc(item?.website || '')}" placeholder="https://…">
        </div>
        <div class="field">
          <div class="toggle-wrap" onclick="toggleEl('tog-status')" style="padding-top:18px">
            <div class="toggle ${item?.status === 'published' ? 'on' : ''}" id="tog-status"></div>
            <span class="toggle-label">PUBLICADO</span>
          </div>
        </div>
      </div>
      <div style="display:flex;gap:10px;margin-top:24px">
        <button class="btn btn-primary" onclick="colaboradoresSalvar(${item?.id || 'null'})" style="background:#ff44bb">${item ? 'SALVAR' : 'CRIAR COLABORADOR'}</button>
        <button class="btn btn-ghost" onclick="colaboradoresTab('lista')">CANCELAR</button>
      </div>
    </div>`;
}

async function colaboradoresEditar(id) {
  const item = colaboradoresData.find(c => c.id === id);
  if (!item) return;
  colaboradoresTab('novo');
  document.getElementById('tab-colab-novo').textContent = 'EDITAR';
  colaboradoresFormNovo(item);
}

async function colaboradoresSalvar(id) {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { toast('Nome é obrigatório', true); return; }
  const body = {
    name,
    website: document.getElementById('f-website').value.trim() || null,
    status:  document.getElementById('tog-status').classList.contains('on') ? 'published' : 'draft',
  };
  try {
    if (id) await api('PATCH', `/items/colaboradores/${id}`, body);
    else    await api('POST',  '/items/colaboradores', body);
    toast(id ? 'Colaborador atualizado!' : 'Colaborador criado!');
    colaboradoresTab('lista');
    loadCounts();
  } catch(e) { toast('Erro: ' + e.message, true); }
}

async function colaboradoresDeletar(id, name) {
  if (!confirm(`Deletar "${name}"?`)) return;
  try {
    await api('DELETE', `/items/colaboradores/${id}`);
    toast('Colaborador deletado.');
    colaboradoresCarregarLista();
    loadCounts();
  } catch(e) { toast('Erro: ' + e.message, true); }
}

// ── CROP DRAG STATE ───────────────────────────────────────────────────────────
let _cropMove = null, _cropEnd = null, _focalPreviewTimer = null;
document.addEventListener('mousemove', e => { if (_cropMove) _cropMove(e); });
document.addEventListener('mouseup',   () => { if (_cropEnd) _cropEnd(); });
document.addEventListener('touchmove', e => { if (_cropMove) { _cropMove(e); e.preventDefault(); } }, { passive: false });
document.addEventListener('touchend',  () => { if (_cropEnd) _cropEnd(); });

(async () => {
  if (token) {
    const ok = await checkAuth();
    if (ok) { showApp(); return; }
  }
  document.getElementById('view-login').style.display = 'flex';
})();
</script>
</body>
