<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Livros — galeria</title>
<link rel="preconnect" href="https://directus-production-afdd.up.railway.app" crossorigin>
<link rel="dns-prefetch" href="https://directus-production-afdd.up.railway.app">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --line: #000;
  --lw: 2px;
  --cols: 6;
  /* Neue Haas Grotesk é comercial e não está embarcada; Helvetica/Arial é o equivalente mais próximo */
  --f-brand: 'Neue Haas Grotesk Display Pro', 'Neue Haas Grotesk', 'Helvetica Neue', Helvetica, Arial, sans-serif;
}

html, body { background: #ffffff; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  color: #111;
}

/* topo: header */
.top {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 20px 28px 14px;
  flex-wrap: wrap;
}
.back {
  display: inline-flex;
  text-decoration: none;
  color: #111;
  line-height: 1;
}
.back svg { display: block; width: 28px; height: 22px; }
.brand {
  font-family: var(--f-brand);
  font-weight: 700;
  font-size: 16px;
  letter-spacing: 0.04em;
  color: #111;
  text-decoration: none;
  white-space: nowrap;
}
.topnav { font-family: var(--f-brand); font-size: 15px; color: #111; }
.topnav a {
  color: #111;
  text-decoration: underline;
  text-underline-offset: 2px;
  text-decoration-thickness: 1px;
}
.topnav a:hover { color: #777; }

/* GRID */
.gal-wrap { overflow: hidden; }      /* recorta as bordas externas direita/baixo */
.gal {
  display: grid;
  grid-template-columns: repeat(var(--cols), 1fr);
  /* só linhas internas: sem borda em cima e na esquerda; direita/baixo recortadas */
  margin: 0 calc(-1 * var(--lw)) calc(-1 * var(--lw)) 0;
}

.cell {
  border-right: var(--lw) solid var(--line);
  border-bottom: var(--lw) solid var(--line);
  aspect-ratio: 1 / 1.04;       /* quase quadrada, como na referência */
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 8px;
  background: #fff;
  text-decoration: none;
  position: relative;
}

.cell img {
  /* escala vinda do formato físico (--scale): altura manda; largura limitada p/ não estourar */
  max-height: calc(var(--scale, 0.75) * 100%);
  max-width: 86%;
  width: auto;
  height: auto;
  object-fit: contain;          /* capa inteira: nem esticada, nem cortada */
  display: block;
}

.cell .ph {
  width: 70%; height: 80%;
  display: flex; align-items: center; justify-content: center;
  border: 1px dashed #ccc;
  font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
  color: #bbb;
}

/* legenda no hover */
.cell .cap {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  padding: 10px 12px;
  background: linear-gradient(transparent, rgba(255,255,255,0.96) 40%);
  opacity: 0;
  transition: opacity 0.15s;
  pointer-events: none;
}
.cell:hover .cap { opacity: 1; }
.cell .cap .t { font-size: 11px; font-weight: 600; line-height: 1.2; }
.cell .cap .a { font-size: 10px; color: #666; margin-top: 2px; }

.loading {
  grid-column: 1 / -1;
  padding: 80px 0;
  text-align: center;
  font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; color: #aaa;
}

@media (max-width: 1100px) { :root { --cols: 4; } }
@media (max-width: 700px)  { :root { --cols: 3; } .cell { padding: 16px 12px; } }
@media (max-width: 460px)  { :root { --cols: 2; } }
</style>
</head>
<body>

<header class="top">
  <a class="back" href="index.html" aria-label="início">
    <svg viewBox="0 0 34 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M13 4 L3 14 L13 24 M3 14 H32" stroke="#111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </a>
  <a class="brand" href="index.html">DANIEL LAMEIRA</a>
  <nav class="topnav">
    <a href="livros.html">livros</a>, <a href="index.html#obras">arte</a>, <a href="posts.html">textos</a> e <a href="index.html#me">bio</a>
  </nav>
</header>

<div class="gal-wrap">
  <div class="gal" id="gal">
    <div class="loading">carregando…</div>
  </div>
</div>

<script>
const DIRECTUS = 'https://directus-production-afdd.up.railway.app';

function directusImg(id, width) {
  if (!id) return null;
  return `${DIRECTUS}/assets/${id}?width=${width}&quality=85&format=webp`;
}
function px(n) { return Math.round(n * (window.devicePixelRatio || 1)); }

async function fetchLivros() {
  const res = await fetch(`${DIRECTUS}/items/livros?filter[status][_eq]=published&sort[]=sort&sort[]=-ano&limit=500&fields=id,title,autor,Cover,formato`);
  const data = await res.json();
  return data.data || [];
}

// escala (0..1) da capa a partir do formato físico.
// a maior dimensão em cm = altura do livro; mapeia [12cm..26cm] -> [0.50..0.90]
function escalaFormato(formato) {
  if (!formato) return 0.75;
  const nums = (formato.match(/[\d.]+/g) || []).map(Number).filter(n => n > 0);
  if (!nums.length) return 0.75;
  const altura = Math.max(...nums);                 // ignora espessura/largura menores
  const s = 0.55 + (altura - 12) / (26 - 12) * (0.99 - 0.55);
  return Math.max(0.50, Math.min(0.99, s));
}

function render(livros) {
  const gal = document.getElementById('gal');
  gal.innerHTML = '';
  livros.forEach(livro => {
    const covId = livro.Cover || livro.cover;
    const a = document.createElement('a');
    a.className = 'cell';
    a.href = `livro.html?id=${livro.id}`;
    a.style.setProperty('--scale', escalaFormato(livro.formato).toFixed(3));
    a.innerHTML = (covId
      ? `<img src="${directusImg(covId, px(400))}" alt="${livro.title || ''}" loading="lazy">`
      : `<div class="ph">capa</div>`)
      + `<div class="cap"><div class="t">${livro.title || ''}</div><div class="a">${livro.autor || ''}</div></div>`;
    gal.appendChild(a);
  });
}

(async () => {
  try {
    render(await fetchLivros());
  } catch (e) {
    document.getElementById('gal').innerHTML = '<div class="loading">erro ao carregar</div>';
  }
})();
</script>

</body>
</html>
