<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preload" href="fonts/NeueHaasDisplay-Roman.ttf" as="font" type="font/ttf" crossorigin>
<link rel="preload" href="fonts/NeueHaasDisplay-Medium.ttf" as="font" type="font/ttf" crossorigin>
<link rel="preload" href="fonts/NeueHaasDisplay-Bold.ttf" as="font" type="font/ttf" crossorigin>

<title>Livros — galeria</title>
<link rel="preconnect" href="https://directus-production-afdd.up.railway.app" crossorigin>
<link rel="dns-prefetch" href="https://directus-production-afdd.up.railway.app">
<style>
@font-face { font-family: 'Neue Haas Grotesk'; font-weight: 400; font-style: normal; font-display: block; src: url('fonts/NeueHaasDisplay-Roman.ttf') format('truetype'); }
@font-face { font-family: 'Neue Haas Grotesk'; font-weight: 500; font-style: normal; font-display: block; src: url('fonts/NeueHaasDisplay-Medium.ttf') format('truetype'); }
@font-face { font-family: 'Neue Haas Grotesk'; font-weight: 700; font-style: normal; font-display: block; src: url('fonts/NeueHaasDisplay-Bold.ttf') format('truetype'); }

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --line: #000;
  --lw: 2px;
  --cols: 6;
  --f-brand: 'Neue Haas Grotesk', 'Helvetica Neue', Helvetica, Arial, sans-serif;
}

html, body { background: #ffffff; }
body {
  font-family: var(--f-brand);
  color: #111;
  -webkit-font-smoothing: antialiased;
}

/* topo: header */
.top {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 20px 28px 14px;
  flex-wrap: wrap;
}
.back {
  display: inline-flex;
  text-decoration: none;
  color: #111;
  line-height: 1;
}
.back svg { display: block; width: 24px; height: 19px; }
.brand {
  font-family: var(--f-brand);
  font-weight: 500;
  font-size: 16px;
  letter-spacing: 0.04em;
  color: #111;
  text-decoration: none;
  white-space: nowrap;
}
.topnav { font-family: var(--f-brand); font-weight: 500; font-size: 15px; color: #111; }
.topnav a {
  color: #111;
  text-decoration: underline;
  text-underline-offset: 2px;
  text-decoration-thickness: 1px;
}
.topnav a:hover { color: #0000EE; }

/* filtros: botão funil discreto à direita + menu (editora + direção de arte) */
.filter { margin-left: auto; position: relative; }
.filter-btn {
  background: none; border: none; padding: 4px 2px; cursor: pointer; color: #b0b0b0;
  display: inline-flex; align-items: center; gap: 5px; line-height: 1;
  transition: color 0.15s ease;
}
.filter-btn:hover { color: #555; }
.filter-btn.active { color: #111; }            /* funil escurece quando há filtro ativo */
.filter-btn .funnel { display: block; }
.filter-btn .caret { transition: transform 0.18s ease; }
.filter.open .filter-btn .caret { transform: rotate(180deg); }
.filter.open .filter-btn { color: #111; }

.filter-menu {
  position: absolute; top: calc(100% + 12px); right: 0;
  min-width: 230px; max-height: 70vh; overflow-y: auto;
  background: #fff; border: 1px solid #111; padding: 7px 0; z-index: 60; display: none;
}
.filter.open .filter-menu { display: block; }
.filter-menu .fgroup {
  font-family: var(--f-brand); font-size: 10.5px; letter-spacing: 0.13em; text-transform: uppercase;
  color: #aaa; padding: 8px 18px 5px;
}
.filter-menu button {
  display: flex; align-items: center; gap: 9px; width: 100%; text-align: left;
  font-family: var(--f-brand); font-size: 14px; color: #111; line-height: 1.25;
  background: none; border: none; padding: 7px 18px; cursor: pointer; white-space: nowrap;
}
.filter-menu button:hover { background: #f3f3f3; }
.filter-menu button.active { font-weight: 700; }
.filter-menu .sep { height: 1px; background: #e6e6e6; margin: 7px 0; }

/* caixinha de check (direção de arte) */
.da-box {
  width: 13px; height: 13px; border: 1.5px solid #c2c2c2; border-radius: 3px;
  display: inline-block; position: relative; transition: all 0.15s ease; flex: none;
}
.filter-menu button[aria-pressed="true"] .da-box { background: #111; border-color: #111; }
.filter-menu button[aria-pressed="true"] .da-box::after {
  content: ''; position: absolute; left: 3.5px; top: 0.5px;
  width: 3px; height: 7px; border: solid #fff; border-width: 0 1.5px 1.5px 0; transform: rotate(45deg);
}
@media (max-width: 600px) { .filter { margin-left: 0; } }

/* GRID */
.gal-wrap { overflow: hidden; }      /* recorta as bordas externas direita/baixo */
.gal {
  display: grid;
  grid-template-columns: repeat(var(--cols), 1fr);
  /* linha no topo do grid; laterais direita/baixo recortadas pelo .gal-wrap */
  border-top: var(--lw) solid var(--line);
  margin: 0 calc(-1 * var(--lw)) calc(-1 * var(--lw)) 0;
}

.cell {
  border-right: var(--lw) solid var(--line);
  border-bottom: var(--lw) solid var(--line);
  aspect-ratio: 1 / 1.04;       /* quase quadrada, como na referência */
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 8px;
  background: #fff;
  text-decoration: none;
  position: relative;
  overflow: hidden;             /* trava qualquer estouro dentro da célula */
}

/* imagem absoluta e centralizada: não estica a célula (corrige Safari/iPhone) */
.cell img {
  position: absolute;
  top: 50%;
  left: 50%;
  max-height: calc(var(--scale, 0.75) * 100%);   /* escala pelo formato físico */
  max-width: 86%;
  width: auto;
  height: auto;
  object-fit: contain;          /* capa inteira: nem esticada, nem cortada */
  display: block;
  transform: translate(-50%, -50%);
  transform-origin: center;
  backface-visibility: hidden;
  transition: transform 0.3s cubic-bezier(0.22, 0.61, 0.36, 1);
}
.cell:hover img {
  transform: translate(-50%, -50%) scale(1.018);
}

.cell .ph {
  width: 70%; height: 80%;
  display: flex; align-items: center; justify-content: center;
  border: 1px dashed #ccc;
  font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
  color: #bbb;
}

.loading {
  grid-column: 1 / -1;
  padding: 80px 0;
  text-align: center;
  font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; color: #aaa;
}

@media (max-width: 1100px) { :root { --cols: 4; } }
@media (max-width: 700px)  { :root { --cols: 3; } .cell { padding: 16px 12px; } }
@media (max-width: 460px)  { :root { --cols: 2; } }
</style>
</head>
<body>

<header class="top">
  <a class="back" href="index.html" aria-label="início">
    <svg viewBox="0 0 34 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M13 4 L3 14 L13 24 M3 14 H32" stroke="#111" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </a>
  <a class="brand" href="index.html">DANIEL LAMEIRA</a>
  <nav class="topnav">
    <a href="livros.html">livros</a>, <a href="textos.html">textos</a>, <a href="artes.html">artes</a> e <a href="sobre.html">sobre</a>
  </nav>

  <div class="filter" id="filter">
    <button class="filter-btn" id="filterBtn" aria-haspopup="true" aria-expanded="false" title="filtros">
      <svg class="funnel" width="15" height="15" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M1.5 2.5 H14.5 L9.2 8.6 V13 L6.8 14.3 V8.6 Z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>
      <svg class="caret" width="10" height="7" viewBox="0 0 10 7" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M1 1.5 L5 5.5 L9 1.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <div class="filter-menu" id="filterMenu"></div>
  </div>
</header>

<div class="gal-wrap">
  <div class="gal" id="gal">
    <div class="loading">carregando…</div>
  </div>
</div>

<script>
const DIRECTUS = 'https://directus-production-afdd.up.railway.app';

function directusImg(id, width) {
  if (!id) return null;
  return `${DIRECTUS}/assets/${id}?width=${width}&quality=85&format=webp`;
}
function px(n) { return Math.round(n * (window.devicePixelRatio || 1)); }

async function fetchLivros() {
  const res = await fetch(`${DIRECTUS}/items/livros?filter[status][_eq]=published&sort[]=sort&sort[]=-ano&limit=500&fields=id,title,autor,Cover,formato,editora,direcao_arte`);
  const data = await res.json();
  return data.data || [];
}

// escala (0..1) da capa a partir do formato físico.
// a maior dimensão em cm = altura do livro; mapeia [12cm..26cm] -> [0.50..0.90]
function escalaFormato(formato) {
  if (!formato) return 0.675;
  const nums = (formato.match(/[\d.]+/g) || []).map(Number).filter(n => n > 0);
  if (!nums.length) return 0.675;
  const altura = Math.max(...nums);                 // ignora espessura/largura menores
  const s = 0.55 + (altura - 12) / (26 - 12) * (0.99 - 0.55);
  // teto = tamanho de um 16x23; tudo 10% menor que o tamanho-base
  return 0.9 * Math.max(0.50, Math.min(0.90, s));
}

function render(livros) {
  const gal = document.getElementById('gal');
  gal.innerHTML = '';
  livros.forEach(livro => {
    const covId = livro.Cover || livro.cover;
    const a = document.createElement('a');
    a.className = 'cell';
    a.href = `livro.html?id=${livro.id}`;
    a.style.setProperty('--scale', escalaFormato(livro.formato).toFixed(3));
    a.title = `${livro.title || ''}${livro.autor ? ' — ' + livro.autor : ''}`;
    a.innerHTML = covId
      ? `<img src="${directusImg(covId, px(400))}" alt="${livro.title || ''}" loading="lazy">`
      : `<div class="ph">capa</div>`;
    gal.appendChild(a);
  });
}

/* ---- filtro por editora ---- */
let allLivros = [];
let currentEditora = null;
let onlyDA = false;

// editoras de um livro, já normalizadas: separa co-edições (";" "/") e
// remove o prefixo "Editora " pra unir duplicatas (Aleph / Editora Aleph)
function editorasDe(livro) {
  return (livro.editora || '')
    .split(/\s*[;/]\s*/)
    .map(e => e.trim().replace(/^editora\s+/i, '').trim())
    .filter(Boolean);
}

function applyFilter() {
  let list = allLivros;
  if (currentEditora) list = list.filter(l => editorasDe(l).includes(currentEditora));
  if (onlyDA) list = list.filter(l => l.direcao_arte === true);
  render(list);
}

function buildFilter() {
  const filterEl = document.getElementById('filter');
  const btn = document.getElementById('filterBtn');
  const menu = document.getElementById('filterMenu');

  function close() { filterEl.classList.remove('open'); btn.setAttribute('aria-expanded', 'false'); }
  function syncBtn() { btn.classList.toggle('active', onlyDA || !!currentEditora); }
  function group(text) { const g = document.createElement('div'); g.className = 'fgroup'; g.textContent = text; return g; }
  function sep() { const s = document.createElement('div'); s.className = 'sep'; return s; }

  menu.innerHTML = '';

  // ---- direção de arte (toggle) ----
  menu.appendChild(group('direção de arte'));
  const daBtn = document.createElement('button');
  daBtn.type = 'button';
  daBtn.setAttribute('aria-pressed', 'false');
  daBtn.innerHTML = '<span class="da-box"></span><span>com a minha direção de arte</span>';
  daBtn.addEventListener('click', () => {
    onlyDA = !onlyDA;
    daBtn.setAttribute('aria-pressed', onlyDA ? 'true' : 'false');
    syncBtn();
    applyFilter();   // toggle: mantém o menu aberto
  });
  menu.appendChild(daBtn);

  // ---- editora (seleção única) ----
  const editoras = [...new Set(allLivros.flatMap(editorasDe))]
    .sort((a, b) => a.localeCompare(b, 'pt', { sensitivity: 'base' }));

  if (editoras.length) {
    menu.appendChild(sep());
    menu.appendChild(group('editora'));
    function makeEd(text, val) {
      const b = document.createElement('button');
      b.type = 'button';
      b.innerHTML = `<span>${text}</span>`;
      b.dataset.val = val == null ? '' : val;
      b.addEventListener('click', () => {
        currentEditora = val;
        menu.querySelectorAll('button[data-val]').forEach(x => x.classList.toggle('active', x.dataset.val === (val || '')));
        syncBtn();
        close();
        applyFilter();
      });
      return b;
    }
    const todas = makeEd('todas as editoras', null);
    todas.classList.add('active');
    menu.appendChild(todas);
    editoras.forEach(e => menu.appendChild(makeEd(e, e)));
  }

  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    const open = filterEl.classList.toggle('open');
    btn.setAttribute('aria-expanded', open ? 'true' : 'false');
  });
  document.addEventListener('click', (e) => { if (!filterEl.contains(e.target)) close(); });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') close(); });
}

(async () => {
  try {
    allLivros = await fetchLivros();
    buildFilter();
    render(allLivros);
  } catch (e) {
    document.getElementById('gal').innerHTML = '<div class="loading">erro ao carregar</div>';
  }
})();
</script>

</body>
</html>
