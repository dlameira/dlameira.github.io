<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Livros — Daniel Lameira</title>
<style>
@font-face { font-family: 'OffBit'; src: url('fonts/OffBit-101Bold.otf') format('opentype'); }
@font-face { font-family: 'AuthenticSans'; src: url('fonts/60b11050899817005a227b9e.otf') format('opentype'); }
@font-face { font-family: 'GTPressura'; src: url('fonts/gt-pressura-mono-regular.ttf') format('truetype'); }
@font-face { font-family: 'MyriadPro'; src: url('fonts/MyriadPro-Regular.otf') format('opentype'); }

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a08; --fg: #e8e8d8; --red: #E8320A;
  --green: #00ff41; --blue: #3355ff; --purple: #cc44ff; --yellow: #f2e04a;
  --f-title: 'AuthenticSans', 'OffBit', monospace;
  --f-ui: 'GTPressura', monospace;
  --f-body: 'MyriadPro', sans-serif;
}

html { overflow-x: hidden; }
body { background: var(--bg); color: var(--fg); font-family: var(--f-body); overflow-x: hidden; cursor: crosshair; }

body::before {
  content: ''; position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.04) 3px, rgba(0,0,0,0.04) 4px);
  pointer-events: none; z-index: 997;
}

/* NAV */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 16px 24px; background: var(--bg);
  border-bottom: 1px solid rgba(232,50,10,0.25);
}
.nav-logo { display: flex; flex-direction: column; gap: 3px; }
.nav-logo-title { font-family: var(--f-title); font-size: 26px; color: var(--red); letter-spacing: 0.06em; line-height: 1; text-decoration: none; }
.nav-logo-sub { font-family: var(--f-ui); font-size: 8.5px; color: rgba(232,50,10,0.55); letter-spacing: 0.04em; line-height: 1.45; }
.nav-links { display: flex; align-items: center; list-style: none; gap: 0; flex-wrap: wrap; justify-content: flex-end; }
.nav-sep { color: var(--red); font-size: 11px; padding: 0 5px; opacity: 0.6; }
.nav-links a { font-family: var(--f-ui); font-size: 11.5px; color: var(--fg); text-decoration: none; letter-spacing: 0.06em; padding: 2px 4px; transition: color 0.15s; }
.nav-links a:hover { color: var(--red); }
.nav-links a.active { color: var(--yellow); }

/* LAYOUT */
.page-wrap {
  padding: 96px 24px 100px;
  max-width: 1400px;
  margin: 0 auto;
}

/* HEADER */
.page-header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 24px;
  flex-wrap: wrap;
  margin-bottom: 40px;
  padding-bottom: 24px;
  border-bottom: 1px solid rgba(242,224,74,0.2);
}

.page-title {
  font-family: var(--f-title);
  font-size: clamp(36px, 5vw, 72px);
  letter-spacing: 0.04em;
  line-height: 1;
  color: var(--yellow);
}

.page-count {
  font-family: var(--f-ui);
  font-size: 9px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: rgba(242,224,74,0.35);
  padding-bottom: 8px;
}

/* FILTROS */
.filtros {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 32px;
}

.filtro-btn {
  font-family: var(--f-ui);
  font-size: 8px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 5px 12px;
  border: 1px solid rgba(242,224,74,0.2);
  color: rgba(242,224,74,0.3);
  background: none;
  cursor: crosshair;
  transition: all 0.15s;
}
.filtro-btn:hover { border-color: var(--yellow); color: var(--yellow); }
.filtro-btn.active { border-color: var(--yellow); color: var(--yellow); background: rgba(242,224,74,0.06); }

/* GRID DE LIVROS */
.books-grid-full {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
  gap: 3px;
}

.book-card {
  display: block;
  text-decoration: none;
  color: var(--fg);
  cursor: crosshair;
  position: relative;
  overflow: hidden;
  aspect-ratio: 2/3;
  background: #111109;
  border: 1px solid rgba(255,255,255,0.04);
  transition: border-color 0.15s;
}
.book-card:hover { border-color: var(--yellow); }

.book-card img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  filter: contrast(1.05) brightness(0.88) saturate(0.7);
  transition: filter 0.2s;
}
.book-card:hover img { filter: contrast(1.08) brightness(0.95) saturate(0.9); }

.book-card-ph {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--f-ui); font-size: 7px;
  letter-spacing: 0.1em; color: rgba(255,255,255,0.08);
}

.book-card-overlay {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 20px 8px 8px;
  background: linear-gradient(transparent, rgba(0,0,0,0.85));
  opacity: 0;
  transition: opacity 0.2s;
}
.book-card:hover .book-card-overlay { opacity: 1; }

.book-card-title {
  font-family: var(--f-ui);
  font-size: 8px;
  letter-spacing: 0.08em;
  line-height: 1.3;
  color: var(--fg);
}

.book-card-autor {
  font-family: var(--f-ui);
  font-size: 7px;
  letter-spacing: 0.06em;
  color: rgba(242,224,74,0.6);
  margin-top: 3px;
}

/* ESTADO VAZIO */
.empty-state {
  grid-column: 1/-1;
  padding: 64px 0;
  font-family: var(--f-ui);
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(242,224,74,0.25);
  text-align: center;
}

/* FOOTER */
footer {
  border-top: 1px solid rgba(232,50,10,0.18);
  padding: 18px 24px;
  display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px;
  margin-top: 64px;
}
footer span { font-family: var(--f-ui); font-size: 8.5px; letter-spacing: 0.13em; text-transform: uppercase; color: rgba(232,232,216,0.14); }

/* RESPONSIVE */
@media (max-width: 600px) {
  .books-grid-full { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); }
}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">
    <a href="index.html" class="nav-logo-title">WEIRD WIZ</a>
    <span class="nav-logo-sub">a blog about art creativity<br>tech books and consciousness</span>
  </div>
  <ul class="nav-links">
    <li><span class="nav-sep">..·</span><a href="index.html#escritos">Escritos</a></li>
    <li><span class="nav-sep">:·</span><a href="drops.html">Drops</a></li>
    <li><span class="nav-sep">.·.</span><a href="livros.html" class="active">Livros</a></li>
    <li><span class="nav-sep">-·.</span><a href="index.html#obras">Obras</a></li>
    <li><span class="nav-sep">-·</span><a href="index.html#me">Me</a></li>
  </ul>
</nav>

<div class="page-wrap">

  <div class="page-header">
    <h1 class="page-title">LIVROS QUE DIRIGI</h1>
    <span class="page-count" id="page-count">carregando...</span>
  </div>

  <div class="filtros" id="filtros"></div>

  <div class="books-grid-full" id="books-grid">
    <div class="empty-state">carregando...</div>
  </div>

</div>

<footer>
  <span>© 2025 Daniel Lameira</span>
  <span>made by hand</span>
</footer>

<script>
const DIRECTUS = 'https://directus-production-afdd.up.railway.app';

function directusImg(id, width) {
  if (!id) return null;
  return `${DIRECTUS}/assets/${id}${width ? '?width=' + width : ''}`;
}

let todosLivros = [];
let filtroAtivo = 'todos';

async function fetchLivros() {
  const res = await fetch(`${DIRECTUS}/items/livros?filter[status][_eq]=published&sort[]=-ano&limit=500&fields=id,title,autor,editora,ano,Cover`);
  const data = await res.json();
  return data.data || [];
}

function renderFiltros(livros) {
  const editoras = ['todos', ...new Set(livros.map(l => l.editora).filter(Boolean))].slice(0, 8);
  const bar = document.getElementById('filtros');
  bar.innerHTML = '';
  editoras.forEach(ed => {
    const btn = document.createElement('button');
    btn.className = `filtro-btn${ed === filtroAtivo ? ' active' : ''}`;
    btn.textContent = ed === 'todos' ? 'Todas as editoras' : ed;
    btn.addEventListener('click', () => {
      filtroAtivo = ed;
      document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderGrid(todosLivros);
    });
    bar.appendChild(btn);
  });
}

function renderGrid(livros) {
  const grid = document.getElementById('books-grid');
  const filtered = filtroAtivo === 'todos' ? livros : livros.filter(l => l.editora === filtroAtivo);

  document.getElementById('page-count').textContent = `${filtered.length} título${filtered.length !== 1 ? 's' : ''}`;

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state">nenhum livro encontrado</div>';
    return;
  }

  grid.innerHTML = '';
  filtered.forEach(livro => {
    const covId = livro.Cover || livro.cover;
    const a = document.createElement('a');
    a.href = `livro.html?id=${livro.id}`;
    a.className = 'book-card';
    a.innerHTML = covId
      ? `<img src="${directusImg(covId, 300)}" alt="${livro.title}" loading="lazy">
         <div class="book-card-overlay">
           <div class="book-card-title">${(livro.title || '').toUpperCase()}</div>
           <div class="book-card-autor">${livro.autor || ''}</div>
         </div>`
      : `<div class="book-card-ph">capa</div>
         <div class="book-card-overlay">
           <div class="book-card-title">${(livro.title || '').toUpperCase()}</div>
           <div class="book-card-autor">${livro.autor || ''}</div>
         </div>`;
    grid.appendChild(a);
  });
}

async function init() {
  todosLivros = await fetchLivros();
  renderFiltros(todosLivros);
  renderGrid(todosLivros);
}

init();
</script>

</body>
</html>
